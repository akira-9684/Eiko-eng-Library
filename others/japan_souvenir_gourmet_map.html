function itemDisplayText(d,i){
  if(lang()==="ja") return i.name;
  return exactItemNames[lang()]?.[i.name] || `${localPref(d.pref)} ${genericItemName[lang()][i.cat]}`;
}
function itemTitleHtml(d,i){
  const name = itemDisplayText(d,i);
  return lang()==="ja" ? name : `${name}<span class="original-name">${i.name}</span>`;
}
function officialUrl(d,i){return "https://www.google.com/search?q="+encodeURIComponent(`${d.pref} ${i.name} 公式 HP`)}
function mapUrl(d,i){return "https://www.google.com/maps/search/"+encodeURIComponent(`${d.pref} ${i.name}`)}
function queryText(d,i){return `${d.pref} ${localPref(d.pref)} ${d.region} ${i.name} ${itemDisplayText(d,i)} ${i.cat} ${label(i.cat)}`.toLowerCase()}
function filteredItems(d){
  const q=search.value.trim().toLowerCase();
  const cat=category.value;
  return d.items.filter(i=>(!cat||i.cat===cat)&&(!q||queryText(d,i).includes(q)));
}
function matchesPref(d){
  if(activeRegion!=="全国" && d.region!==activeRegion) return false;
  const q=search.value.trim().toLowerCase();
  if(!q) return true;
  return filteredItems(d).length>0 || `${d.pref} ${localPref(d.pref)} ${d.region}`.toLowerCase().includes(q);
}
function setupStaticUI(){
  const selectedCategory = category.value;
  document.documentElement.lang = lang();
  document.getElementById("title").textContent = t().title;
  document.getElementById("subtitle").textContent = t().sub;
  search.placeholder = t().search;
  category.innerHTML = `<option value="">${t().allCat}</option>` + catNames.ja.map(c=>`<option value="${c}">${label(c)}</option>`).join("");
  category.value = selectedCategory;
  document.getElementById("regionFilters").innerHTML = regions.map(r=>`<button class="regionBtn ${r===activeRegion?"active":""}" type="button" data-region="${r}">${localRegion(r)}</button>`).join("");
  document.querySelectorAll(".regionBtn").forEach(btn=>btn.onclick=()=>{activeRegion=btn.dataset.region;activePref=null;render();});
}
function render(){
  setupStaticUI();
  markerLayer.clearLayers();
  const shown=data.filter(matchesPref);
  const shownCount=shown.reduce((sum,d)=>sum+filteredItems(d).length,0);
  document.getElementById("countText").textContent=t().count(shownCount);
  shown.forEach(d=>{
    const count=filteredItems(d).length || d.items.length;
    const icon=L.divIcon({className:"",html:`<div class="marker">${count}</div>`,iconSize:[36,36],iconAnchor:[18,18]});
    L.marker([d.lat,d.lng],{icon}).addTo(markerLayer).bindPopup(`<strong>${localPref(d.pref)}</strong><br>${filteredItems(d).slice(0,10).map(i=>itemDisplayText(d,i)).join("<br>")}`).on("click",()=>showPref(d));
  });
  if(!activePref || !shown.includes(activePref)) showOverview(shown); else showPref(activePref,false);
}
function showOverview(shown){
  activePref=null;
  const itemCount=shown.reduce((sum,d)=>sum+filteredItems(d).length,0);
  panelHead.innerHTML=`<small>${localRegion(activeRegion)}</small><h2>${shown.length? t().overview : t().select}</h2><p>${shown.length?t().overviewText(shown.length,itemCount):t().selectText}</p><div class="note">${t().note}</div>`;
  list.innerHTML=shown.length?shown.map(d=>`<button class="card" type="button" style="text-align:left;cursor:pointer" onclick="showPrefByName('${d.pref}')"><div class="cardTop"><h3>${localPref(d.pref)}</h3><span class="tag">${localRegion(d.region)}</span></div><p>${filteredItems(d).slice(0,10).map(i=>itemDisplayText(d,i)).join(" / ")}</p></button>`).join(""):`<div class="empty">${t().none}</div>`;
}
function showPrefByName(pref){const d=data.find(x=>x.pref===pref); if(d) showPref(d)}
function showPref(d,pan=true){
  activePref=d;
  if(pan) map.setView([d.lat,d.lng],7,{animate:true});
  const items=filteredItems(d);
  panelHead.innerHTML=`<small>${localRegion(d.region)}</small><h2>${localPref(d.pref)}</h2><p>${t().prefText(items.length)}</p><div class="note">${t().note}</div>`;
  list.innerHTML=items.length?items.map(i=>`<article class="card"><div class="cardTop"><div><h3>${itemTitleHtml(d,i)}</h3><div class="meta">${localPref(d.pref)}</div></div><span class="tag">${label(i.cat)}</span></div><p>${itemNote[lang()](d,i)}</p><div class="linkRow"><a class="linkBtn" href="${officialUrl(d,i)}" target="_blank" rel="noopener noreferrer">${t().official}</a><a class="linkBtn" href="${mapUrl(d,i)}" target="_blank" rel="noopener noreferrer">${t().map}</a></div></article>`).join(""):`<div class="empty">${t().none}</div>`;
}
search.addEventListener("input",render);
category.addEventListener("change",render);
langEl.addEventListener("change",render);
render();
</script>
</body>
</html>
