<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本 絶景マップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" onerror="this.onerror=null;this.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #f0ede8; }

/* Header */
header {
  background: #1a3a2a;
  color: #fff;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  z-index: 1000;
}
header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; }
header p { font-size: 12px; color: #9dc9b0; white-space: nowrap; }

.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-left: auto;
}
.filter-btn {
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: rgba(255,255,255,0.75);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
}
.filter-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.filter-btn.active { background: #2e7d52; border-color: #2e7d52; color: #fff; }

/* Main layout */
.main { flex: 1; display: flex; overflow: hidden; position: relative; }

/* Map */
#map { flex: 1; z-index: 1; }

/* Detail Panel */
#panel {
  width: 360px;
  flex-shrink: 0;
  background: #fff;
  border-left: 1px solid #e0ded8;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  z-index: 10;
  display: flex;
  flex-direction: column;
}
#panel.open { transform: translateX(0); }

.panel-photo {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
  background: #e8e5e0;
  flex-shrink: 0;
}
.panel-photo-placeholder {
  width: 100%; height: 220px;
  background: linear-gradient(135deg, #d4edda 0%, #a8d5b5 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; flex-shrink: 0;
}

.panel-body { padding: 1.25rem; flex: 1; }
.panel-region {
  display: inline-block;
  font-size: 11px; font-weight: bold;
  padding: 3px 10px; border-radius: 999px;
  margin-bottom: 8px;
  color: #fff;
}
.panel-name { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
.panel-season {
  font-size: 12px; color: #777;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 5px;
}

.panel-desc { font-size: 14px; color: #444; line-height: 1.75; margin-bottom: 14px; }
.panel-detail { font-size: 13px; color: #555; line-height: 1.75; margin-bottom: 16px; border-left: 3px solid #c8e6d4; padding-left: 12px; }

.info-row {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 13px; color: #444;
  margin-bottom: 8px;
}
.info-label { color: #888; min-width: 50px; flex-shrink: 0; font-size: 12px; margin-top: 1px; }

.panel-link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 18px;
  padding: 12px;
  background: #2e7d52;
  color: #fff;
  text-decoration: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  transition: background 0.15s;
}
.panel-link:hover { background: #1a5c38; }

.panel-close {
  position: absolute;
  top: 8px; right: 8px;
  width: 30px; height: 30px;
  background: rgba(0,0,0,0.5);
  border: none; border-radius: 50%;
  color: #fff; font-size: 16px;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  z-index: 20;
  line-height: 1;
}

/* Empty state */
#empty-state {
  position: absolute;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(26,58,42,0.88);
  color: #fff;
  padding: 10px 20px;
  border-radius: 999px;
  font-size: 13px;
  pointer-events: none;
  z-index: 5;
  white-space: nowrap;
  backdrop-filter: blur(4px);
}

/* Leaflet custom marker */
.custom-marker {
  width: 28px; height: 28px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  border: 2px solid rgba(255,255,255,0.8);
  cursor: pointer;
  transition: transform 0.2s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.custom-marker:hover { transform: rotate(-45deg) scale(1.2); }
.custom-marker.selected { transform: rotate(-45deg) scale(1.3); box-shadow: 0 0 0 3px rgba(255,255,255,0.6), 0 3px 8px rgba(0,0,0,0.4); }

.leaflet-popup-content-wrapper {
  border-radius: 10px !important;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important;
  padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; }

/* Stamp rally */
.stamp-counter {
  display: flex; align-items: center; gap: 10px;
  background: rgba(0,0,0,0.25);
  border-radius: 12px;
  padding: 8px 14px;
  flex-shrink: 0;
}
.stamp-counter .sc-block { text-align: center; }
.stamp-counter .sc-num { font-size: 22px; font-weight: 700; line-height: 1; }
.stamp-counter .sc-label { font-size: 10px; color: #9dc9b0; margin-top: 2px; }
.stamp-counter .sc-visited { color: #6ee7a8; }
.stamp-counter .sc-remaining { color: #ffd580; }
.stamp-counter .sc-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.15); }
.stamp-counter .sc-bar-wrap { width: 90px; }
.stamp-counter .sc-bar-bg { height: 5px; background: rgba(255,255,255,0.15); border-radius: 999px; overflow: hidden; margin-bottom: 3px; }
.stamp-counter .sc-bar-fill { height: 100%; background: #6ee7a8; border-radius: 999px; transition: width 0.4s; }
.stamp-counter .sc-bar-label { font-size: 10px; color: #9dc9b0; }

.visit-btn {
  width: 100%; padding: 13px;
  border: 2px dashed #ccc;
  background: transparent;
  border-radius: 10px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; margin-top: 10px;
  transition: all 0.18s;
  font-family: inherit; color: #666;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.visit-btn:hover { border-color: #2e7d52; color: #2e7d52; background: #f0faf5; }
.visit-btn.visited { background: #2e7d52; border: 2px solid #2e7d52; color: #fff; }
.visit-btn.visited:hover { background: #1a5c38; border-color: #1a5c38; }

.custom-marker { position: relative; }
.custom-marker.visited { opacity: 0.85; }
.custom-marker.visited::after {
  content: '✓';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  color: #fff; font-size: 13px; font-weight: 900;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  line-height: 1;
}
</style>
<style>
/* Enhanced explorer UI */
:root { --green:#1a3a2a; --accent:#2e7d52; --paper:#fff; --line:#ddd9d1; --shadow:0 12px 36px rgba(20,35,27,.16); }
html { width:100%; height:100%; overflow:hidden; }
body { width:100%; height:100%; height:100dvh; min-height:100%; overflow:hidden; }
header { flex:0 0 auto; }
.main { min-height:0; flex:1 1 0; }
#map { display:block; position:relative; width:100%; height:auto; min-height:240px; flex:1 1 0!important; }
.leaflet-container { width:100%!important; height:100%!important; background:#dce8e2; }
button,input,select,textarea { font:inherit; }
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible { outline:3px solid #ffd166; outline-offset:2px; }
.top-actions { display:flex; gap:6px; align-items:center; }
.icon-btn { border:1px solid rgba(255,255,255,.25); background:rgba(255,255,255,.08); color:#fff; border-radius:9px; padding:7px 10px; cursor:pointer; white-space:nowrap; }
.icon-btn:hover { background:rgba(255,255,255,.16); }
.search-tools { position:absolute; z-index:800; top:12px; left:50px; right:12px; display:flex; gap:8px; align-items:flex-start; pointer-events:none; }
.search-box,.filter-toggle,.view-toggle { pointer-events:auto; background:#fff; border:1px solid var(--line); border-radius:12px; box-shadow:0 4px 14px rgba(0,0,0,.12); }
.search-box { width:min(430px,45vw); display:flex; overflow:hidden; }
.search-box input { width:100%; border:0; padding:11px 12px; outline:none; }
.search-box button,.filter-toggle,.view-toggle { border:0; background:#fff; cursor:pointer; padding:11px 13px; }
.filter-toggle.active { color:var(--accent); font-weight:700; }
.advanced-filters { pointer-events:auto; display:none; width:310px; background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); padding:14px; }
.advanced-filters.open { display:block; }
.filter-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.field { display:flex; flex-direction:column; gap:4px; font-size:12px; color:#666; }
.field select,.field input,.field textarea { border:1px solid #ccc; border-radius:8px; padding:8px; background:white; color:#222; }
.check-row { display:flex; gap:12px; flex-wrap:wrap; margin-top:10px; font-size:12px; }
.result-count { margin-top:10px; font-size:12px; color:#555; display:flex; justify-content:space-between; }
.list-panel { position:absolute; z-index:750; inset:0 0 0 auto; width:390px; background:#f7f5f1; box-shadow:var(--shadow); display:none; flex-direction:column; }
.list-panel.open { display:flex; }
.list-head { padding:70px 14px 10px; display:flex; justify-content:space-between; align-items:center; }
.spot-list { overflow:auto; padding:0 12px 18px; display:grid; gap:10px; }
.spot-card { border:1px solid var(--line); background:#fff; border-radius:12px; padding:12px; display:grid; grid-template-columns:1fr auto; gap:7px; cursor:pointer; text-align:left; }
.spot-card:hover { border-color:#79a98d; transform:translateY(-1px); }
.spot-card h3 { font-size:15px; }
.spot-card p { grid-column:1/-1; color:#666; font-size:12px; line-height:1.45; }
.mini-tags { display:flex; gap:4px; flex-wrap:wrap; grid-column:1/-1; }
.tag { padding:2px 7px; border-radius:999px; background:#edf5f0; color:#28623f; font-size:10px; }
.fav { color:#d1495b; font-size:18px; }
.drawer { position:fixed; z-index:2000; top:0; right:0; width:min(460px,100%); height:100%; background:#fff; box-shadow:var(--shadow); transform:translateX(105%); transition:.25s; display:flex; flex-direction:column; }
.drawer.open { transform:none; }
.drawer-head { padding:16px; color:#fff; background:var(--green); display:flex; justify-content:space-between; align-items:center; }
.drawer-body { padding:16px; overflow:auto; flex:1; }
.drawer-close { border:0; background:transparent; color:#fff; font-size:22px; cursor:pointer; }
.tabs { display:flex; gap:6px; margin-bottom:14px; }
.tab-btn { border:1px solid var(--line); background:#fff; border-radius:8px; padding:8px 10px; cursor:pointer; }
.tab-btn.active { background:var(--green); color:#fff; }
.saved-item,.plan-item { padding:10px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; display:flex; gap:8px; justify-content:space-between; align-items:center; }
.plan-day { margin:14px 0 6px; font-weight:700; color:var(--green); }
.action-row { display:flex; flex-wrap:wrap; gap:7px; margin-top:12px; }
.action-btn { border:1px solid #b9c9c0; background:#fff; color:#245239; border-radius:9px; padding:9px 11px; cursor:pointer; text-decoration:none; font-size:12px; }
.action-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.action-btn.danger { color:#a72d3d; }
.panel-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
.panel-actions button { border:1px solid #bfd2c7; background:#f5faf7; border-radius:9px; padding:9px; cursor:pointer; }
.live-card { background:#f2f7f4; border:1px solid #d6e6dc; border-radius:10px; padding:11px; margin-top:12px; font-size:12px; line-height:1.65; }
.live-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px 12px; }
.notice { background:#fff7df; border-left:3px solid #e2a92c; padding:8px; margin-top:8px; }
.note-area { width:100%; min-height:75px; border:1px solid #ccc; border-radius:9px; padding:8px; margin-top:8px; resize:vertical; }
.photo-fallback { display:none; width:100%; height:220px; place-items:center; background:linear-gradient(135deg,#d8eadf,#9fc8ac); font-size:54px; }
.toast { position:fixed; z-index:3000; left:50%; bottom:24px; transform:translate(-50%,20px); background:#18392a; color:#fff; padding:10px 16px; border-radius:999px; opacity:0; pointer-events:none; transition:.2s; }
.toast.show { opacity:1; transform:translate(-50%,0); }
.legend { position:absolute; z-index:700; left:10px; bottom:24px; background:rgba(255,255,255,.94); border-radius:9px; padding:8px; font-size:10px; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.legend-row { display:flex; align-items:center; gap:5px; margin:3px; }
.legend-dot { width:9px; height:9px; border-radius:50%; }
.leaflet-marker-icon.cluster-marker { border-radius:50%; background:#173c29; color:#fff; display:grid!important; place-items:center; border:3px solid rgba(255,255,255,.8); box-shadow:0 2px 8px #0005; font-weight:700; }
@media (max-width:900px) {
  body { overflow:hidden; }
  header { padding:7px 8px; gap:6px; flex-wrap:wrap; max-height:132px; overflow:hidden; }
  header p,.stamp-counter .sc-bar-wrap { display:none; }
  header h1 { font-size:15px; }
  .stamp-counter { padding:4px 7px; gap:5px; }
  .stamp-counter .sc-num { font-size:15px; }
  .stamp-counter .sc-divider { display:none; }
  .filter-bar { order:3; width:100%; height:30px; overflow-x:auto; overflow-y:hidden; flex-wrap:nowrap; margin:0; padding-bottom:2px; }
  .top-actions { margin-left:auto; }
  .icon-btn { font-size:0; padding:7px; }
  .icon-btn::first-letter { font-size:15px; }
  .search-tools { top:9px; left:48px; right:8px; flex-wrap:wrap; }
  .search-box { width:calc(100% - 104px); }
  .advanced-filters { width:100%; max-height:60vh; overflow:auto; }
  #map { min-height:280px; }
  #panel { position:absolute; width:100%; height:min(72dvh,650px); bottom:0; left:0; border-left:0; border-top:1px solid var(--line); transform:translateY(105%); border-radius:18px 18px 0 0; }
  #panel.open { transform:none; }
  .panel-photo,.photo-fallback { height:170px; }
  .list-panel { width:100%; }
  .list-head { padding-top:120px; }
  .legend { display:none; }
}
@media (prefers-reduced-motion:reduce) { * { scroll-behavior:auto!important; transition:none!important; } }
</style>
<style id="multilingualStyles">
.language-picker{display:inline-flex;align-items:center;gap:5px;padding:0 8px;border:1px solid rgba(255,255,255,.48);border-radius:999px;background:rgba(255,255,255,.13);color:#fff;min-height:36px}
.language-picker select{border:0;background:transparent;color:inherit;font:inherit;font-weight:700;outline:none;cursor:pointer}
.language-picker option{color:#222;background:#fff}
@media(max-width:700px){.language-picker{min-height:34px;padding:0 6px}.language-picker span{display:none}.language-picker select{max-width:100px;font-size:12px}}
</style>
</head>
<body>

<header>
  <div>
    <h1>🗾 日本 絶景マップ</h1>
    <p>スポットをクリックして詳細を見る</p>
  </div>
  <div class="stamp-counter" id="stampCounter">
    <div class="sc-block">
      <div class="sc-num sc-visited" id="visitedCount">0</div>
      <div class="sc-label">訪問済み</div>
    </div>
    <div class="sc-divider"></div>
    <div class="sc-block">
      <div class="sc-num sc-remaining" id="remainingCount">100</div>
      <div class="sc-label">未訪問</div>
    </div>
    <div class="sc-divider"></div>
    <div class="sc-block sc-bar-wrap">
      <div class="sc-bar-bg"><div class="sc-bar-fill" id="progressBar" style="width:0%"></div></div>
      <div class="sc-bar-label" id="progressLabel">0 / 100 達成</div>
    </div>
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="top-actions">
    <label class="language-picker" aria-label="表示言語"><span aria-hidden="true">🌐</span><select id="languageSelect" aria-label="表示言語を選択"><option value="ja">日本語</option><option value="en">English</option><option value="zh-TW">繁體中文</option><option value="ko">한국어</option></select></label>
    <button class="icon-btn" id="locateBtn" type="button" title="現在地周辺を表示">◎ 現在地</button>
    <button class="icon-btn" id="savedBtn" type="button" title="保存・旅行計画">♡ 保存・計画</button>
    <button class="icon-btn" id="dataBtn" type="button" title="共有・バックアップ">⇧ 共有</button>
  </div>
</header>

<div class="main">
  <div id="map"></div>
  <div class="search-tools" role="search">
    <div class="search-box"><input id="searchInput" type="search" placeholder="地名・都道府県・温泉・紅葉など" aria-label="スポット検索"><button id="clearSearch" type="button" aria-label="検索を消去">✕</button></div>
    <button class="filter-toggle" id="advancedToggle" type="button" aria-expanded="false">⚙ 条件</button>
    <button class="view-toggle" id="listToggle" type="button" aria-expanded="false">☷ 一覧</button>
    <div class="advanced-filters" id="advancedFilters">
      <div class="filter-grid">
        <label class="field">季節<select id="seasonFilter"><option value="">すべて</option><option>春</option><option>夏</option><option>秋</option><option>冬</option><option>通年</option></select></label>
        <label class="field">景観タイプ<select id="typeFilter"><option value="">すべて</option><option>海</option><option>山</option><option>湖・川</option><option>花・紅葉</option><option>温泉</option><option>歴史・文化</option><option>星空・夜景</option></select></label>
        <label class="field">アクセス<select id="accessFilter"><option value="">すべて</option><option value="train">公共交通向き</option><option value="car">車向き</option><option value="walk">徒歩・登山</option></select></label>
        <label class="field">並び順<select id="sortFilter"><option value="default">標準</option><option value="distance">現在地から近い</option><option value="season">今が見頃</option><option value="name">名前順</option></select></label>
      </div>
      <div class="check-row"><label><input id="wishOnly" type="checkbox"> 行きたいのみ</label><label><input id="unvisitedOnly" type="checkbox"> 未訪問のみ</label><label><input id="nowOnly" type="checkbox"> 今が見頃</label></div>
      <div class="result-count"><span id="resultCount">100件</span><button class="action-btn" id="resetFilters" type="button">条件をリセット</button></div>
    </div>
  </div>
  <section class="list-panel" id="listPanel" aria-label="スポット一覧"><div class="list-head"><strong>スポット一覧</strong><button class="action-btn" id="closeList" type="button">閉じる</button></div><div class="spot-list" id="spotList"></div></section>
  <div class="legend" id="legend" aria-label="地域の色分け"></div>

  <div id="panel">
    <div style="position:relative; flex-shrink:0;">
      <img id="panelPhoto" class="panel-photo" src="" alt="">
      <button class="panel-close" id="panelClose">✕</button>
    </div>
    <div class="panel-body">
      <span id="panelRegion" class="panel-region"></span>
      <h2 id="panelName" class="panel-name"></h2>
      <div id="panelSeason" class="panel-season"></div>
      <p id="panelDesc" class="panel-desc"></p>
      <p id="panelDetail" class="panel-detail"></p>
      <div class="info-row"><span class="info-label">🚗 アクセス</span><span id="panelAccess"></span></div>
      <div class="panel-actions">
        <button id="wishBtn" type="button">♡ 行きたい</button><button id="planBtn" type="button">＋ 旅行計画</button>
        <button id="routeBtn" type="button">↗ 経路</button><button id="spotShareBtn" type="button">共有</button>
        <button id="fallbackSearchBtn" type="button" style="grid-column:1/-1">🔎 公式リンクが開かない場合はこちら</button>
      </div>
      <div class="live-card" id="liveCard"><strong>今日の観賞情報</strong><div id="liveInfo">スポットを選ぶと天気・日の出入りを取得します。</div><div id="conditionAdvice"></div></div>
      <label class="field" style="margin-top:12px">訪問メモ<textarea class="note-area" id="spotNote" placeholder="訪問日、撮影ポイント、感想など"></textarea></label>
      <div class="action-row"><button class="action-btn" id="saveNoteBtn" type="button">メモを保存</button><label class="action-btn">写真を追加<input id="photoInput" type="file" accept="image/*" hidden></label></div>
      <div id="userPhoto"></div>
      <button class="visit-btn" id="visitBtn" onclick="toggleVisited()">
        <span id="visitBtnIcon">☐</span><span id="visitBtnText">訪問済みにする</span>
      </button>
      <a id="panelLink" class="panel-link" href="#" target="_blank" rel="noopener">
        🔗 公式サイト・詳細情報を見る
      </a>

<script>
// Enhanced application

function inferTags(s) {
  const t = `${s.name} ${s.desc} ${s.detail} ${s.season}`;
  const tags = [];
  if (/海|島|岬|浜|ビーチ|湾|潮/.test(t)) tags.push('海');
  if (/山|岳|高原|峡谷|渓谷|丘|峠|樹氷/.test(t)) tags.push('山');
  if (/湖|池|川|滝|渓流|湿原/.test(t)) tags.push('湖・川');
  if (/花|桜|紅葉|ラベンダー|新緑|ススキ/.test(t)) tags.push('花・紅葉');
  if (/温泉|湯|地獄/.test(t)) tags.push('温泉');
  if (/神社|寺|城|宿|世界遺産|集落|古道/.test(t)) tags.push('歴史・文化');
  if (/星|夜景|ライトアップ|夕陽|夕焼け/.test(t)) tags.push('星空・夜景');

}
spots.forEach((s,i) => { s.id=i; s.tags=inferTags(s); });

function currentSeason() { const m=new Date().getMonth()+1; return m<=2||m===12?'冬':m<=5?'春':m<=8?'夏':'秋'; }
function isInSeason(s) { const v=s.season,m=new Date().getMonth()+1,rx={春:/春|桜|3月|4月|5月/,夏:/夏|6月|7月|8月/,秋:/秋|紅葉|9月|10月|11月/,冬:/冬|雪|氷|12月|1月|2月/}; return /通年/.test(v)||rx[currentSeason()].test(v)||new RegExp(`${m}月`).test(v); }
function accessType(s) { const a=s.access; if (/徒歩|登山|トレッキング/.test(a)) return 'walk'; if (/駅|バス|電車|フェリー/.test(a)) return 'train'; return 'car'; }
function distanceKm(a,b) { const r=6371,d=Math.PI/180,d1=(b.lat-a.lat)*d,d2=(b.lng-a.lng)*d,q=Math.sin(d1/2)**2+Math.cos(a.lat*d)*Math.cos(b.lat*d)*Math.sin(d2/2)**2; return 2*r*Math.asin(Math.sqrt(q)); }

  list.querySelectorAll('[data-spot]').forEach(b=>b.onclick=()=>{const s=spots[+b.dataset.spot];map.setView([s.lat,s.lng],9);$('listPanel').classList.remove('open');$('listToggle').setAttribute('aria-expanded','false');setTimeout(()=>openPanel(s,null),100);});
}

let searchTimer;$('searchInput').oninput=()=>{clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,180);};
$('clearSearch').onclick=()=>{$('searchInput').value='';applyFilters();$('searchInput').focus();};
['seasonFilter','typeFilter','accessFilter','sortFilter','wishOnly','unvisitedOnly','nowOnly'].forEach(id=>$(id).onchange=applyFilters);
$('advancedToggle').onclick=()=>{const open=$('advancedFilters').classList.toggle('open');$('advancedToggle').classList.toggle('active',open);$('advancedToggle').setAttribute('aria-expanded',open);};

const panel=$('panel'),emptyState=$('empty-state');$('panelClose').onclick=closePanel;
function openPanel(s,marker) {
  currentSpotName=s.name;$('panelName').textContent=s.name;$('panelDesc').textContent=s.desc;$('panelDetail').textContent=s.detail;$('panelAccess').textContent=s.access;$('panelSeason').textContent=`📅 ベストシーズン：${s.season}`;$('panelLink').href=s.url;$('panelRegion').textContent=s.region;$('panelRegion').style.background=REGION_COLORS[s.region]||'#333';
  const photo=$('panelPhoto');photo.style.display='block';photo.src=s.photo;photo.alt=s.name;let fallback=photo.nextElementSibling;if(!fallback||!fallback.classList.contains('photo-fallback')){fallback=document.createElement('div');fallback.className='photo-fallback';fallback.textContent='🏞️';photo.after(fallback);}photo.onerror=()=>{photo.style.display='none';fallback.style.display='grid';};photo.onload=()=>{fallback.style.display='none';photo.style.display='block';};
  updateVisitBtn(s.name);updateWishBtn(s.name);$('spotNote').value=notes[s.name]?.text||'';renderUserPhoto(s.name);loadLiveInfo(s);$('routeBtn').onclick=()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`,'_blank','noopener');$('spotShareBtn').onclick=()=>shareSpot(s);$('planBtn').onclick=()=>addToPlan(s.name);$('fallbackSearchBtn').onclick=()=>window.open(`https://www.google.com/search?q=${encodeURIComponent(s.name+' 公式 観光 最新情報')}`,'_blank','noopener');

function updateVisitBtn(name){const on=visited.has(name);$('visitBtn').classList.toggle('visited',on);$('visitBtnIcon').textContent=on?'✓':'☐';$('visitBtnText').textContent=on?'訪問済み（タップで解除）':'訪問済みにする';}

const weatherNames={0:'快晴',1:'晴れ',2:'一部曇り',3:'曇り',45:'霧',48:'霧氷',51:'弱い霧雨',61:'雨',63:'雨',65:'強い雨',71:'雪',80:'にわか雨',95:'雷雨'};
async function loadLiveInfo(s){$('liveInfo').textContent='天気情報を取得中…';$('conditionAdvice').innerHTML='';const url=`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&current=temperature_2m,weather_code,cloud_cover,wind_speed_10m&daily=sunrise,sunset,precipitation_probability_max&timezone=Asia%2FTokyo&forecast_days=1`;try{const r=await fetch(url);if(!r.ok)throw 0;const d=await r.json(),c=d.current,sunrise=d.daily.sunrise[0].slice(11),sunset=d.daily.sunset[0].slice(11),rain=d.daily.precipitation_probability_max[0];$('liveInfo').innerHTML=`<div class="live-grid"><span>天気：${weatherNames[c.weather_code]||'変わりやすい'}</span><span>気温：${c.temperature_2m}℃</span><span>雲量：${c.cloud_cover}%</span><span>風：${c.wind_speed_10m}km/h</span><span>日の出：${sunrise}</span><span>日の入：${sunset}</span><span>降水：${rain}%</span><span>${isInSeason(s)?'✨ 今が見頃候補':'次の見頃も確認'}</span></div>`;$('conditionAdvice').innerHTML=viewingAdvice(s,c,rain,sunrise,sunset);}catch{$('liveInfo').textContent='天気情報を取得できませんでした。公式情報をご確認ください。';$('conditionAdvice').innerHTML=`<div class="notice">${esc(safetyNotice(s))}</div>`;}}
function viewingAdvice(s,c,rain,sunrise,sunset){const tips=[];if(s.tags.includes('星空・夜景'))tips.push(c.cloud_cover<30?'今夜は星空・夕景の好条件です':'雲量が多め。雲の切れ間を狙いましょう');if(/雲海/.test(s.desc+s.detail+s.season))tips.push('雲海は早朝・高湿度・弱風の翌朝が狙い目です');if(s.tags.includes('海'))tips.push(`海景は日の出${sunrise}／日の入${sunset}の前後30分が撮影好機`);if(rain>50)tips.push('雨具と足元の安全対策を。荒天時は無理をしないでください');tips.push(safetyNotice(s));return tips.map(x=>`<div class="notice">${esc(x)}</div>`).join('');}
function safetyNotice(s){const t=s.name+s.desc+s.detail+s.season;if(/火山|噴火|地獄/.test(t))return '火山・立入規制を気象庁と現地公式サイトで直前確認してください。';if(/冬季閉鎖|雪|氷/.test(t))return '冬季閉鎖・積雪・路面凍結を現地公式サイトで確認してください。';if(/潮|渦潮|干潮/.test(t))return '潮位・運航状況・観賞可能時刻を現地公式サイトで確認してください。';if(/登山|トレッキング|山/.test(t))return '登山道・交通規制・天候を直前に確認し、余裕ある装備で訪れてください。';return '営業時間・通行止め・混雑状況は公式サイトで最新情報をご確認ください。';}

// Notes and personal photos
$('saveNoteBtn').onclick=()=>{if(!currentSpotName)return;notes[currentSpotName]={text:$('spotNote').value,updated:new Date().toISOString()};persist('japanScenicNotes',notes);toast('メモを保存しました');};
$('photoInput').onchange=e=>{const f=e.target.files[0];if(!f||!currentSpotName)return;if(f.size>1200000){toast('写真は1.2MB以下にしてください');return;}const reader=new FileReader();reader.onload=()=>{userPhotos[currentSpotName]=reader.result;try{persist('japanScenicPhotos',userPhotos);renderUserPhoto(currentSpotName);toast('写真を保存しました');}catch{delete userPhotos[currentSpotName];toast('保存容量が不足しています');}};reader.readAsDataURL(f);};
function renderUserPhoto(name){$('userPhoto').innerHTML=userPhotos[name]?`<img src="${userPhotos[name]}" alt="自分で追加した${esc(name)}の写真" style="width:100%;margin-top:10px;border-radius:9px"><button class="action-btn danger" id="removePhoto">写真を削除</button>`:'';if($('removePhoto'))$('removePhoto').onclick=()=>{delete userPhotos[name];persist('japanScenicPhotos',userPhotos);renderUserPhoto(name);};}

// Wish list and itinerary
$('savedBtn').onclick=()=>openDrawer('savedDrawer');$('dataBtn').onclick=()=>openDrawer('dataDrawer');document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>$(b.dataset.close).classList.remove('open'));
function openDrawer(id){document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('open'));$(id).classList.add('open');if(id==='savedDrawer')renderSaved();}
document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{currentTab=b.dataset.tab;document.querySelectorAll('.tab-btn').forEach(x=>x.classList.toggle('active',x===b));renderSaved();});
function addToPlan(name){if(tripPlan.some(x=>x.name===name))return toast('旅行計画に追加済みです');tripPlan.push({name,day:1});persist('japanScenicPlan',tripPlan);toast('旅行計画に追加しました');renderSaved();}
function renderSaved(){const box=$('savedContent');if(currentTab==='wishes'){const arr=[...wishes].map(spotByName).filter(Boolean);box.innerHTML=arr.length?arr.map(s=>`<div class="saved-item"><span><strong>${esc(s.name)}</strong><br><small>${esc(s.region)}・${isInSeason(s)?'今が見頃候補':'見頃 '+esc(s.season)}</small></span><span><button class="action-btn" data-add="${s.id}">計画へ</button><button class="action-btn danger" data-unwish="${s.id}">削除</button></span></div>`).join(''):'<p>まだ「行きたい」はありません。</p>';box.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addToPlan(spots[+b.dataset.add].name));box.querySelectorAll('[data-unwish]').forEach(b=>b.onclick=()=>{wishes.delete(spots[+b.dataset.unwish].name);persist('japanScenicWishes',[...wishes]);renderSaved();renderList();});return;}const days=[...new Set(tripPlan.map(x=>x.day))].sort((a,b)=>a-b);box.innerHTML=tripPlan.length?days.map(day=>`<div class="plan-day">${day}日目</div>${tripPlan.filter(x=>x.day===day).map(x=>{const s=spotByName(x.name);return `<div class="plan-item"><span>${esc(x.name)}<br><small>${esc(s?.region||'')}</small></span><span><button class="action-btn" data-day="${esc(x.name)}">翌日へ</button><button class="action-btn danger" data-remove="${esc(x.name)}">削除</button></span></div>`;}).join('')}`).join(''):'<p>旅行計画は空です。スポット詳細から追加できます。</p>';if(tripPlan.length)box.innerHTML+=`<div class="action-row"><button class="action-btn primary" id="routeAll">選択地点を経路で開く</button><button class="action-btn" id="copyPlan">計画をコピー</button></div>`;box.querySelectorAll('[data-day]').forEach(b=>b.onclick=()=>{const x=tripPlan.find(x=>x.name===b.dataset.day);x.day++;persist('japanScenicPlan',tripPlan);renderSaved();});box.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{tripPlan=tripPlan.filter(x=>x.name!==b.dataset.remove);persist('japanScenicPlan',tripPlan);renderSaved();});if($('routeAll'))$('routeAll').onclick=()=>{const pts=tripPlan.map(x=>spotByName(x.name)).filter(Boolean);if(!pts.length)return;const origin=pts[0],dest=pts[pts.length-1],way=pts.slice(1,-1).map(s=>`${s.lat},${s.lng}`).join('|');window.open(`https://www.google.com/maps/dir/?api=1&origin=${origin.lat},${origin.lng}&destination=${dest.lat},${dest.lng}${way?'&waypoints='+encodeURIComponent(way):''}`,'_blank','noopener');};if($('copyPlan'))$('copyPlan').onclick=()=>copyText(days.map(d=>`${d}日目：`+tripPlan.filter(x=>x.day===d).map(x=>x.name).join(' → ')).join('\n'),'旅行計画をコピーしました');}

// Share, backup and restore
function appData(){return {version:1,visited:[...visited],wishes:[...wishes],tripPlan,notes};}
function copyText(text,msg){if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(()=>toast(msg)).catch(()=>fallbackCopy(text,msg));else fallbackCopy(text,msg);}
function fallbackCopy(text,msg){const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();toast(msg);}
function shareSpot(s){copyText(`${s.name}｜日本 絶景マップ\n${s.desc}\nhttps://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`,'スポット情報をコピーしました');}
$('copyShareBtn').onclick=()=>{const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(appData()))));copyText(location.href.split('#')[0]+'#data='+encoded,'共有リンクをコピーしました');};
$('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(appData(),null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`japan-scenic-map-${new Date().toISOString().slice(0,10)}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);};
$('importInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{importData(JSON.parse(r.result));toast('データを読み込みました');}catch{toast('読み込めないファイルです');}};r.readAsText(f);};
function importData(d){visited=new Set(d.visited||[]);wishes=new Set(d.wishes||[]);tripPlan=d.tripPlan||[];notes=d.notes||{};persist('japanScenicVisited',[...visited]);persist('japanScenicWishes',[...wishes]);persist('japanScenicPlan',tripPlan);persist('japanScenicNotes',notes);updateCounter();applyFilters();renderSaved();}
$('clearDataBtn').onclick=()=>{if(!confirm('訪問履歴・行きたい・計画・メモ・写真をすべて消去しますか？'))return;['japanScenicVisited','japanScenicWishes','japanScenicPlan','japanScenicNotes','japanScenicPhotos'].forEach(k=>localStorage.removeItem(k));visited=new Set();wishes=new Set();tripPlan=[];notes={};userPhotos={};updateCounter();applyFilters();toast('保存データを消去しました');};
if(location.hash.startsWith('#data=')){try{importData(JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(6))))));history.replaceState(null,'',location.pathname+location.search);toast('共有データを読み込みました');}catch{}}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.drawer,.advanced-filters,.list-panel').forEach(x=>x.classList.remove('open'));closePanel();}if(e.key==='/'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){e.preventDefault();$('searchInput').focus();}});
function refreshMapSize(){requestAnimationFrame(()=>{if(map&&map.invalidateSize)map.invalidateSize({pan:false});});}
window.addEventListener('resize',refreshMapSize,{passive:true});window.addEventListener('orientationchange',()=>setTimeout(refreshMapSize,250),{passive:true});if(window.visualViewport)window.visualViewport.addEventListener('resize',refreshMapSize,{passive:true});
updateCounter();applyFilters();
setTimeout(refreshMapSize,0);setTimeout(refreshMapSize,300);setTimeout(refreshMapSize,1000);
</script>

<script>const MULTILINGUAL_KIND="scenic";const MULTILINGUAL_TRANSLATIONS={"en":{"美瑛の丘":{"name":"Biei Hill","desc":"A patchwork field spread out over rolling hills. One of Hokkaido's most scenic spots that has a completely different look in each season.","detail":"There are also plenty of nearby spots such as the blue pond and Bogakudai. Lavender and sunflowers bloom in the summer, and golden wheat fields spread out in the fall. Early morning drives are especially recommended.","season":"May to October","access":"10 minutes by car from JR Furano Line \"Biei Station\""},"富良野ラベンダー畑":{"name":"Furano lavender field","desc":"A spectacular view that represents Hokkaido. The lavender fields, which turn purple every July, are a sight to behold.","detail":"Farm Tomita is the most famous, with a wide variety of flower fields in addition to lavender. Souvenirs such as lavender ice cream and scented products are also popular.","season":"Early to late July (best time to see)","access":"20 minutes walk or 5 minutes by car from JR Furano Line \"Nakafurano Station\""},"知床五湖":{"name":"Shiretoko Goko Lakes","desc":"Five mysterious lakes dotted around Shiretoko, a world natural heritage site. Unspoiled nature where brown bears also live.","detail":"A spectacular view of the Shiretoko mountain range reflected in the lake. There are two courses: the elevated boardwalk (free of charge) and the ground promenade (guide required). Information on brown bear sightings must be confirmed in advance.","season":"Late April to early November","access":"Approximately 2 hours by car from Memanbetsu Airport"},"摩周湖":{"name":"Lake Mashu","desc":"A mysterious lake that boasts the clearest water in Japan. It is famous as ``Misty Lake Mashu'' for its fantastic appearance shrouded in fog.","detail":"It is a caldera lake with no inflow or outflow rivers, and boasts one of the clearest waters in the world. The view from the observation deck is exceptional. On a sunny day, it's a stunning cobalt blue.","season":"May to October (visitable all year round)","access":"20 minutes by car from JR Senmo Main Line \"Mashu Station\""},"宗谷岬":{"name":"Cape Soya","desc":"The northernmost point of Japan. A spectacular view of the vast Sea of ​​Okhotsk and the Soya Strait that makes you feel like you are at the end of Japan.","detail":"If the weather is good, you may even be able to see Sakhalin. It is standard to take a commemorative photo in front of the northernmost monument. There is also an idyllic landscape with the round hills of Soya Hills in the surrounding area.","season":"All year round (drift ice can sometimes be seen in winter)","access":"Approximately 55 minutes by bus from Wakkanai Station"},"奥入瀬渓流":{"name":"Oirase Stream","desc":"A 14km long mountain stream that flows from Lake Towada. One of the most scenic courses in Tohoku, with moss-covered rocks and countless waterfalls.","detail":"The area is dotted with waterfalls of various sizes, including Choshi Otaki, and there are walking trails. It is especially beautiful in May with its fresh green leaves and in October with its autumn leaves. We recommend taking a leisurely walk while taking the bus.","season":"May (fresh green) and October (autumn leaves) are the best","access":"Approximately 2 hours by bus from JR Hachinohe Line \"Hachinohe Station\""},"蔵王の樹氷":{"name":"Zao's frost-covered trees","desc":"The Snow Monster is a giant ice monster that only appears in winter. The fantastic silver world is truly a different world.","detail":"A natural art created by snow and ice adhering to Aomori fir. Take the Zao Ropeway to the top of the mountain. At night, it is lit up and creates a magical atmosphere.","season":"Late January to early March","access":"Approximately 40 minutes by bus from Yamagata Station, using the Zao Ropeway"},"松島":{"name":"Matsushima","desc":"One of the three most scenic views of Japan. More than 260 islands are wrapped in pine trees and floating in the bay. A spectacular view that even Matsuo Basho wrote about.","detail":"Island hopping on a sightseeing boat is the norm. There are many historical shrines and temples such as Zuigan-ji Temple, so you can enjoy both history and spectacular views. Oysters are a specialty, and there are plenty of gourmet foods.","season":"All year round (spring cherry blossoms and autumn leaves are especially popular)","access":"5 minutes walk from JR Senseki Line \"Matsushima Kaigan Station\""},"富士山（河口湖）":{"name":"Mt. Fuji (Lake Kawaguchi)","desc":"Japanese symbol. The inverted view of Mt. Fuji reflected on the surface of the lake is a spectacular spot that attracts photographers from all over the world.","detail":"The view of Mt. Fuji from Lake Kawaguchi is especially beautiful, and the upside-down view of Mt. Fuji in the morning is a must-see. The collaboration between Oishi Park's lavender and Mt. Fuji is also picturesque. Oshino Hakkai is also nearby and easy to visit.","season":"All year round (especially beautiful from late autumn to spring when covered with snow)","access":"By bus or on foot from Fujikyuko Line \"Kawaguchiko Station\""},"日光いろは坂":{"name":"Nikko Irohazaka","desc":"A mountain road with 48 curves. During the fall foliage season, the entire mountain becomes fiery and a spectacular driving course.","detail":"A one-way road with the first Irohazaka (downhill) and the second Irohazaka (uphill). From the upper part of the mountain, Akechidaira, you can take the ropeway to get a spectacular view of Mt. Nantai and Lake Chuzenji.","season":"Mid-October to early November (autumn leaves)","access":"Approximately 40 minutes by bus from JR Nikko Line \"Nikko Station\""},"尾瀬ヶ原":{"name":"Ozegahara","desc":"The largest high-rise wetland in Honshu. During the skunk cabbage season, a fantastic sight unfolds as white flowers fill the wetland.","detail":"It is especially famous for its skunk cabbage from late May to June and for its autumn leaves from September to October. There is a well-maintained boardwalk, making it easy to hike. There are restrictions on private cars, and shuttle bus use is required.","season":"May to June (skunk cabbage), September to October (grass autumn leaves)","access":"By bus from Aizukogen Ozeguchi Station, Numata Station, etc."},"上高地":{"name":"Kamikochi","desc":"A glaciated valley that spreads out at the foot of the Northern Alps. The view of the Azusa River with the Hotaka Mountain Range in the background is the best mountain scenery in Japan.","detail":"The view of the Hotaka Mountain Range from Kappa Bridge is especially famous. There are many attractions such as Taisho Pond and Myojin Pond. There are restrictions on private cars, so enter the mountain by shuttle bus or taxi.","season":"Late April to mid-November (closed in winter)","access":"About 1 hour from Matsumoto IC. Park your car at Sawatari and change buses"},"白川郷":{"name":"Shirakawa-go","desc":"UNESCO World Heritage Site. A picturesque mountain village with steep sloped gassho-zukuri houses and snowy scenery.","detail":"The snowy winter scenery and night illuminations are magical and attract tourists from all over the world. There are also gassho-style guesthouses where you can stay in old private houses, giving you a unique experience.","season":"All year round (the snowy scenery from December to February is spectacular)","access":"Approximately 50 to 75 minutes by bus from Takayama Station, Kanazawa Station, etc."},"立山黒部アルペンルート":{"name":"Tateyama Kurobe Alpine Route","desc":"A mountain sightseeing route that runs through ridgelines at an altitude of 3000m. At ``Yuki no Otani'' in spring, you can walk between 20m high snow walls.","detail":"You can enter the mountain from either the Toyama side or the Nagano side. The best part is transferring between six different vehicles, including the ropeway and cable car. The view of the Tateyama mountain range from Murododaira is spectacular.","season":"Mid-April to June (Snowy Otani), October (Autumn foliage)","access":"Approximately 1 hour from Toyama Station to Tateyama Station by Toyama Chitetsu"},"御射鹿池":{"name":"Mishaka Pond","desc":"A tranquil pond located on a plateau in Okutateshina, Nagano Prefecture. The fantastic landscape of trees reflected in the water is a model for Kaii Higashiyama's paintings.","detail":"Although it is an agricultural reservoir, it has become popular for its mysterious beauty. It's especially beautiful early in the morning when the morning mist rolls in, and October is the best time to visit when the leaves turn red. It's also fun to drive around Tateshina Kogen.","season":"May to November (Autumn leaves in October are the best)","access":"Approximately 40 minutes by bus or car from Chino Station"},"天橋立":{"name":"Amanohashidate","desc":"One of the three most scenic views of Japan. A sand spit with a total length of 3.6 km crosses Miyazu Bay. If you look at it through the ``crotch peek'', it looks like a bridge spanning the sky.","detail":"The best way to see it is from the observation decks of Kasamatsu Park and Amanohashidate View Land. It feels great to cross the pine tree-lined promenade by bicycle or on foot. I would also like to visit the funaya in Ine on the opposite shore.","season":"All year round (spring and autumn are especially beautiful)","access":"Approximately 1 hour and 40 minutes by limited express from Kyoto Station, get off at Amanohashidate Station"},"竹田城跡":{"name":"Takeda castle ruins","desc":"A phantom castle ruin floating in a sea of clouds. One of the most spectacular scenic spots in Japan, also known as ``Japan's Machu Picchu.''","detail":"In the early mornings of autumn and winter, when there is a difference in temperature, a sea of clouds spreads out below, and the ruins of the castle emerge. The view from the Ritsuunkyo Observation Deck on the opposite bank is especially famous.","season":"September to November (sea of clouds) early morning around 5 to 8 a.m.","access":"40 minutes walk from JR San'in Main Line \"Takeda Station\" or use shuttle bus"},"曽爾高原":{"name":"Soni Plateau","desc":"A field of pampas grass spreads out all over. The golden waves illuminated by the setting sun are a sight to behold.","detail":"In autumn (October to November), the pampas grass all glows golden, captivating visitors. The view from Kameyama Pass is especially famous. It is recommended to visit at dusk.","season":"October to November (best time to see pampas grass)","access":"Approximately 35 minutes by bus from Kintetsu Osaka Line \"Haibara Station\""},"熊野古道":{"name":"Kumano Kodo","desc":"An ancient pilgrimage route registered as a World Heritage Site. A mysterious forest road with moss-covered stone pavement and cedar groves.","detail":"There are multiple routes including Iseji and Nakahechi. The route from Daimonzaka to Kumano Nachi Taisha is the most popular. Nachi Falls (one of Japan's three most famous waterfalls) is also a must-see.","season":"All year round (easy to walk in spring and autumn)","access":"Access by bus from Kii-Tanabe Station/Shingu Station"},"鳥取砂丘":{"name":"Tottori Sand Dunes","desc":"Japan's largest sand dune. The majestic sand dunes with the Sea of ​​Japan in the background have an otherworldly feel, almost like a desert.","detail":"Trekking through the 47m high sand dunes. The view of the Sea of ​​Japan from the ridge called Uma-no-se is spectacular. Camel rides and sand museums are also popular.","season":"All year round","access":"Approximately 20 minutes by bus from Tottori Station"},"角島大橋":{"name":"Tsunoshima Ohashi Bridge","desc":"A 1780m bridge spanning the emerald green sea. One of Japan's most scenic driving spots.","detail":"A bridge that connects the mainland of Yamaguchi Prefecture and Tsunoshima. The color of the sea seen from the middle of the bridge is as beautiful as a tropical country. It is also famous as a filming location for commercials and movies. I would also like to visit Tsunoshima Lighthouse.","season":"All year round (the color of the sea is the best on clear skies)","access":"Approximately 15 minutes by car from JR San'in Main Line \"Tokugyu Station\""},"尾道・千光寺公園":{"name":"Onomichi/Senkoji Park","desc":"A famous cherry blossom viewing spot on the mountainside of the hill town of Onomichi. The view of Onomichi Channel and the Seto Inland Sea spreading out below is spectacular.","detail":"The view from the observation deck on the Mt. Senkoji Ropeway is famous. The ``movie town'' is popular as a sacred place for movies, and you can enjoy strolling through old temples and alleys. It is also famous as a cat spot.","season":"All year round (the cherry blossoms from late March to April are especially famous)","access":"Within walking distance from Onomichi Station on the JR Sanyo Main Line"},"四万十川":{"name":"Shimanto River","desc":"Japan's last clear stream. The original scenery of the Shimanto River, dotted with submerged bridges, is so beautiful that it can be said to be the origin of the Japanese spirit.","detail":"There are bridges without handrails all over the river, such as the nationally famous Sada Submerged Bridge. It is also recommended to experience the clear stream by canoeing or cycling. Gourmet foods such as sweetfish and wild eel are also exquisite.","season":"All year round (particularly beautiful in May when the fresh greenery blooms and from October to November in autumn)","access":"Route bus or rental car from JR Dosan Line \"Kubogawa Station\""},"祖谷のかずら橋":{"name":"Iya Kazura Bridge","desc":"An unexplored suspension bridge made of Shirakuchikazura. The combination of the bridge bed where you can see your feet and the deep ravine is thrilling.","detail":"Kazura Bridge spans a deep gorge with a length of 45m. A traditional bridge that is rebuilt every three years. There are many unexplored sightseeing spots nearby, such as the Manneken Pis statue and the Heike mansion.","season":"All year round","access":"Approximately 40 minutes by bus from Oboke Station"},"父母ヶ浜":{"name":"Chichibugahama","desc":"``Japan's Uyuni Salt Flat'' becomes a mirror of the sky at low tide. A fantastic view of the sunset sky reflected in a puddle.","detail":"The best conditions are when low tide coincides with dusk. Check the low tide time on the tide graph before visiting. On windless days, you can enjoy a perfect mirror surface.","season":"March to October (low tide around sunset)","access":"Approximately 10 minutes by taxi from Takuma Station"},"しまなみ海道":{"name":"Shimanami Kaido","desc":"A route with a series of bridges connecting the islands of Seto Inland Sea. It is famous as one of the world's highest cycling roads.","detail":"Multiple bridges span the approximately 70km route connecting Imabari and Onomichi. The views from Kurushima Kaikyo Bridge and Tatara Bridge are exceptional. The best way to enjoy leisurely touring the island by bicycle.","season":"All year round (spring and autumn cycling is especially recommended)","access":"Accessible from both sides of Onomichi Station and Imabari Station"},"阿蘇山":{"name":"Mt. Aso","desc":"The world's largest caldera. You will be overwhelmed by the majestic scale of the active volcano and vast grasslands.","detail":"The main attractions are the Nakadake crater (admission is restricted depending on the eruption situation), Daikanbo, and Kusasenrigahama. Inside Aso Kuju National Park. Horse meat dishes and Aso beef are also famous.","season":"Year-round (Entry to the crater depends on the eruption alert level)","access":"Approximately 20 minutes by car from JR Toyohi Main Line \"Aso Station\""},"屋久島（縄文杉）":{"name":"Yakushima (Jomon cedar)","desc":"A world natural heritage island where Jomon cedar trees, estimated to be several thousand to 7,200 years old, are buried. The moss-covered primeval forest is a different world.","detail":"The round trip to Jomon Cedar is about 22km and 10 hours of authentic trekking. There are many ways to enjoy the area, including Shiratani Unsuikyo and Okawa Falls. You can also encounter endemic species such as Yaku deer and Yaku monkey.","season":"March to May/October to November (Jomon Cedar Trekking)","access":"35 minutes by plane or about 2 hours by high-speed boat from Kagoshima Airport"},"高千穂峡":{"name":"Takachiho Gorge","desc":"A valley made of basalt columnar joints created by Aso's volcanic activity. A spectacular view of Manai Falls falling into the emerald green depths.","detail":"The Manai Falls (17m high) seen from the boat is an impressive sight. The view from the top of the bridge is also spectacular. It is also dotted with mythical places such as Takachiho Shrine and Amanoiwato Shrine.","season":"All year round (October to November are especially beautiful during the autumn leaves)","access":"Approximately 1 hour 20 minutes by bus from Nobeoka Station"},"宮古島・砂山ビーチ":{"name":"Miyakojima/Sunayama Beach","desc":"Emerald blue sea with outstanding clarity. The sandstone arch, white sand, and coral reef make this a tropical paradise.","detail":"The clear waters surrounded by coral reefs are perfect for snorkeling. One of the most beautiful beaches in Okinawa. The color of the sea, called Miyako Blue, fascinates those who see it.","season":"April to October (easy swimming)","access":"Approximately 15 minutes by car from Miyako Airport"},"竹富島":{"name":"Taketomi Island","desc":"A small remote island surrounded by coral reefs. The traditional village of red tiles and white sand conveys the original scenery of Okinawa.","detail":"It is customary to stroll around the village while riding in a water buffalo cart. The blue waters of Star Sand Beach (Kaiji Beach) and Kondoi Beach are also must-sees. 10 minutes by ferry from Ishigaki Island.","season":"All year round (March to May and September to November are comfortable)","access":"Approximately 10-15 minutes by ferry from Ishigaki Port"},"青い池":{"name":"blue pond","desc":"A mysterious cobalt blue pond in Biei town. The fantastic scenery of dead trees standing underwater has also been adopted as Apple's wallpaper.","detail":"An accidental product of Tokachidake eruption prevention work. Aluminum ions in the water create the blue color. The illumination at night is also fantastic and popular. The color changes depending on the season and weather.","season":"All year round (winter illumination is also a must-see)","access":"Approximately 20 minutes by car from Biei Station"},"神威岬":{"name":"Cape Kamui","desc":"A cape with steep cliffs that stretches to the tip of the Shakotan Peninsula. The emerald green Shakotan blue sea and rough reefs are spectacular.","detail":"Walk along the Charenka path (approximately 1km one way) to the tip of the cape. The view of the ocean with Kamuiiwa Rock rising above it is one of the most spectacular views in Hokkaido. Sea urchin is a specialty and the best time to eat it is from June to August.","season":"Late April to November (closed in winter)","access":"Approximately 1 hour and 20 minutes by car from Otaru Station"},"洞爺湖":{"name":"Lake Toya","desc":"A caldera lake created by an eruption about 110,000 years ago. A spectacular view of Nakajima floating on the surface of the lake, Mt. Usu, and Mt. Showa-Shinzan.","detail":"It is a rare tourist destination where fireworks displays are held every night from late April to the end of October. Hot spring inns line the shore of the lake, and it is famous as Toyako Onsen. Inside Shikotsu-Toya National Park.","season":"All year round (fireworks from late April to end of October)","access":"Approximately 15 minutes by bus from JR Muroran Main Line \"Toya Station\""},"浄土ヶ浜":{"name":"Jodogahama Beach","desc":"Iwate Prefecture's spectacular coastline is like a paradise, with white rhyolite forming a forest on the coast. A scenic spot representing Sanriku.","detail":"The contrast between the white reef and the emerald green sea is beautiful. You can also go to the sea cave \"Blue Cave\" by sightseeing boat. The experience of feeding black-tailed gulls is also popular.","season":"All year round (you can enjoy swimming in the sea from May to September)","access":"About 10 minutes by bus from Miyako Station"},"五色沼":{"name":"Goshikinuma","desc":"A group of colorful lakes created by the eruption of Mt. Bandai. The lake, which varies in color from cobalt blue to jade, stretches for about 4km.","detail":"There are swamps of various colors, such as Bishamon-numa, Akanuma-numa, Midoronuma-numa, Ryunuma-numa, and Benten-numa. You can walk around it on the promenade in about an hour. The autumn leaves season is especially beautiful.","season":"May to November (October is especially spectacular with autumn leaves)","access":"Approximately 35 minutes by bus from Inawashiro Station"},"山寺（立石寺）":{"name":"Yamadera (Tateishokuji)","desc":"A sacred mountain site founded in 860. It is famous for its spectacular view of the Yamagata Basin that spreads out at the top of the 1,015 stone steps, and for Matsuo Basho's poem, ``The quietness and the sound of cicadas that penetrate the rocks.''","detail":"The temple complex that clings to the rock wall is a sight to behold. The view from Godaido Hall is especially wonderful. We recommend climbing in the silence of the early morning. The autumn leaves and snowy scenery are also beautiful.","season":"All year round (Autumn leaves from October to November and snow from January to February are magical)","access":"5 minutes walk from JR Senzan Line \"Yamadera Station\""},"袋田の滝":{"name":"Fukuroda Falls","desc":"One of the three famous waterfalls in Japan. A spectacular view of Ibaraki Prefecture, where a large waterfall measuring 120m high and 73m wide falls in four steps. The icefall in winter is also spectacular.","detail":"It is also called the ``Four Waterfalls'' and is characterized by the way it falls in four parts. In winter, you may see an icefall where the entire waterfall is frozen. The view from the waterfall tunnel is also impressive.","season":"All year round (November for autumn leaves and January to February for icefall are especially popular)","access":"10 minutes by bus or 25 minutes walk from Fukuroda Station on the JR Suigun Line"},"五箇山（相倉集落）":{"name":"Gokayama (Ainokura village)","desc":"A gassho-zukuri village that is a World Heritage Site along with Shirakawa-go. You can enjoy the unspoiled scenery tucked away in the mountains more quietly than in Shirakawa-go.","detail":"There are fewer tourists than Shirakawa-go, and you can enjoy the Gassho-style architecture in a calm atmosphere. At the guest house, you can also enjoy local cuisine such as Gokayama tofu. The snowy scenery in winter is especially beautiful.","season":"All year round (the snowy scenery in winter is spectacular)","access":"Approximately 1 hour and 20 minutes by Kaetsuno bus from Takaoka Station"},"兼六園":{"name":"Kenrokuen","desc":"One of Japan's three famous gardens. Kaga Hyakumangoku Daimyo Garden. Beautiful throughout the seasons with snow-covered winter scenery, plum blossoms, cherry blossoms, and autumn leaves.","detail":"A famous garden that combines the ``Six Victories'' (largeness, elegance, human power, ancient times, water springs, and views). I would like to visit it together with the adjacent Kanazawa Castle Park. It is also illuminated at night.","season":"All year round (Yukitsuri in February and plum blossoms in spring are especially famous)","access":"Approximately 20 minutes by bus from Kanazawa Station"},"奥飛騨温泉郷":{"name":"Okuhida Onsenkyo","desc":"One of the largest open-air bath areas in Japan, located at the foot of the Northern Alps. A hidden hot spring area where you can enjoy spectacular mountain views and hot springs.","detail":"Shinhotaka Onsen has Japan's only two-story ropeway, and you can enjoy a 360-degree panoramic view of the Northern Alps from the observation deck at an altitude of 2,156 meters.","season":"All year round (scenic views of snowy open air in winter and lingering snow in spring)","access":"Approximately 1 hour and 10 minutes by bus from Takayama Station"},"嵐山（竹林の道）":{"name":"Arashiyama (bamboo forest road)","desc":"A path through a lush bamboo forest in Arashiyama, Kyoto, stretches toward the sky. The sound and light of bamboo swaying in the wind creates a fantastic space.","detail":"Early in the morning, there are fewer people and you can enjoy a magical atmosphere. There are many famous places in the surrounding area, such as Togetsukyo Bridge, Tenryuji Temple, and Nonomiya Shrine. Arashiyama has spectacular views of cherry blossoms in spring and autumn leaves.","season":"All year round (early morning is recommended)","access":"5 minutes walk from Randen “Arashiyama Station” or Hankyu “Arashiyama Station”"},"吉野山":{"name":"Yoshinoyama","desc":"Japan's best cherry blossom viewing spot, with approximately 30,000 cherry trees covering the entire mountain. A spectacular spring view that has been registered as a World Heritage Site.","detail":"The cherry blossoms bloom in stages due to the difference in elevation: Shimo-Senbon, Naka-Senbon, Kami-Senbon, and Oku-Senbon. There are many historical buildings such as Zao-do Hall and Kinpusen-ji Temple. The autumn leaves are also beautiful.","season":"Early to mid-April (cherry blossoms), November (autumn leaves)","access":"Ropeway or walk from Kintetsu Yoshino Line \"Yoshino Station\""},"伊勢神宮":{"name":"Ise Shrine","desc":"Japan's most sacred place. The Naiku and Geku shrines undergo Shikinen Sengu every 20 years. The mysterious atmosphere of Iseji is the spiritual home of the Japanese people.","detail":"Eating around Okage Yokocho is also popular. The view of the clear stream of Isuzu River from Uji Bridge is especially beautiful. Visiting the shrine early in the morning allows you to enjoy the quiet and solemn atmosphere.","season":"All year round (New Year's Day is the busiest time)","access":"5 minutes by bus from Kintetsu \"Ujiyamada Station\" or \"Isuzugawa Station\""},"高野山":{"name":"Koyasan","desc":"A sacred place of the Shingon sect founded by Kukai. The religious city on top of a mountain at an altitude of 1000m and Okunoin Temple in a grove of cedar trees have a tranquil atmosphere in another world.","detail":"The approach to Okunoin is about 2km long and lined with gravestones of military commanders. The lodging experience and vegetarian cuisine are also popular. Participating in early morning gongyo was also a profound experience. The snowy scenery in winter is especially magical.","season":"All year round (October with autumn leaves and winter with snow are especially mysterious)","access":"Cable car + bus from Nankai Koya Line \"Koyasan Station\""},"琵琶湖":{"name":"Lake Biwa","desc":"Japan's largest lake. It is an ancient lake with a history of over 4 million years, and is dotted with spectacular views on and along the lake, including Chikubu Island and Shirahige Shrine.","detail":"Shirahige Shrine, which has a torii gate in the middle of the lake, is also known as ``Omi's Itsukushima.'' The power spot on Chikubu Island is also popular. It shows various expressions depending on the time of day, such as evening scenery and morning mist.","season":"All year round","access":"Accessible from JR Biwako Line stations"},"宮島・厳島神社":{"name":"Miyajima / Itsukushima Shrine","desc":"The vermilion-painted large torii gate floating in the sea is one of the most iconic views of Japan. A sacred island that is one of Japan's three most scenic views and a World Heritage Site.","detail":"At high tide, the shrine building appears to be floating on the sea, giving it a fantastical appearance. At low tide, you can walk to the Otorii gate. The great torii gate colored by the setting sun is a particularly picturesque view. Miyajima's wild deer are also a specialty.","season":"All year round (visit during low tide)","access":"Approximately 10 minutes by ferry from JR Sanyo Main Line \"Miyajimaguchi Station\""},"出雲大社":{"name":"Izumo Taisha Shrine","desc":"One of the oldest shrines in Japan that enshrines Okuninushi Okami, the god of marriage. Japan's largest shimenawa and a mysterious sacred area.","detail":"It is a sacred place where gods from all over the country gather in October of the lunar calendar. The 6m tall large shimenawa rope is a sight to behold. You'll also want to visit the surrounding area to see the spectacular views of Inasa Beach and Hinosaki Lighthouse.","season":"All year round (October month of the lunar calendar is especially mysterious)","access":"5 minutes walk from Ichibata Railway “Izumo Taisha-mae Station”"},"大歩危峡":{"name":"Oboke Gorge","desc":"A V-shaped gorge with a length of approximately 8km carved by the Yoshino River. The beautiful gorge lined with strangely shaped white and green rocks is a scenic spot in Tsurugiyama Quasi-National Park.","detail":"The rock walls seen from the sightseeing boat passing through the valley are spectacular. The fresh greenery in spring and the colored leaves in autumn are especially beautiful. It is recommended to visit it together with the nearby Koboke Gorge. It is also a base for accessing Iya Kazurabashi Bridge.","season":"All year round (October to November is the best time for autumn leaves)","access":"Immediately after getting off at Oboke Station on the JR Dosan Line"},"室戸岬":{"name":"Cape Muroto","desc":"A cape that juts out into the Pacific Ocean in Kochi Prefecture. A sacred place with rugged rocks and cliffs, famous as the place where Kukai trained.","detail":"Certified as a UNESCO Global Geopark. It is also full of geological highlights such as rock dykes and columnar joints. The view from the lighthouse is a spectacular view of the Pacific Ocean.","season":"All year round","access":"Approximately 2 hours and 30 minutes by bus from Kochi Station"},"九十九島":{"name":"Kujukushima","desc":"208 islands scattered off the coast of Sasebo City, Nagasaki Prefecture. The density of islands is the highest in Japan, and the scenery of the island's shadow dyed by the setting sun is exquisite.","detail":"The view from Tenkaiho/Ishidake Observation Deck is especially famous. Riding a sightseeing boat from Pearl Sea Resort and weaving through the islands is also popular. It is also a production area for oysters and pearls.","season":"All year round (the sunsets are especially beautiful in autumn and winter)","access":"Approximately 20 minutes by car from Sasebo Station"},"霧島連山":{"name":"Kirishima mountain range","desc":"A scenic area in southern Kyushu where Kirishima Shrine and a group of volcanoes coexist. The view from the summit of Mt. Karakuni and the peak of Takachiho are magnificent.","detail":"Kirishima is said to be the place where the descendants of the gods descended, and is the setting of myths. Kirishima Onsenkyo is one of the oldest hot springs in Japan. On the pond tour course, you can also enjoy volcanic lakes and Rokukannon Oike.","season":"All year round (spring's Japanese aquarium is famous)","access":"Approximately 25 minutes by bus from Kirishima-Jingu Station"},"古宇利島":{"name":"Kouri Island","desc":"A spectacular view of the Kouri Ohashi Bridge spanning the northern part of Okinawa's main island and the emerald green sea. It is famous as the \"Island of Love\".","detail":"Once you cross the bridge, you will see a beautiful beach with white sand and coral reef. Heart Rock is popular as a love power spot. The view of the ocean from the top of the bridge is spectacular.","season":"April to October (sea clarity is particularly high)","access":"Approximately 2 hours by car from Naha Airport"},"慶良間諸島":{"name":"Kerama Islands","desc":"A group of remote islands about 30 to 50 minutes by boat from Naha. The sea boasts one of the clearest waters in the world and is called ``Kerama Blue.''","detail":"The colorful corals and sea turtles you can see while snorkeling and diving are spectacular. Winter (January to March) is also popular when you can see humpback whales. Zamami Island and Aka Island are especially famous.","season":"All year round (whale watching in winter, marine sports from spring to autumn)","access":"Approximately 50 minutes to 2 hours by ferry from Naha/Tomari Port"},"西表島":{"name":"Iriomote Island","desc":"The \"Galapagos of the East\" has the largest mangrove forest in Japan. An unexplored subtropical region where the Iriomote wildcat lives.","detail":"Canoe trekking to Pinaisara Falls (Okinawa's largest waterfall) is popular. The Nakama River mangrove cruise is also a must-see. It has been certified as a World Natural Heritage Site (registered in 2021).","season":"All year round (March to June and October to November are comfortable)","access":"Approximately 35-50 minutes by ferry from Ishigaki Port"},"支笏湖":{"name":"Lake Shikotsu","desc":"Japan's northernmost frozen lake. The transparency of this mysterious cobalt blue lake is one of the highest in Japan, and you can see all the way to the bottom.","detail":"You can observe the rocks at the bottom of the lake while crossing the lake in a canoe or kayak. At the Lake Shikotsu Ice Festival in winter, countless ice objects create a fantastic sight.","season":"Year-round (winter Ice Festival from late January to February)","access":"Approximately 40 minutes by car from New Chitose Airport"},"大沼国定公園":{"name":"Onuma Quasi-National Park","desc":"A group of lakes and marshes dotted with 126 large and small islands with Mt. Komagatake in the background. The view of Mt. Komagatake reflected in the lake and the autumn leaves is spectacular.","detail":"There are also plenty of activities such as cycling, canoeing, and fishing. In winter, you can also enjoy skating and smelt fishing. It is easily accessible from Hakodate and is perfect for day trips.","season":"All year round (the autumn leaves in October are especially beautiful)","access":"5 minutes walk from JR Hakodate Main Line \"Onuma Koen Station\""},"層雲峡":{"name":"Sounkyo","desc":"A 24km long gorge with steep cliffs carved by the Ishikari River in Daisetsuzan National Park. The rock walls with columnar joints and the Meteor/Galaxy Falls are spectacular.","detail":"Take the ropeway + lift to Kurodake 5th and 7th stations. The autumn leaves (from late September) are especially beautiful, and the winter Icefall Festival is also famous. There are also plenty of hot spring towns.","season":"All year round (late September to October for autumn leaves and winter icefalls are especially popular)","access":"Approximately 2 hours by bus from Asahikawa Station"},"礼文島・桃岩展望台":{"name":"Rebun Island/Momoiwa Observation Deck","desc":"Japan's northernmost floating island of flowers. The alpine plants blooming near the coast, combined with the spectacular view of Rishiri Fuji, create a heavenly view.","detail":"Because Rebun Island has a low altitude, alpine plants bloom nearby. On the Momoiwa Observation Deck course, you can enjoy the magnificent scenery of Rishiri Island and Rebun Island and the flower fields at the same time.","season":"May to August (flower season)","access":"Approximately 2 hours by ferry from Wakkanai Port"},"ニセコ・羊蹄山":{"name":"Niseko/Mt. Yotei","desc":"A sacred place for ski resorts in Japan. The quality of the powder snow is among the best in the world. In summer, the rural scenery with Mt. Yotei in the background is spectacular.","detail":"Mt. Yotei is an elegant stratovolcano also known as \"Ezo Fuji.\" The view from the fields and farms at the foot of the mountain is a majestic view typical of Hokkaido. Summer mountain climbing (approximately 8 hours round trip) is also popular.","season":"Winter (skiing)/Summer (climbing/cycling)","access":"Approximately 15 minutes by car from Kutchan Station"},"角館・武家屋敷と桜":{"name":"Kakunodate samurai residence and cherry blossoms","desc":"A castle town called the Little Kyoto of Tohoku. A spectacular spring scene created by weeping cherry blossoms and blackboard walls along the samurai residence.","detail":"It is especially famous in spring (late April to early May), when approximately 400 weeping cherry trees decorate Samurai Residence Street. Selected as an important preservation district for groups of traditional buildings. The autumn leaves are also beautiful.","season":"Late April to early May (cherry blossoms), October to November (autumn leaves)","access":"15-20 minutes walk from JR Akita Shinkansen \"Kakunodate Station\""},"十和田湖":{"name":"Lake Towada","desc":"A double caldera lake and the largest highland lake in Japan. The autumn leaves of the primeval forest surrounding the lake and the view from the Okura Peninsula are spectacular.","detail":"The source of Oirase Stream. You can enjoy sightseeing boats and lakeside hiking. The Mikura Peninsula, where Towada Shrine is located, has a mysterious atmosphere. In winter, it becomes a fantastic scenery covered in snow.","season":"October to November (autumn leaves) is the best","access":"Approximately 2 hours by bus from JR Hachinohe Line \"Hachinohe Station\""},"龍泉洞":{"name":"Ryusendo Cave","desc":"A limestone cave with one of the world's clearest underground lakes. The depth of the lake, which shines in cobalt blue, is 120 meters.","detail":"A hidden gem in Iwate that is said to be one of the three largest limestone caves in the world. The deeper the underground lake is, the more beautiful the blue color becomes. The temperature inside the cave is around 10 degrees Celsius throughout the year, and it is cool in summer.","season":"All year round","access":"Approximately 2 hours by bus from Morioka Station"},"猊鼻渓":{"name":"Geibikei Gorge","desc":"A beautiful gorge carved into the limestone by the Satetsu River. Enjoy the cliffs and greenery on both banks as you go down the boat, controlled by the boatman with a single rod.","detail":"The famous boat ride is a round trip of approximately 2km. The sound of \"Geibi Oiwake\" sung by the boatman echoes throughout the valley. The autumn leaves and winter snowscapes are also spectacular.","season":"All year round (the autumn leaves in November and the snow in January and February are magical)","access":"5 minutes walk from Geibikei Station on the JR Ofunato Line"},"象潟（きさかた）":{"name":"Kisakata","desc":"Akita's coast was once considered a scenic spot on a par with Matsushima. After the earthquake, the area turned into land, creating a unique and spectacular view of the countryside, with an island floating in the midst of the rice fields.","detail":"The place that Matsuo Basho visited in “Oku no Hosomichi”. Today, the trees of Kemanji Temple stand out like an island in the rice fields with Mt. Chokai in the background, creating a unique landscape. It is also famous as a sunset spot.","season":"June to August (rice fields shine green)","access":"20 minutes walk from JR Uetsu Main Line \"Kokugata Station\""},"鎌倉・長谷寺":{"name":"Kamakura/Hasedera Temple","desc":"An ancient temple standing on a hill overlooking the sea. It is famous as a famous spot for hydrangeas, and during the rainy season, the precincts are decorated with 2,500 hydrangeas.","detail":"The principal image is the Eleven-faced Kannon Bodhisattva, one of the largest wooden statues in Japan. From the observation deck, you can see a panoramic view of Sagami Bay and Yuigahama. The autumn leaves in November and the plum blossoms in spring are also beautiful.","season":"June (hydrangeas) and November (autumn leaves) are especially famous.","access":"5 minutes walk from Enoden “Hase Station”"},"日光東照宮":{"name":"Nikko Toshogu Shrine","desc":"A magnificent group of shrine buildings dedicated to Tokugawa Ieyasu. A world heritage site famous for the Three Monkeys and the Sleeping Cat: ``See no evil, speak no evil, hear no evil.''","detail":"Yomeimon (Higurashimon) is a masterpiece that brings together the best of Edo decorative art. Registered as a World Heritage Site as a shrine and temple in Nikko. Visit the nearby Nikko Futarasan Shrine and Rinnoji Temple.","season":"All year round (spring cherry blossoms and autumn leaves are especially beautiful)","access":"Approximately 20 minutes on foot or bus from JR Nikko Line \"Nikko Station\""},"草津温泉・湯畑":{"name":"Kusatsu Onsen/Yubatake","desc":"One of the three famous springs in Japan. The Yubatake that spreads out in the center is a spectacular sight with more than 4,000 liters of hot spring gushing out every minute.","detail":"The hot spring town centered around Yubatake has an elegant atmosphere, and the Yumomi show is also popular. This famous hot spring has been around since the Edo period, and its unique acidic spring quality is said to be effective against many illnesses. The combination of winter snowy scenery and hot springs is exquisite.","season":"All year round (Yukimi Onsen in winter is especially popular)","access":"Approximately 1 hour by bus from Karuizawa, Shibukawa, Naganohara Kusatsuguchi Station, etc."},"那須高原":{"name":"Nasu plateau","desc":"A highland resort with Mt. Nasu in the background. You can enjoy the fumarole of Mt. Chausu, seasonal flower fields, autumn leaves, and skiing all year round.","detail":"Take the Nasu Ropeway to the vicinity of the summit of Mt. Chausudake. The Sesshoseki fumarole is also a highlight. The plateau is also full of tourist facilities such as museums, ranches, and outlet stores.","season":"Year-round (Autumn leaves from October to November are especially popular)","access":"Approximately 50 minutes by bus from Kuroiso Station on the JR Tohoku Main Line"},"昇仙峡":{"name":"Shosenkyo","desc":"Yamanashi's gorge is said to be the most beautiful gorge in Japan. The valley with its series of strangely shaped rocks and the spectacular 30m Sengataki waterfall are spectacular.","detail":"A course of approximately 5km that features unique terrain such as Senga Falls, Kakuenbo, and Sekimon. It is also famous as a production area for crystals and gemstones, and there are many jewelry shops. The autumn leaves are especially spectacular.","season":"All year round (Autumn leaves are best from October to November)","access":"Approximately 40 minutes by bus from Kofu Station"},"富士山・スバルライン五合目":{"name":"Mt. Fuji/Subaru Line 5th station","desc":"A scenic spot that can be accessed by car to the 5th station of Mt. Fuji. When you step out above the sea of ​​clouds, you will be greeted with a view of another world.","detail":"At an altitude of 2305m, you can experience the sea of clouds and the peak of Mt. Fuji up close. It is also the starting point for mountain climbing, and is extremely crowded during the climbing season from July to August. There is a period when private cars are restricted.","season":"July-August (climbing) and the sea of clouds in fall and winter are also popular.","access":"Fuji Subaru Line from Kawaguchiko Station (Bus during private car restriction periods)"},"能登半島・白米千枚田":{"name":"Noto Peninsula/White Rice Senmaida","desc":"A breathtaking landscape of 1,004 rice terraces spread out on a steep slope facing the Sea of Japan. It is famous for its original Japanese scenery and illumination, ``Aze no Kirameki.''","detail":"From October to March, ``Aze no Kirameki'' is held, where approximately 25,000 LED lights decorate the rice terraces. Selected as one of Japan's top 100 rice terraces. The contrast between the sunset and the rice terraces is also exquisite.","season":"All year round (LED light up from October to March is popular)","access":"Approximately 1 hour and 30 minutes by car from Kanazawa Station"},"妻籠宿":{"name":"Tsumago-juku","desc":"A spectacular view of Nagano where the post town of Nakasendo remains almost intact. A streetscape of stone pavements and old folk houses that will make you feel like you have traveled back in time to the Edo period.","detail":"The first post town in Japan to preserve its townscape. It is impressive that there are no telephone poles and the landscape has been thoroughly preserved. The 8km hike to neighboring Magome-juku (Gifu Prefecture) is also popular.","season":"All year round (spring cherry blossoms and autumn leaves are especially beautiful)","access":"Approximately 10 minutes by bus from JR Chuo Main Line \"Nagiso Station\""},"奥大井湖上駅":{"name":"Okuoikojo Station","desc":"A hidden station located at the tip of a peninsula that juts out into a dam lake. The Abt-style railway and the spectacular view of the lake create a fantastic scenery.","detail":"You can walk on the ``Rainbow Bridge,'' a railway bridge leading to the station that appears to be floating on Lake Chiku. The surrounding area is an unexplored area of ​​the Oigawa Railway with hiking trails.","season":"All year round (the autumn leaves are especially spectacular from October to November)","access":"Get off at Oigawa Railway Igawa Line \"Okuoikojo Station\""},"天竜峡":{"name":"Tenryu Gorge","desc":"A valley created by the Tenryu River carving out the Southern Alps. Also known as the ``Japan Line,'' it is a beautiful stretch of cliffs and mountain streams.","detail":"The famous sightseeing boat ride down the line. The cherry blossoms in spring and the autumn leaves are especially beautiful, and the beauty of the valley changes throughout the seasons. Tenryukyo Onsen is also nearby, so you can enjoy a day trip to the hot springs.","season":"All year round (Autumn leaves are best from October to November)","access":"5 minutes walk from JR Iida Line \"Tenryukyo Station\""},"馬籠宿":{"name":"Magome-juku","desc":"A post town on the 69th station of the Nakasendo. This is the birthplace of Toson Shimazaki, a picturesque post town located on a mountain slope where cobblestone pavements and watermills remain.","detail":"Walking over the mountain pass (approximately 8 km) between Tsumago-juku and Tsumago-juku is popular. The view from Magome Pass on the way is also wonderful. You can also learn about the history in depth at the Fujimura Memorial Museum.","season":"All year round (April for cherry blossoms, October to November for autumn leaves)","access":"Approximately 30 minutes by bus from JR Chuo Main Line \"Nakatsugawa Station\""},"貴船神社":{"name":"Kibune Shrine","desc":"A shrine dedicated to the god of water, located deep in the mountains of Kyoto. It is famous for its green approach, fantastic stone steps lined with lantern
