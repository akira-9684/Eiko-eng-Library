s, and summer riverside cuisine.","detail":"The winter snowy scenery and lanterns lit up are a fantastic beauty. Floating on the surface of the water in June is also popular. The path along the river from Eizan Electric Railway's Kibuneguchi station is also picturesque.","season":"All year round (the autumn leaves in November and the snow in January and February are especially magical)","access":"Approximately 20 minutes walk from Eizan Electric Railway “Kibuneguchi Station”"},"大台ヶ原":{"name":"Odaigahara","desc":"Japan's rainiest area with annual rainfall exceeding 5000mm. A fantastic world heritage mountain shrouded in virgin forest, moss, and fog.","detail":"On clear days, Mt. Fuji can sometimes be seen from the summit of Mt. Hidegatake (altitude 1,695 m). The Todaidai course (approximately 8km) can be walked by families. It is also a habitat for sika deer.","season":"May to November (fresh greenery in spring, colored leaves in autumn)","access":"Approximately 1 hour by bus or car from Yamatokamiichi Station or Odaimachi"},"城崎温泉":{"name":"Kinosaki Onsen","desc":"A hot spring town in the mountains near the Sea of Japan. One of the best hot spring resorts in Kansai where you can enjoy touring the atmospheric outdoor baths lined with willow trees and flowing streams.","detail":"The famous ``outdoor bath tour'' where you walk around the seven outdoor baths in a yukata. It is also a place loved by Shigeru Mizuki, the creator of GeGeGe no Kitaro. Matsuba crab (snow crab from the Sea of ​​Japan) in winter is also exquisite.","season":"All year round (crab season from November to March and snowy scenery in winter are also popular)","access":"Right next to Kinosaki Onsen Station on the JR Sanin Main Line"},"奈良・東大寺と春日大社":{"name":"Nara, Todaiji Temple and Kasuga Taisha Shrine","desc":"A world heritage site, the Great Buddha and a vast park. An ancient capital with a spectacular view unlike any other in the world, where 1,300 wild deer coexist with humans.","detail":"The world's largest wooden structure, the Great Buddha Hall of Todaiji Temple and the Great Buddha in Nara are a sight to behold. The cherry blossoms in spring and the autumn leaves in autumn, together with the deer, create a picturesque scenery. The view of the Nara Basin from Mt. Wakakusa is also a must-see.","season":"All year round","access":"Walk or city bus from Kintetsu Nara Station/JR Nara Station"},"帝釈峡":{"name":"Taishaku Gorge","desc":"The largest valley national park in the Chugoku region. A spectacular view created by the valley carved out of limestone and the natural stone bridge \"Obashi\".","detail":"Obashi Bridge is one of the largest natural stone bridges in the world (90m wide and 40m high). The sheer cliffs seen from a pleasure boat sailing along the Taishaku River are impressive. The autumn leaves season is especially beautiful.","season":"All year round (the autumn leaves in November are the best)","access":"Approximately 30 minutes by car from JR Fukuen Line \"Bingo-Ochiai Station\""},"蒜山高原":{"name":"Hiruzen Plateau","desc":"An exhilarating plateau that stretches out against the backdrop of Hiruzen Sanza, the highest peak in the Chugoku Mountains. The idyllic scenery of Jersey cows grazing is picturesque.","detail":"One of the best summer resorts in the Chugoku region. You can also enjoy cycling and horseback riding around the Hiruzen Kogen Center. Hiruzen yakisoba is a famous gourmet dish. The cosmos fields in autumn are also popular.","season":"All year round (driving from spring to autumn is especially pleasant)","access":"Approximately 10 minutes by car from Yonago Expressway Hiruzen IC"},"秋吉台・秋芳洞":{"name":"Akiyoshidai/Akiyoshido","desc":"Japan's largest karst plateau and Japan's largest limestone cave. A white dome-shaped grassland created by limestone and an underground temple.","detail":"Akiyoshidai is a karst plateau where coral reefs appeared on the ground about 3 million years ago. The unique scenery of the field turning pitch black due to the burning that takes place every spring and then returning to a green plateau is a must-see.","season":"All year round (the fresh greenery in March after burning is especially beautiful)","access":"Approximately 45 minutes by bus from Shin-Yamaguchi Station/Yamaguchi Station"},"津和野":{"name":"Tsuwano","desc":"A small castle town in Shimane called the Little Kyoto of the San'in region. The countless colored carp swimming in the cave and the white-walled storehouse are beautiful.","detail":"The Senbon Torii of Taikodani Inari Shrine is especially famous. The Sagi Mai Shinto ritual (UNESCO Intangible Cultural Heritage) held in May is also a highlight. Access on the SL Yamaguchi is also a journey-filled experience.","season":"All year round (cherry blossoms, carp, autumn leaves and seasonal scenery)","access":"Right next to Tsuwano Station on the JR Yamaguchi Line"},"仁淀川":{"name":"Niyodo River","desc":"A clear stream in Kochi Prefecture that has recorded the highest water quality in Japan (according to a survey by the Ministry of Land, Infrastructure, Transport and Tourism). A blue color with excellent transparency called \"Niyodo Blue\".","detail":"There are several scenic spots dotted around the area, including Yasui Valley and Nikobuchi, which are said to be the river's jewel box. You can also enjoy canoeing and playing in the river. Two major clear streams in Kochi, along with the Shimanto River.","season":"All year round (Summer river play and autumn leaves are especially popular)","access":"Approximately 1 to 2 hours by car from Kochi Station (depending on the spot)"},"足摺岬":{"name":"Cape Ashizuri","desc":"The southernmost cape of Kochi Prefecture jutting out into the Pacific Ocean. A picturesque view of the Kuroshio ocean and lighthouse overlooking the cliff.","detail":"The white Cape Ashizuri Lighthouse is one of the largest lighthouses in Japan. You can enjoy magnificent views of the Pacific Ocean from the surrounding promenade. It is also a place associated with John Manjiro.","season":"All year round (warm and easy to visit even in winter)","access":"Approximately 3 to 4 hours by bus from Kochi Station/Sukumo Station"},"道後温泉":{"name":"Dogo Onsen","desc":"A famous hot spring in Matsuyama that is said to be the oldest hot spring in Japan. Its symbol is the historic hot spring tower that appears in Natsume Soseki's ``Botchan.''","detail":"Dogo Onsen Main Building is a historical building built in 1899 (currently under renovation and partially open). There are plenty of shopping streets in the area, and it's fun to eat while walking around. I would like to visit it together with Matsuyama Castle.","season":"All year round","access":"About 15 minutes by streetcar from JR Matsuyama Station, get off at \"Dogo Onsen\""},"鳴門の渦潮":{"name":"whirlpools of naruto","desc":"One of the world's three major tidal currents, whirlpools with a maximum diameter of 30 meters occur in the Naruto Strait, making it a natural spectacle.","detail":"You can look down on the whirlpools from the glass promenade \"Uzu no Michi\" on Onaruto Bridge. The experience of observing whirlpools from a short distance from a pleasure boat is also popular. Check the tide table and aim for the spring tide when you visit.","season":"All year round (the largest whirlpools occur during spring and autumn spring tides)","access":"Approximately 20 minutes by bus from JR Naruto Line \"Naruto Station\""},"指宿・砂むし温泉":{"name":"Ibusuki / Sand bath hot spring","desc":"``Sand Bath'' is a natural hot spring on the sandy beaches of Kagoshima that warms your entire body, including the sand. A unique natural health experience in the world.","detail":"Hot springs gush out in the sand, and a unique bathing method involves lying on top of the hot springs and having sand sprinkled over them. Popular for its high detox effect. The view of Mt. Kaimondake is also beautiful.","season":"All year round","access":"Approximately 15 minutes walk from Ibusuki Station on the JR Ibusuki Makurazaki Line"},"軍艦島（端島）":{"name":"Gunkanjima (Hashima)","desc":"A ruined island off the coast of Nagasaki. At its peak, it was a coal mining island that boasted the highest population density in the world, and now ruins, a World Heritage Site, float on the sea.","detail":"The unique ruined landscape that has become the model for games and movies has attracted worldwide attention. You can tour the island by sightseeing boat + landing tour (subject to cancellation due to weather).","season":"All year round (cannot land in case of stormy weather)","access":"Approximately 40 minutes by pleasure boat from Nagasaki Port (reservation required)"},"由布院温泉":{"name":"Yufuin Onsen","desc":"A popular hot spring area in Oita Prefecture with Mt. Yufu in the background. It is synonymous with the spectacular view of the morning mist over the lake and Mt. Yufu.","detail":"Hot springs gush out from the bottom of Lake Kinrinko, and in the early morning, a magical mist hangs in the air. Strolling along Yunotsubo Kaido, which is lined with stylish cafes and general stores, is also popular.","season":"All year round (the early morning mist at Lake Kinrinko is the most magical)","access":"Immediately after getting off at Yufuin Station on the JR Kyudai Main Line"},"天草・崎津集落":{"name":"Amakusa/Sakitsu village","desc":"A fishing village designated as a World Heritage Site with a history of oppression against Christians. A unique and spectacular view of the Gothic-style Sakitsu Cathedral towering over the sea.","detail":"Sakitsu Cathedral, famous as the Sea Cathedral, is a rare church built in a fishing village. The contrast between the building facing the sea and the sunset is beautiful. The surrounding Amakusa Sea is also beautiful and blue.","season":"All year round","access":"Approximately 2 hours and 30 minutes by car from Kumamoto Station"},"雲仙地獄":{"name":"Unzen hell","desc":"A geothermal area that spreads around Unzen Onsen in Nagasaki Prefecture. A strange and fantastic sight with fumarole and hot springs gushing out from all over the ground.","detail":"There are over 30 hells scattered around, including Daishoukan Jigoku and Oito Jigoku. The Edo period was also a place of oppression against Christians. Unzen Onsen is Japan's first hot spring area designated as a national park.","season":"All year round","access":"Approximately 1 hour and 10 minutes by bus from JR Nagasaki Main Line \"Isahaya Station\""},"波照間島":{"name":"Hateruma Island","desc":"Japan's southernmost inhabited island. The cobalt blue sea ``Hateruma Blue'' and starry sky are said to be the most beautiful in Japan.","detail":"There is almost no light pollution, so the number of stars in the night sky is overwhelming. It is also known as the only place in Japan where you can see the Southern Cross. The clarity of the sea at Nishihama is among the highest in Japan.","season":"March to June (observation of the Southern Cross and the beautiful sea)","access":"Approximately 1 hour by ferry from Ishigaki Port"},"ハテの浜（久米島）":{"name":"Hatenohama (Kumejima)","desc":"An uninhabited sandbar floating off the coast of Kumejima. The emerald green sea is surrounded by only white sand, making it truly a \"heavenly sea.\"","detail":"30 minutes by boat from Kumejima. An overwhelming view of only the sandy beach and the emerald sea. You can even meet sea turtles while snorkeling. Visits are basically done on day tours.","season":"April to October (the sea is the most beautiful)","access":"About 20 minutes by car + 30 minutes by boat from Kumejima Airport"},"与那国島":{"name":"Yonaguni Island","desc":"Japan's westernmost island. It is located approximately 111 km from Taiwan and is world-famous as a diving spot where giant hammerhead sharks gather.","detail":"In winter (January to March), divers from all over the world visit this diving spot where you can encounter schools of hammerhead sharks. There are also underwater ruins.","season":"All year round (shark diving in winter, spectacular sea view in summer)","access":"Approximately 1 hour by plane from Naha Airport (via Ishigaki)"},"長瀞（ながとろ）":{"name":"Nagatoro","desc":"A valley in Saitama Prefecture that was carved out of crystalline schist by the Arakawa River. A spectacular scenic spot in the Kanto area famous for the Rhine Kudari and pink rock pavement.","detail":"You can experience the beauty of the rock-paved valley by going down the rafting line. Iwadatami is a rare landform that has been designated as a natural monument. It is also a famous spot for the autumn leaves and cherry blossoms in the spring.","season":"Year-round (Cherry blossoms in March, autumn leaves in November, and rafting in summer are popular)","access":"5 minutes walk from Chichibu Railway Nagatoro Station"},"天橋立・伊根の舟屋":{"name":"Amanohashidate/Ine Funaya","desc":"Japan's only maritime village. Fishermen's houses that have been around since the Edo period are lined up on the water's edge, and the first floor is a garage for ships.","detail":"Ine Bay is lined with about 230 boathouses, making it look like the houses are floating on the sea. The best way to see it is from a sightseeing boat, and it is also popular to stay in a guesthouse and enjoy fisherman's cuisine.","season":"All year round","access":"Approximately 30 minutes by bus from Amanohashidate Station"},"別府温泉・地獄めぐり":{"name":"Beppu Onsen/Hell Tour","desc":"A unique \"hell\" that springs up in Beppu, which boasts the highest number of hot springs in Japan. There are 7 different types to enjoy, including the cobalt blue sea hell and the red blood pond hell.","detail":"The famous ``Jigoku Meguri'' tour, which takes you to seven hot springs that have been set up as a tourist hell. There are plenty of unique hot spring experiences such as footbaths overlooking Beppu Bay and steamed dishes.","season":"All year round","access":"Approximately 20 minutes by bus from JR Nippo Main Line \"Beppu Station\""},"平尾台":{"name":"Hiraodai","desc":"Kyushu's largest karst plateau spreads out on the outskirts of Kitakyushu City. A unique and spectacular view with limestone peaks dotting the grassland that resemble flocks of sheep.","detail":"A karst plateau that is representative of western Japan, along with Akiyoshidai. A limestone cave (Senbutsu Limestone Cave) is also nearby. The contrast between the fresh greenery and the rocky peaks after the spring field burning is especially beautiful.","season":"All year round (field burning in March and fresh greenery in May are especially beautiful)","access":"Approximately 40 minutes by car from JR Nippo Main Line \"Kokura Station\""}},"zh-TW":{"美瑛の丘":{"name":"美瑛之丘","desc":"一片錯落有致的田野分佈在起伏的山丘上。北海道最美麗的景點之一，每個季節都有完全不同的景色。","detail":"附近還有青池、望岳台等許多景點。夏天薰衣草和向日葵盛開，秋天金色的麥田蔓延開來。特別推薦清晨駕車前往。","season":"五月至十月","access":"從JR富良野線「美瑛站」開車10分鐘"},"富良野ラベンダー畑":{"name":"富良野薰衣草田","desc":"代表北海道的壯麗景色。每年七月，薰衣草田都會變成紫色，蔚為壯觀。","detail":"富田農場最有名，除了薰衣草之外，還有各式各樣的花田。薰衣草冰淇淋和香味產品等紀念品也很受歡迎。","season":"7月上旬至下旬（最佳觀賞時間）","access":"從JR富良野線「中富良野站」步行20分鐘或開車5分鐘"},"知床五湖":{"name":"知床五湖","desc":"世界自然遺產知床周圍分佈著五個神秘的湖泊。未受破壞的自然環境，棕熊也生活在那裡。","detail":"知床連峰倒映在湖中的壯麗景色。有兩條路線：高架木板路（免費）和地面長廊（需導覽）。有關棕熊目擊事件的資訊必須事先確認。","season":"4月下旬至11月初","access":"從女滿別機場開車約 2 小時"},"摩周湖":{"name":"摩週湖","desc":"擁有日本最清澈的水的神秘湖。因霧氣繚繞的奇幻景色而被稱為「霧摩週湖」。","detail":"它是一個火山口湖，沒有流入或流出的河流，擁有世界上最清澈的水域之一。觀景台的景色非常獨特。在陽光明媚的日子裡，它呈現出令人驚嘆的鈷藍色。","season":"5月至10月（全年皆宜）","access":"從JR釷網本線「摩週站」開車20分鐘"},"宗谷岬":{"name":"宗谷岬","desc":"日本的最北端。遼闊的鄂霍次克海和宗谷海峽的壯麗景色，讓您彷彿置身於日本的盡頭。","detail":"如果天氣好的話，你甚至可以看到薩哈林島。在最北的紀念碑前拍紀念照是標準做法。週邊地區還有豆谷山 (Soya Hills) 圓山的田園風光。","season":"全年（冬季有時可以看到流冰）","access":"從稚內站搭乘巴士約 55 分鐘"},"奥入瀬渓流":{"name":"奧入瀨溪流","desc":"從十和田湖流出的全長14公里的山溪。東北風景最優美的球場之一，擁有長滿青苔的岩石和無數的瀑布。","detail":"該地區散佈著銫子大瀑布等各種大小的瀑布，並設有步道。尤其是五月的綠葉和十月的紅葉，景色特別美麗。我們建議您在搭乘巴士時悠閒地散步。","season":"五月（新綠）和十月（秋葉）最好","access":"從 JR 八戶線「八戶站」搭乘巴士約 2 小時"},"蔵王の樹氷":{"name":"藏王的霜樹","desc":"雪怪是只在冬天才出現的巨大冰怪。夢幻般的銀色世界，真是個異世界。","detail":"青森冷杉的冰雪所創造的自然藝術。乘坐藏王索道到達山頂。到了晚上，它會被燈光照亮，營造出一種神奇的氛圍。","season":"一月底至三月初","access":"從山型車站搭乘藏王索道巴士約 40 分鐘"},"松島":{"name":"松島","desc":"日本三大風景之一。 260多個島嶼被松樹環繞，漂浮在海灣中。連松尾芭蕉都曾描寫過的壯麗景色。","detail":"搭乘觀光船跳島遊是常態。這裡有瑞嚴寺等許多歷史悠久的神社和寺廟，您可以同時欣賞歷史和壯麗的景色。生蠔是特產，還有很多美食。","season":"一年四季（春季櫻花和秋季紅葉特別受歡迎）","access":"從JR仙石線「松島海岸站」步行5分鐘"},"富士山（河口湖）":{"name":"富士山（河口湖）","desc":"日本符號。倒映在湖面上的富士山景色十分壯觀，吸引了來自世界各地的攝影師。","detail":"從河口湖看富士山的景色尤其美麗，早晨的富士山倒映是必看的。大石公園的薰衣草與富士山的合作也風景如畫。忍野八海也在附近，遊覽很方便。","season":"一年四季（尤其是深秋到春天白雪覆蓋時美麗）","access":"從富士急行線「河口湖站」搭乘巴士或步行"},"日光いろは坂":{"name":"伊呂波坂日光","desc":"48個彎的山路。每到紅葉季節，整座山都變得火熱起來，駕車路線十分壯觀。","detail":"第一個伊呂波坂（下坡）和第二個伊呂波坂（上坡）的單路。從明智平山的上部，可以搭乘索道，欣賞男體山和中禪寺湖的壯麗景色。","season":"10月中旬～11月上旬（紅葉）","access":"從 JR 日光線「日光站」搭乘巴士約 40 分鐘"},"尾瀬ヶ原":{"name":"尾瀨原","desc":"本州最大的高層濕地。在臭菘季節，濕地開滿了白色的花朵，呈現出奇妙的景象。","detail":"尤其是五月下旬至六月期間的臭菘和九月至十月期間的秋葉而聞名。這裡有一條維護良好的木板路，方便健行。私家車有限制，需使用接駁車。","season":"5月至6月（臭甘藍）、9月至10月（草秋葉）","access":"從會津高原尾瀨口站、沼田站等搭乘巴士"},"上高地":{"name":"上高地","desc":"北阿爾卑斯山腳下延伸的冰川山谷。以穗高山脈為背景的梓川景色堪稱日本第一山景。","detail":"尤其是從河童橋上眺望穗高連峰的景色很有名。有大正池、明神池等許多景點。私家車有限制，請搭乘接駁車或計程車進山。","season":"4月下旬至11月中旬（冬季休息）","access":"從松本IC出發約1小時。將車停放在澤渡並換乘巴士"},"白川郷":{"name":"白川鄉","desc":"聯合國教科文組織世界遺產。風景如畫的山村，擁有陡峭的合掌造房屋和雪景。","detail":"冬日的雪景和夜晚的燈光更是神奇，吸引世界各地的遊客。還有合掌式旅館，您可以入住古老的私人住宅，為您帶來獨特的體驗。","season":"全年（12月至2月雪景蔚為壯觀）","access":"從高山站、金澤站等搭乘巴士約 50 至 75 分鐘。"},"立山黒部アルペンルート":{"name":"立山黑部阿爾卑斯山脈路線","desc":"一條貫穿海拔3000m山脊線的山地觀光路線。春天的“雪之大谷”，可以在20m高的雪牆之間行走。","detail":"您可以從富山一側或長野一側進入山。最好的部分是在六種不同的車輛之間換乘，包括索道和纜車。從室堂平眺望立山連峰的景色非常壯觀。","season":"4月中旬～6月（雪大谷）、10月（紅葉）","access":"從富山站搭乘富山地鐵到立山站約 1 小時"},"御射鹿池":{"name":"三沙卡池","desc":"位於長野縣奧館科高原上的寧靜池塘。倒映在水中的樹木的奇妙景觀是東山魁夷畫作的典範。","detail":"雖然是農業水庫，卻因其神秘的美麗而受到人們的喜愛。清晨晨霧繚繞時尤其美麗，十月樹葉變紅時正是遊覽的最佳時間。開車遊覽蓼科高原也很有趣。","season":"5月～11月（10月紅葉最佳）","access":"從茅野站搭乘巴士或開車約 40 分鐘"},"天橋立":{"name":"天橋高架","desc":"日本三大風景之一。全長3.6公里的沙嘴橫跨宮津灣。如果從「胯下窺視」來看，它就像一座橫跨天空的橋。","detail":"觀賞它的最佳方式是從笠松公園和天橋立觀景台的觀景台。騎自行車或步行穿過松樹成蔭的長廊感覺很棒。我還想去對岸伊根的船屋看看。","season":"一年四季（春季和秋季尤其美麗）","access":"從京都站搭乘特急約1小時40分鐘，在天橋立站下車"},"竹田城跡":{"name":"竹田城遺址","desc":"一座漂浮在雲海中的幻影城堡廢墟。日本最壯觀的風景區之一，也被稱為“日本的馬丘比丘”。","detail":"秋冬的清晨，溫差大時，下方會鋪開一片雲海，城堡的廢墟就會浮現出來。尤其是對岸的立雲峽展望台的景色很有名。","season":"9月至11月（雲海）清晨5點至8點左右","access":"從JR山陰本線「竹田站」步行40分鐘或搭乘接駁巴士"},"曽爾高原":{"name":"索尼高原","desc":"一片蒲葦地舖展開來。夕陽映照下的金色波浪，蔚為壯觀。","detail":"秋季（10月至11月），蒲葦泛著金黃的光芒，吸引遊客。尤其是龜山峠的景色很有名。建議黃昏時前往。","season":"10月至11月（觀賞蒲葦的最佳時間）","access":"從近鐵大阪線「灰原站」搭乘巴士約 35 分鐘"},"熊野古道":{"name":"熊野古道","desc":"被登錄為世界遺產的古代朝聖之路。一條神秘的森林道路，有長滿青苔的石板路和雪松樹林。","detail":"有伊勢路、中邊等多條路線。從大門坂到熊野那智大社的路線是最受歡迎的。那智瀑布（日本三大瀑布之一）也是必去之處。","season":"一年四季（春秋兩季方便行走）","access":"從紀伊田邊站/新宮站搭乘巴士前往"},"鳥取砂丘":{"name":"鳥取沙丘","desc":"日本最大的沙丘。以日本海為背景的雄偉沙丘有一種超凡脫俗的感覺，幾乎就像沙漠一樣。","detail":"徒步穿越47m高的沙丘。從被稱為馬之瀨的山脊上眺望日本海的景色非常壯觀。騎駱駝和沙博物館也很受歡迎。","season":"全年","access":"從鳥取站搭乘巴士約 20 分鐘"},"角島大橋":{"name":"角島大橋","desc":"一座全長1780公尺的大橋，橫跨翠綠色的大海。日本風景最美的駕車地點之一。","detail":"連接山口縣本土和角島的橋樑。從橋中間看到的海水顏色就像熱帶國家一樣美麗。它也以廣告和電影的拍攝地而聞名。我還想去角島燈塔參觀。","season":"全年（晴朗的天空下海水的顏色最好）","access":"從 JR 山陰本線「德牛站」開車約 15 分鐘"},"尾道・千光寺公園":{"name":"尾道/千光寺公園","desc":"位於山城尾道山腰的著名賞櫻勝地。尾道海峽和下面展開的瀨戶內海的景色非常壯觀。","detail":"千光寺山纜車的展望台的景色非常有名。 「電影小鎮」作為電影聖地而廣受歡迎，您可以在古老的寺廟和小巷中享受漫步的樂趣。這裡也以貓的聚集地而聞名。","season":"一年四季（3月下旬至4月的櫻花尤其有名）","access":"從 JR 山陽本線尾道站步行即可到達"},"四万十川":{"name":"四萬十川","desc":"日本最後的清流。四萬十川的原始風光，水下橋樑星羅棋布，美不勝收，可以說是日本精神的起源。","detail":"河上到處都是沒有扶手的橋樑，例如全國著名的薩達水下橋。也建議劃獨木舟或騎自行車體驗清澈的溪流。香魚、野生鰻魚等美食也都很精緻。","season":"全年（特別是五月新綠盛開的季節和十月至十一月秋季的美景）","access":"從JR土贊線「久保川站」搭乘巴士或租車"},"祖谷のかずら橋":{"name":"祖谷葛橋","desc":"一座未開發的由白口葛製成的吊橋。看得見腳的橋床與深谷的結合令人驚心動魄。","detail":"葛橋橫跨深谷，全長45m。一座每三年重建一次的傳統橋樑。附近還有許多未開發的觀光景點，例如撒尿小童雕像和平家宅邸。","season":"全年","access":"從大步危站搭乘巴士約 40 分鐘"},"父母ヶ浜":{"name":"父母濱","desc":"「日本的烏尤尼鹽灘」在退潮時變成了天空的鏡子。日落天空倒映在水坑裡的美妙景色。","detail":"最好的條件是退潮和黃昏同時發生。參觀前請先查看潮汐圖上的退潮時間。在無風的日子裡，您可以享受完美的鏡面。","season":"三月至十月（日落前後退潮）","access":"從琢磨站搭乘計程車約 10 分鐘"},"しまなみ海道":{"name":"島波海道","desc":"連接瀨戶內海島嶼的一系列橋樑的路線。它被譽為世界上最高的自行車道之一。","detail":"多座橋樑橫跨連接今治和尾道的約 70 公里路線。來島海峽大橋和多多羅大橋的景色非常獨特。騎自行車悠閒遊覽島嶼的最佳方式。","season":"全年（特別建議春季和秋季騎行）","access":"從尾道站、今治站兩側均可到達"},"阿蘇山":{"name":"阿蘇山","desc":"世界上最大的火山口。您將會被活火山的雄偉規模和廣闊的草原所震撼。","detail":"主要景點有中岳火山口（依噴發情況限制入場）、大觀峰、草千里濱。阿蘇九重國立公園內。馬肉菜餚和阿蘇牛肉也很有名。","season":"全年（進入火山口取決於噴發警報等級）","access":"從 JR 豐日本線「阿蘇站」開車約 20 分鐘"},"屋久島（縄文杉）":{"name":"屋久島（繩文杉）","desc":"世界自然遺產島嶼，埋藏著估計有數千年至 7,200 年歷史的繩文杉樹。苔蘚覆蓋的原始森林是另一個世界。","detail":"繩文雪松往返約22公里，正宗徒步10小時。遊覽該地區的方式有很多，包括白谷雲水峽和大川瀑布。您也可以邂逅屋久鹿、屋久猴等特有物種。","season":"3月～5月/10月～11月（繩文雪松健行）","access":"從鹿兒島機場搭飛機約35分鐘，搭乘高速船約2小時"},"高千穂峡":{"name":"高千穂峽","desc":"由阿蘇火山活動形成的玄武岩柱狀節理所構成的山谷。馬奈瀑布落入翠綠深處的壯觀景色。","detail":"從船上看到的馬奈瀑布（17m高）的景色令人印象深刻。從橋頂看到的景色也很壯觀。這裡也散佈著高千穗神社、天岩戶神社等神話之地。","season":"全年（10月至11月紅葉時期尤其美麗）","access":"從延岡站搭乘巴士約 1 小時 20 分鐘"},"宮古島・砂山ビーチ":{"name":"宮古島/砂山海灘","desc":"翡翠藍色的大海，清澈見底。砂岩拱門、白色沙灘和珊瑚礁使這裡成為熱帶天堂。","detail":"珊瑚礁環繞的清澈海水非常適合浮潛。沖繩最美麗的海灘之一。大海的顏色被稱為“宮古藍”，讓看到它的人著迷。","season":"四月至十月（輕鬆游泳）","access":"從宮古機場開車約 15 分鐘"},"竹富島":{"name":"竹富島","desc":"一個被珊瑚礁包圍的偏遠小島。紅瓦白沙的傳統村落，傳達沖繩的原始風光。","detail":"人們習慣乘坐水牛車在村莊裡漫步。星沙灘（凱地海灘）和孔多伊海灘的碧藍海水也是必去之處。從石垣島搭乘渡輪10分鐘。","season":"全年（3月至5月、9月至11月較為舒適）","access":"從石垣港搭乘渡輪約 10 至 15 分鐘"},"青い池":{"name":"藍色池塘","desc":"美瑛町的神秘鈷藍色池塘。水下枯樹的奇幻景色也被採用作為蘋果的壁紙。","detail":"十勝岳噴發預防工作的偶然產物。水中的鋁離子產生藍色。夜間的燈光秀也很夢幻，很受歡迎。顏色會根據季節和天氣而變化。","season":"全年無休（冬季燈飾也不容錯過）","access":"從美瑛站開車約 20 分鐘"},"神威岬":{"name":"神威岬","desc":"一直延伸至積丹半島尖端的陡峭海角。翠綠的積丹藍的海和波濤洶湧的礁石蔚為壯觀。","detail":"沿著Charenka小徑（單程約1公里）步行至海角頂端。大海與神岩岩聳立的景色是北海道最壯觀的景色之一。海膽是特產，最佳食用時間是六月到八月。","season":"4月下旬至11月（冬季關閉）","access":"從小樽站開車約 1 小時 20 分鐘"},"洞爺湖":{"name":"洞爺湖","desc":"大約 11 萬年前的火山爆發形成的火山口湖。浮在湖上的中島、有珠山、昭和新山的壯麗景色。","detail":"4月下旬至10月底每晚都會舉辦煙火表演，是難得的旅遊景點。湖畔溫泉旅館鱗次櫛比，以洞爺湖溫泉聞名。支笏洞爺國立公園內。","season":"全年（4月下旬至10月下旬煙火表演）","access":"從 JR 室蘭本線「洞爺站」搭乘巴士約 15 分鐘"},"浄土ヶ浜":{"name":"淨土濱海灘","desc":"岩手縣壯觀的海岸線猶如世外桃源，白色的流紋岩在海岸上形成森林。三陸的代表性風景名勝。","detail":"白色的礁石和翠綠的海形成鮮明的對比，非常美麗。還可以搭乘觀光船前往海蝕洞「藍洞」。餵黑尾鷗的體驗也很受歡迎。","season":"全年（5月至9月可享受海裡游泳的樂趣）","access":"從宮古站搭乘巴士約10分鐘"},"五色沼":{"name":"五色沼","desc":"由磐梯山噴發而形成的色彩繽紛的湖泊群。湖水的顏色從鈷藍色到翡翠色不等，綿延約 4 公里。","detail":"有毗沙門沼、赤沼、綠沼、龍沼、弁天沼等各種顏色的沼澤。沿著長廊走一圈大約一個小時。秋天的紅葉季節尤其美麗。","season":"5 月至 11 月（10 月尤其美麗，有紅葉）","access":"從豬苗代站搭乘巴士約 35 分鐘"},"山寺（立石寺）":{"name":"山寺（立石寺）","desc":"始建於 860 年的神山。以在 1,015 級石階頂部展開的山形盆地的壯麗景色以及松尾芭蕉的詩句“寂靜和蟬聲穿透岩石”而聞名。","detail":"依附在岩壁上的寺廟建築群令人嘆為觀止。尤其是五大道的景色非常美麗。我們建議在清晨的寂靜中攀登。秋天的紅葉和雪景也很美。","season":"全年（10 月至 11 月的紅葉和 1 月至 2 月的雪是神奇的）","access":"從JR仙山線「山寺站」步行5分鐘"},"袋田の滝":{"name":"袋田瀑布","desc":"日本三大名瀑布之一。高 120m、寬 73m 的大瀑布分四級落下，是茨城縣的壯麗景色。冬天的冰瀑布也很壯觀。","detail":"它也被稱為“四個瀑布”，其特點是瀑布分為四個部分。冬天，您可能會看到整個瀑布結冰的冰瀑布。瀑布隧道的景色也令人印象深刻。","season":"全年（11 月的紅葉和 1 月至 2 月的冰瀑布尤其受歡迎）","access":"從JR水郡線袋田站搭乘巴士10分鐘或步行25分鐘"},"五箇山（相倉集落）":{"name":"五箇山（相倉村）","desc":"與白川鄉一起被列為世界遺產的合掌造村落。與白川鄉相比，您可以更安靜地欣賞隱藏在山中的原始風景。","detail":"遊客比白川鄉少，可以在平靜的氛圍中欣賞合掌式的建築。在旅館內，您還可以享用五箇山豆腐等當地美食。冬天的雪景尤其美麗。","season":"一年四季（冬季雪景蔚為壯觀）","access":"從高岡車站搭乘加越野巴士約 1 小時 20 分鐘"},"兼六園":{"name":"兼六園","desc":"日本三大名園之一。加賀百萬石大名庭園。冬天的雪景、梅花、櫻花、秋天的紅葉，一年四季都很美。","detail":"集「六勝」（大、雅、人力、古、水、景）為一體的名園。我想和鄰近的金澤城公園一起參觀。晚上也有燈光。","season":"一年四季（尤其是二月的雪釣和春天的梅花）","access":"從金澤站搭乘巴士約 20 分鐘"},"奥飛騨温泉郷":{"name":"奧飛驒溫泉鄉","desc":"日本最大的露天浴場之一，位於北阿爾卑斯山腳下。隱密的溫泉區，可欣賞壯麗的山景和溫泉。","detail":"新穗高溫泉擁有日本唯一的兩層索道，在海拔2156公尺的展望台上可以360度欣賞北阿爾卑斯山全景。","season":"一年四季（冬季露天雪景、春季殘雪美景）","access":"從高山站搭乘巴士約 1 小時 10 分鐘"},"嵐山（竹林の道）":{"name":"嵐山（竹林路）","desc":"京都嵐山的一條小路穿過茂密的竹林，一直延伸到天空。竹子隨風搖曳的聲光營造出夢幻的空間。","detail":"清晨，人少，可以享受神奇的氛圍。週邊有渡月橋、天龍寺、野宮神社等許多著名景點。嵐山春季櫻花盛開，秋季紅葉絢麗。","season":"全年（建議清晨）","access":"從嵐電「嵐山站」或阪急「嵐山站」步行5分鐘"},"吉野山":{"name":"吉野山","desc":"日本第一的賞櫻勝地，整座山約有3萬棵櫻花樹。被登入為世界遺產的絕美泉景。","detail":"櫻花因海拔差異而分階段綻放：下千本、中千本、上千本、奧千本。這裡有藏王堂、金峰山寺等許多歷史建築。秋天的紅葉也很美。","season":"4月上旬～中旬（櫻花）、11月（紅葉）","access":"從近鐵吉野線「吉野站」搭乘索道或步行"},"伊勢神宮":{"name":"伊勢神宮","desc":"日本最神聖的地方。內宮神社和外宮神社每 20 年舉行一次式年遷宮。神秘氣氛的伊勢路是日本人民的精神家園。","detail":"禦影橫丁附近的飲食也很受歡迎。從宇治橋上眺望五十鈴川的清流景色尤為美麗。清晨參拜神社，可以感受寧靜、莊嚴的氣氛。","season":"全年（元旦最忙）","access":"從近鐵「宇治山田站」或「五十鈴川站」搭乘巴士5分鐘"},"高野山":{"name":"高野山","desc":"空海創立的真言宗的聖地。海拔1000m山頂的宗教之城和杉樹林中的奧之院，有著異世界的寧靜氛圍。","detail":"通往奧之院的道路長約2公里，兩旁排列著軍事指揮官的墓碑。住宿體驗和素食也很受歡迎。參加清晨的工行也是一次深刻的經驗。冬天的雪景尤其神奇。","season":"一年四季（十月秋葉，冬季白雪尤為神秘）","access":"從南海高野線「高野山站」搭乘纜車+巴士"},"琵琶湖":{"name":"琵琶湖","desc":"日本最大的湖。這是一個擁有超過 400 萬年歷史的古老湖泊，湖上和沿岸散佈著壯觀的景色，包括竹生島和白須神社。","detail":"位於湖中央的白須神社也被稱為「近江的嚴島」。竹分島上的能量景點也很受歡迎。根據一天中的時間不同，它會呈現出不同的表情，例如傍晚的景色和晨霧。","season":"全年","access":"從 JR 琵琶湖線車站可前往"},"宮島・厳島神社":{"name":"宮島/嚴島神社","desc":"漂浮在海上的朱紅色大鳥居是日本最具代表性的景觀之一。日本三大風景之一、世界遺產的聖島。","detail":"漲潮時，神社建築就像漂浮在海面上一樣，給人一種夢幻般的感覺。退潮時，可以步行到大鳥居。夕陽映照下的大鳥居景色特別美麗。宮島的野鹿也是特產。","season":"全年（退潮時參觀）","access":"從 JR 山陽本線「宮島口站」搭乘渡輪約 10 分鐘"},"出雲大社":{"name":"出雲大社","desc":"日本最古老的神社之一，供奉姻緣之神「大國主大神」。日本最大的注繩，神秘的聖地。","detail":"是農曆十月全國諸神聚集的聖地。 6m高的大注連繩非常引人注目。您還可以遊覽週邊地區，欣賞稻佐海灘和日野崎燈塔的壯麗景色。","season":"一年四季（農曆十月尤其神秘）","access":"從一畑鐵道「出雲大社前站」步行5分鐘"},"大歩危峡":{"name":"大步危峽谷","desc":"由吉野川沖刷而成的全長約8公里的V字型峽谷。美麗的峽谷兩旁奇形怪狀的白色和綠色岩石是劍山國定公園的風景區。","detail":"從穿過山谷的觀光船上看到的岩壁非常壯觀。春天的新綠和秋天的紅葉尤其美麗。建議與附近的小步危峽谷一起遊覽。這裡也是通往祖谷葛橋的據點。","season":"全年（10月至11月是賞紅葉的最佳時期）","access":"JR土贊線大步危站下車即到"},"室戸岬":{"name":"室戶岬","desc":"高知縣伸入太平洋的海角。一個有著崎嶇岩石和懸崖的聖地，以空海修行的地方而聞名。","detail":"被聯合國教科文組織認證為世界地質公園。這裡也充滿了岩脈、柱狀節理等地質亮點。從燈塔上眺望，太平洋的壯麗景色盡收眼底。","season":"全年","access":"從高知站搭乘巴士約 2 小時 30 分鐘"},"九十九島":{"name":"九十九島","desc":"長崎縣佐世保市沿岸分佈 208 個島嶼。島嶼密度為日本之最，夕陽染下的島影景色絕美。","detail":"尤其是天海峰/石岳展望台的景色很有名。從珍珠海度假村乘坐觀光船穿梭於島嶼之間也很受歡迎。這裡也是牡蠣和珍珠的產區。","season":"一年四季（秋冬日落尤其美麗）","access":"從佐世保站開車約 20 分鐘"},"霧島連山":{"name":"霧島山脈","desc":"霧島神社和火山群共存的九州南部風景區。從唐國山頂和高千穗山頂眺望的景色非常壯麗。","detail":"霧島據說是眾神的後裔降臨的地方，也是神話的發生地。霧島溫泉鄉是日本最古老的溫泉之一。在池塘遊覽路線上，您還可以欣賞火山湖和六觀音禦池。","season":"一年四季（春天的日本水族館很有名）","access":"從霧島神宮站搭乘巴士約 25 分鐘"},"古宇利島":{"name":"古宇利島","desc":"橫跨沖繩本島北部的古宇利大橋和翠綠的大海的壯麗景色。被譽為「愛情之島」。","detail":"過了橋，你會看到美麗的海灘，有白色的沙灘和珊瑚礁。 Heart Rock 作為愛情能量點而頗受歡迎。從橋的頂部看到的大海景色非常壯觀。","season":"4月至10月（海水透明度特別高）","access":"從那霸機場開車約 2 小時"},"慶良間諸島":{"name":"慶良間諸島","desc":"從那霸乘船約30～50分鐘的離島群。這片海域擁有世界上最清澈的海水之一，被稱為「慶良間藍」。","detail":"浮潛和潛水時可以看到色彩繽紛的珊瑚和海龜，非常壯觀。冬季（一月至三月）也是觀賞座頭鯨的熱門季節。座間味島和阿嘉島尤其有名。","season":"全年（冬季賞鯨，春季至秋季海上運動）","access":"從那霸/泊港搭乘渡輪約 50 分鐘至 2 小時"},"西表島":{"name":"西表島","desc":"「東方的加拉巴哥」擁有日本最大的紅樹林。西表野貓居住的未開發的亞熱帶地區。","detail":"乘坐獨木舟徒步前往皮奈薩拉瀑布（沖繩最大的瀑布）很受歡迎。中間川紅樹林巡遊也是必看的項目。已被認證為世界自然遺產（2021年登記）。","season":"全年（3月至6月、10月至11月較為舒適）","access":"從石垣港搭乘渡輪約 35 至 50 分鐘"},"支笏湖":{"name":"支笏湖","desc":"日本最北端的結冰湖。這個神秘的鈷藍色湖泊的透明度是日本最高的之一，您可以一直看到湖底。","detail":"乘坐獨木舟或皮划艇穿越湖面時，您可以觀察湖底的岩石。在冬季的支笏湖冰雪節上，無數的冰雕營造出夢幻般的景象。","season":"全年（一月下旬至二月冬季冰雪節）","access":"從新千歲機場開車約 40 分鐘"},"大沼国定公園":{"name":"大沼國定公園","desc":"以駒嶽山為背景，散佈著大小126座島嶼的湖泊沼澤群。駒岳倒映在湖中的景色和秋天的紅葉非常壯觀。","detail":"還有許多活動，如騎自行車、獨木舟和釣魚。冬季，您還可以享受滑冰和西太公魚釣魚的樂趣。從函館出發交通便利，非常適合一日遊。","season":"一年四季（十月的紅葉尤其美麗）","access":"從JR函館本線「大沼公園站」步行5分鐘"},"層雲峡":{"name":"層雲峽","desc":"大雪山國立公園內的石漾川長 24 公里的峽谷，陡峭的懸崖。具有柱狀節理的岩壁和流星/銀河瀑布非常壯觀。","detail":"搭乘索道+電梯到黑岳五、七站。秋天的紅葉（從9月下旬開始）尤其美麗，冬季的冰瀑布節也很有名。還有很多溫泉小鎮。","season":"全年（9月下旬至10月的紅葉和冬季冰瀑布尤其受歡迎）","access":"從旭川站搭乘巴士約 2 小時"},"礼文島・桃岩展望台":{"name":"禮文島/桃岩展望台","desc":"日本最北端的花浮島。海岸附近盛開的高山植物與利尻富士的壯麗景色相結合，營造出天堂般的景色。","detail":"由於禮文島海拔較低，附近高山植物盛開。在桃岩展望台路線上，您可以同時欣賞利尻島和禮文島的壯麗景色以及花田。","season":"5月至8月（花季）","access":"從稚內港搭乘渡輪約 2 小時"},"ニセコ・羊蹄山":{"name":"新雪谷/富士山羊蹄市","desc":"日本滑雪勝地的聖地。粉雪的品質在世界名列前茅。夏季，以羊蹄山為背景的田園風光十分壯觀。","detail":"羊蹄山是一座優雅的層狀火山，也被稱為「蝦夷富士」。從山腳下的田野和農場眺望的景色是北海道典型的壯麗景色。夏季登山（來回約8小時）也很受歡迎。","season":"冬季（滑雪）/夏季（登山/騎乘）","access":"從俱知安站開車約 15 分鐘"},"角館・武家屋敷と桜":{"name":"角館武士宅邸與櫻花","desc":"被稱為東北小京都的城下町。武士宅邸沿線的垂枝櫻花和黑板牆營造出壯觀的春天景象。","detail":"春季（4 月底至 5 月初）尤其有名，武士宅邸街約有 400 棵垂枝櫻花樹。被選為重要的傳統建築群保存地區。秋天的紅葉也很美。","season":"4月下旬～5月上旬（櫻花）、10月～11月（紅葉）","access":"從JR秋田新幹線「角館站」步行15～20分鐘"},"十和田湖":{"name":"十和田湖","desc":"雙火山口湖，日本最大的高原湖。湖邊原始森林的秋葉和大倉半島的景色非常壯觀。","detail":"奧入瀨溪流的源頭。您可以享受觀光船和湖邊健行。十和田神社所在的御倉半島充滿了神秘的氣氛。冬天，這裡被白雪覆蓋，成了奇幻的景色。","season":"10月到11月（秋葉）最好","access":"從 JR 八戶線「八戶站」搭乘巴士約 2 小時"},"龍泉洞":{"name":"龍泉洞","desc":"石灰岩洞穴，擁有世界上最清澈的地下湖之一。湖水深120米，呈鈷藍色。","detail":"岩手縣隱藏的瑰寶，據說是世界三大石灰岩洞穴之一。地下湖越深，藍色就越美。洞內氣溫常年在攝氏10度左右，夏季涼爽。","season":"全年","access":"從盛岡站搭乘巴士約 2 小時"},"猊鼻渓":{"name":"猊鼻溪","desc":"佐鐵川在石灰岩中雕刻出的美麗峽谷。當您在船夫用單桿控制的船上下船時，可以欣賞兩岸的懸崖和綠色植物。","detail":"著名的乘船之旅往返約2公里。船夫所唱的「藝飛追分」之聲在山谷中迴盪。秋天的紅葉和冬天的雪景也很壯觀。","season":"全年（11月的秋葉和1月、2月的雪景很神奇）","access":"從JR大船渡線猾鼻溪站步行5分鐘"},"象潟（きさかた）":{"name":"喜坂","desc":"秋田的海岸曾經被認為是與松島齊名的風景勝地。地震後，該地區變成了陸地，形成了獨特而壯觀的鄉村景觀，稻田中漂浮著一座島嶼。","detail":"《奧之細道》中鬆尾芭蕉去過的地方。如今，氣滿寺的樹木在稻田中像一座島嶼一樣突出，背靠鳥海山，形成了獨特的景觀。這裡也是著名的日落勝地。","season":"六月至八月（稻田綠油油的）","access":"從JR羽越本線「國站」步行20分鐘"},"鎌倉・長谷寺":{"name":"鎌倉/長谷寺","desc":"一座古老的寺廟矗立在山上，俯瞰大海。以繡球花名勝聞名，在雨季期間，院內會種植2,500株繡球花。","detail":"主像是十一面觀世音菩薩，是日本最大的木造雕像之一。從展望台可以看到相模灣和由比濱的全景。十一月的秋葉和春天的梅花也很美。","season":"六月（繡球花）和十一月（秋葉）尤其有名。","access":"從江之電「長谷站」步行5分鐘"},"日光東照宮":{"name":"日光東照宮","desc":"供奉德川家康的宏偉神社建築群。以三隻猴子和睡貓而聞名的世界遺產：“非禮勿視，非禮勿言，非禮勿聽。”","detail":"陽明門（寒蟬門）是匯集了江戶裝飾藝術精華的傑作。作為日光的神社和寺院被登錄為世界遺產。參觀附近的日光二荒山神社和輪王寺。","season":"一年四季（春季櫻花、秋季紅葉尤其美）","access":"從 JR 日光線「日光站」步行或搭乘巴士約 20 分鐘"},"草津温泉・湯畑":{"name":"草津溫泉/湯畑","desc":"日本三大名泉之一。中央展開的湯畑每分鐘湧出超過 4,000 公升的溫泉，景色十分壯觀。","detail":"以湯畑為中心的溫泉街氣氛優雅，湯沫秀也很受歡迎。這座著名的溫泉自江戶時代就已存在，其獨特的酸性泉質據說對多種疾病有效。冬季雪景與溫泉的結合堪稱絕妙。","season":"全年無休（冬季的雪見溫泉特別受歡迎）","access":"從輕井澤站、澀川站、長野原草津口站等搭乘巴士約1小時。"},"那須高原":{"name":"那須高原","desc":"以那須山為背景的高原度假勝地。一年四季都可以享受茶臼山的噴射孔、四季花田、紅葉、滑雪等樂趣。","detail":"搭乘那須纜車到茶須嶽山頂附近。雪勝關噴射孔也是一大亮點。高原上還佈滿了博物館、牧場、直銷店等旅遊設施。","season":"全年（10 月至 11 月的紅葉特別受歡迎）","access":"從 JR 東北本線黑磯車站搭乘巴士約 50 分鐘"},"昇仙峡":{"name":"昇仙鄉","desc":"山梨縣的峽谷被稱為日本最美麗的峽谷。山谷中奇形怪狀的岩石和壯觀的 30m 千瀑布瀑布十分壯觀。","detail":"全長約5公里，擁有仙賀瀑布、角園坊、關門等獨特地形的路線。它也以水晶和寶石的產地而聞名，並且有許多珠寶店。秋天的紅葉尤其壯觀。","season":"全年（10月至11月紅葉最佳）","access":"從甲府站搭乘巴士約 40 分鐘"},"富士山・スバルライン五合目":{"name":"富士山/斯巴魯線第五站","desc":"開車前往富士山五合目即可抵達的景點。當你踏出雲海之上，迎接你的將是另一個世界的景色。","detail":"在海拔2305m處，可以近距離感受雲海和富士山峰。這裡也是登山的起點，7月至8月的登山季節極為擁擠。有一段時期限制私家車。","season":"7-8月（登山）和秋冬雲海也很受歡迎。","access":"從河口湖站出發的富士斯巴魯線（私家車限制期間巴士）"},"能登半島・白米千枚田":{"name":"能登半島/千枚田白米","desc":"1,004 個梯田分佈在面向日本海的陡坡上，景色令人嘆為觀止。以其原創的日本風景和彩燈“Aze no Kirameki”而聞名。","detail":"從 10 月到 3 月，會舉辦“Aze no Kirameki”，大約 25,000 個 LED 燈裝飾著梯田。被選為日本梯田百選之一。夕陽與梯田的對比也很精緻。","season":"全年（10 月至 3 月 LED 點燈很受歡迎）","access":"從金澤站開車約 1 小時 30 分鐘"},"妻籠宿":{"name":"妻籠宿","desc":"長野的壯麗景色，中山道驛站幾乎完好無損。石板路和古老民宅的街景會讓您感覺彷彿回到了江戶時代。","detail":"日本第一個保留街景的驛站町。令人印象深刻的是，這裡沒有電線桿，景觀也得到了完整的保存。前往鄰近的馬遼宿（岐阜縣）的 8 公里健行也很受歡迎。","season":"一年四季（春季櫻花、秋季紅葉尤其美）","access":"從 JR 中央本線「南木曾站」搭乘巴士約 10 分鐘"},"奥大井湖上駅":{"name":"奧大伊小城站","desc":"一個隱藏的車站，位於伸入水壩湖的半島頂端。阿布特風格的鐵路和壯觀的湖景營造出夢幻般的景色。","detail":"您可以在通往車站的「彩虹橋」上行走，這座鐵路橋彷彿漂浮在竹湖上。週邊地區是大井川鐵道的未開發區域，設有健行步道。","season":"全年（10 月至 11 月紅葉尤其壯觀）","access":"大井川鐵道井川線「奧大井站」下車"},"天竜峡":{"name":"天龍峽","desc":"天龍川形成的山谷，將南阿爾卑斯山脈分割開來。它也被稱為“日本線”，是一段美麗的懸崖和山澗。","detail":"沿線乘坐著名的觀光船。春天的櫻花和秋天的紅葉尤其美麗，山谷的美麗隨著季節的變化而變化。天龍峽溫泉也在附近，可以享受溫泉一日遊。","season":"全年（10月至11月紅葉最佳）","access":"從JR飯田線「天龍峽站」步行5分鐘"},"馬籠宿":{"name":"馬籠宿","desc":"中山道第69站的驛站町。這裡是島崎藤村的誕生地，這是一個風景如畫的驛站小鎮，位於山坡上，至今仍保留著鵝卵石路面和水磨坊。","detail":"妻籠宿與妻籠宿之間的山口（約8公里）步行很受歡迎。途中從馬込峠看到的景色也很美。您也可以在藤村紀念館深入了解歷史。","season":"全年（4月賞櫻花、10月～11月賞紅葉）","access":"從 JR 中央本線「中津川站」搭乘巴士約 30 分鐘"},"貴船神社":{"name":"貴船神社","desc":"位於京都深山深處的供奉水神的神社。它以其綠色通道、燈籠兩旁的奇妙石階和夏季河畔美食而聞名。","detail":"冬天的雪景和燈籠點亮，真是美極了。六月的水上漂浮也很受歡迎。從睿山電鐵貴船口站出發的沿河小路也風景如畫。","season":"一年四季（11月的秋葉和1月、2月的雪景尤其神奇）","access":"從睿山電鐵「貴船口站」步行約20分鐘"},"大台ヶ原":{"name":"小台原","desc":"日本多雨地區，年降雨量超過5000毫米。一座被原始森林、苔蘚和霧氣籠罩著的夢幻般的世界遺產山。","detail":"天氣晴朗時，從秀嶽山頂（海拔 1,695 m）有時可以看到富士山。東大路線（約8公里）可供家庭步行。這裡也是梅花鹿的棲息地。","season":"5月至11月（春天新綠，秋天紅葉）","access":"從大和上市站或大台町搭乘巴士或汽車約 1 小時"},"城崎温泉":{"name":"城崎溫泉","desc":"位於日本海附近山間的溫泉小鎮。關西最好的溫泉度假村之一，您可以在這裡遊覽柳樹成蔭、溪流潺潺的露天浴池。","detail":"穿著浴衣在七個露天浴池中漫步的著名「露天浴池之旅」。這裡也是《鬼太郎》的創作者水木茂喜愛的地方。冬天的松葉蟹（來自日本海的雪蟹）也很精緻。","season":"全年（11月至3月的螃蟹季節和冬季的雪景也很受歡迎）","access":"JR山陰本線城崎溫泉站旁"},"奈良・東大寺と春日大社":{"name":"奈良、東大寺、春日大社","desc":"世界遺產、大佛和廣闊的公園。古都，風景優美，有1300隻野鹿與人類共存。","detail":"世界上最大的木造建築－東大寺大佛殿和奈良大佛都是值得一看的景點。春天的櫻花，秋天的秋葉，與鹿一起，構成了一幅如畫的風景。從若草山眺望奈良盆地的景色也不容錯過。","season":"全年","access":"從近鐵奈良站/JR奈良站步行或搭乘市營巴士"},"帝釈峡":{"name":"大石峽","desc":"中國地區最大的山谷國立公園。由石灰岩雕刻而成的山谷和天然石橋“大橋”形成的壯麗景色。","detail":"大橋橋是世界上最大的天然石橋之一（寬90m，高40m）。從沿著大釋川航行的遊船上看到的陡峭懸崖令人印象深刻。秋天的紅葉季節尤其美麗。","season":"一年四季（11月秋葉最佳）","access":"從 JR 福園線「備後落合站」開車約 30 分鐘"},"蒜山高原":{"name":"蒜山高原","desc":"以中國山地最高峰蒜山三座為背景的令人心曠神怡的高原。澤西乳牛吃草的田園風光如詩如畫。","detail":"中國地區最好的避暑勝地之一。您也可以在蒜山高原中心周圍騎自行車和騎馬。蒜山炒麵是一道著名的美食。秋天的波斯菊花田也很受歡迎。","season":"全年（春季到秋季駕車尤其愉快）","access":"從米子高速公路蒜山 IC 開車約 10 分鐘"},"秋吉台・秋芳洞":{"name":"秋吉台/秋吉堂","desc":"日本最大的喀斯特高原和日本最大的石灰岩洞。由石灰岩和地下寺廟形成的白色圓頂狀草原。","detail":"秋吉台是一個喀斯特高原，大約 300 萬年前，地面上出現了珊瑚礁。每年春天，田野因燃燒而變成一片漆黑，然後又恢復綠色的高原，這種獨特的景色是必看的。","season":"一年四季（三月燒後的新綠尤其美麗）","access":"從新山口站/山口站搭乘巴士約 45 分鐘"},"津和野":{"name":"津和野","desc":"島根縣的一個小城下町，被稱為山陰地區的小京都。洞內遊動的無數彩鯉白牆庫房，美不勝收。","detail":"太鼓穀稻荷神社的千本鳥居尤其有名。 5月舉行的鷺舞神道儀式（聯合國教科文組織非物質文化遺產）也是一大亮點。乘坐 SL 山口號也是充滿旅程的體驗。","season":"一年四季（櫻花、鯉魚、紅葉、季節風景）","access":"JR山口線津和野站旁邊"},"仁淀川":{"name":"仁澱川","desc":"水質為日本最高的高知縣的清澈溪流（根據國土交通省的調查）。透明度極佳的藍色，稱為“仁淀藍”。","detail":"該地區周圍分佈著多個景點，包括安井谷和仁古淵，據說它們是河流的寶石盒。您還可以在河裡劃獨木舟和玩耍。高知縣的兩條主要清澈溪流，一條是四萬十川。","season":"全年（夏季河遊和秋季紅葉特別受歡迎）","access":"從高知站開車約 1 至 2 小時（依地點而定）"},"足摺岬":{"name":"足折岬","desc":"高知縣最南端的海角，伸入太平洋。黑潮海和俯瞰懸崖的燈塔風景如畫。","detail":"白色的足折岬燈塔是日本最大的燈塔之一。您可以從周圍的海濱長廊欣賞太平洋的壯麗景色。這裡也是與約翰·萬次郎有連結的地方。","season":"全年（即使在冬天也很溫暖，方便遊覽）","access":"從高知站/宿毛站搭乘巴士約 3 至 4 小時"},"道後温泉":{"name":"道後溫泉","desc":"松山著名的溫泉，據說是日本最古老的溫泉。它的標誌是夏目漱石的《少爺》中出現的歷史悠久的溫泉塔。","detail":"道後溫泉本館是建於1899年的歷史建築（目前正在整修，部分開放）。區內有很多購物街，邊走邊吃很有趣。我想和松山城一起參觀。","season":"全年","access":"從JR松山車站搭乘路面電車約15分鐘，在「道後溫泉」下車"},"鳴門の渦潮":{"name":"火影忍者的漩渦","desc":"鳴門海峽是世界三大潮流之一，最大直徑達30公尺的漩渦，堪稱天然奇觀。","detail":"從大鳴門大橋的玻璃長廊「漩渦之道」可以俯瞰漩渦。乘坐遊船近距離觀察漩渦的體驗也很受歡迎。造訪時請查看潮汐表並以大潮為目標。","season":"全年（最大的漩渦出現在春季和秋季大潮期間）","access":"從 JR 鳴門線「鳴門站」搭乘巴士約 20 分鐘"},"指宿・砂むし温泉":{"name":"指宿 / 沙浴溫泉","desc":"「沙浴」是鹿兒島沙灘上的天然溫泉，可以溫暖包括沙子在內的整個身體。世界上獨一無二的自然健康體驗。","detail":"溫泉從沙中噴湧而出，獨特的沐浴方法是躺在溫泉上，讓沙子撒在上面。因其高效排毒功效而廣受歡迎。開聞岳的景色也很美。","season":"全年","access":"從 JR 指宿枕崎線指宿站步行約 15 分鐘"},"軍艦島（端島）":{"name":"軍艦島（端島）","desc":"長崎海岸附近的廢墟島嶼。鼎盛時期，這裡曾是世界上人口密度最高的煤礦島，如今卻成為漂浮在海上的世界遺產廢墟。","detail":"獨特的廢墟景觀已成為遊戲和電影的模型，引起了全世界的關注。可以乘坐觀光船+登陸遊覽島嶼（可能因天氣原因取消）。","season":"全年（暴風雨天氣無法降落）","access":"從長崎港搭乘遊船約 40 分鐘（需預約）"},"由布院温泉":{"name":"由布院溫泉","desc":"以布山為背景的大分縣人氣溫泉地。它是湖面和由布山晨霧的壯麗景色的代名詞。","detail":"溫泉從金鱗湖的湖底湧出，清晨，空氣中瀰漫著神奇的薄霧。沿著時尚的咖啡館和雜貨店林立的湯之坪街道漫步也很受歡迎。","season":"一年四季（金鱗湖的清晨霧氣最神奇）","access":"JR久大本線由布院站下車即到"},"天草・崎津集落":{"name":"天草/崎津村","desc":"被指定為世界遺產的漁村，有著壓迫基督徒的歷史。聳立在海上的哥德式崎津大教堂的獨特而壯觀的景色。","detail":"咲津天主堂，被譽為“海洋天主堂”，是一座罕見的建於漁村的教堂。面向大海的建築與夕陽的對比很美。周圍的天草海也美麗而蔚藍。","season":"全年","access":"從熊本站開車約 2 小時 30 分鐘"},"雲仙地獄":{"name":"雲仙地獄","desc":"位於長崎縣雲仙溫泉週邊的地熱區。噴氣孔和溫泉從地面各處噴湧而出，景象奇特而奇妙。","detail":"周圍散佈著大聖館地獄、大糸地獄等30多個地獄。江戶時代也是基督徒受壓迫的地方。雲仙溫泉是日本第一個被指定為國立公園的溫泉地。","season":"全年","access":"從 JR 長崎本線「諫早站」搭乘巴士約 1 小時 10 分鐘"},"波照間島":{"name":"波照間島","desc":"日本最南端有人居住的島嶼。鈷藍色的大海「波照間藍」和星空據說是日本最美的。","detail":"幾乎沒有光污染，因此夜空中的星星數量多得驚人。這裡也被稱為日本唯一可以看到南十字星的地方。西濱海水的清澈度在日本名列前茅。","season":"3月至6月（觀察南十字星和美麗的大海）","access":"從石垣港搭乘渡輪約 1 小時"},"ハテの浜（久米島）":{"name":"波特諾濱（久米島）","desc":"久米島海岸漂浮的無人居住的沙洲。翠綠的大海周圍只有白色的沙灘，堪稱名副其實的「天堂之海」。","detail":"從久米島搭船30分鐘。一覽無遺的景色只有沙灘和翡翠海。您甚至可以在浮潛時遇到海龜。參觀基本上都是一日遊。","season":"4月-10月（大海最美）","access":"從久米島機場開車約20分鐘+搭船約30分鐘"},"与那国島":{"name":"與那國島","desc":"日本最西端的島嶼。距離台灣約111公里，是世界聞名的巨型雙髻鯊聚集的潛水勝地。","detail":"冬季（一月至三月），來自世界各地的潛水員來到這個潛水點，在那裡您可以遇到成群的鎚頭鯊。還有水下遺跡。","season":"全年（冬季鯊魚潛水，夏季壯觀海景）","access":"從那霸機場（經石垣）搭飛機約 1 小時"},"長瀞（ながとろ）":{"name":"長瀞","desc":"埼玉縣的一個山谷，由荒川河的結晶片岩雕刻而成。關東地區的一處壯觀的風景區，以萊茵河庫達里和粉紅色的岩石路面而聞名。","detail":"沿著漂流線順流而下，可以體驗岩石鋪就的山谷之美。岩石資料地形是被指定為天然紀念物的稀有地形。這裡也是秋季賞紅葉、春季賞櫻花的著名景點。","season":"全年（3月櫻花、11月紅葉、夏季漂流很受歡迎）","access":"從秩父鐵道長瀞站步行5分鐘"},"天橋立・伊根の舟屋":{"name":"天橋立/船谷伊根","desc":"日本唯一的海上村莊。江戶時代以來的漁民住宅排列在水邊，一樓是船舶車庫。","detail":"伊根灣兩旁排列著約230座船屋，看起來就像漂浮在海上一樣。最好的觀賞方式是搭乘觀光船，入住賓館並享用漁家美食也很受歡迎。","season":"全年","access":"從天橋立站搭乘巴士約 30 分鐘"},"別府温泉・地獄めぐり":{"name":"別府溫泉/地獄之旅","desc":"溫泉數量日本第一的別府誕生了獨特的「地獄」。有鈷藍海地獄、紅血池地獄等7種不同類型可供享受。","detail":"著名的「地獄遊行」之旅將帶您前往七個被設定為遊客地獄的溫泉。這裡有許多獨特的溫泉體驗，例如俯瞰別府灣的足浴和蒸菜。","season":"全年","access":"從 JR 日豐本線「別府站」搭乘巴士約 20 分鐘"},"平尾台":{"name":"平尾台","desc":"九州最大的喀斯特高原分佈在北九州市的郊區。獨特而壯觀的景色，石灰岩山峰點綴在草地上，就像羊群一樣。","detail":"與秋吉台一起，是西日本代表性的喀斯特高原。石灰岩洞穴（Senbutsu Limestone Cave）也在附近。新綠和春田燃燒後的岩石山峰相映成趣，格外美麗。","season":"全年（三月的田野燃燒和五月的新綠尤其美麗）","access":"從 JR 日豐本線「小倉站」開車約 40 分鐘"}},"ko":{"美瑛の丘":{"name":"비에이의 언덕","desc":"부드러운 구릉에 퍼지는 패치워크 모양의 밭. 사계절에서 완전히 다른 표정을 보이는 홋카이도 굴지의 절경지.","detail":"푸른 연못이나 망악대 등 주변 명소도 풍부. 여름에는 라벤더 해바라기, 가을에는 황금빛 밀밭이 펼쳐집니다. 이른 아침 드라이브가 특히 추천.","season":"5월~10월","access":"JR 후라노선 「비에이역」에서 차로 10분"},"富良野ラベンダー畑":{"name":"후라노 라벤더 밭","desc":"홋카이도를 대표하는 절경. 매년 7월에 일면 보라색으로 물드는 라벤더밭은 압권의 아름다움.","detail":"농장 도미타가 가장 유명하며 라벤더 외에도 다양한 꽃밭이 펼쳐집니다. 라벤더 아이스와 향기 제품의 기념품도 인기.","season":"7월 초순~하순(볼 만한 시기)","access":"JR 후라노선 「나카후라노역」에서 도보 20분 또는 차로 5분"},"知床五湖":{"name":"시레토코 고코","desc":"세계 자연 유산·시레토코에 점재하는 5개의 신비한 호수. 곰도 서식하는 손길이 닿지 않은 대자연.","detail":"시레토코 연산이 호수면에 비치는 절경. 고가목도(무료)와 지상 산책로(요가이드)의 2코스. 불곰 출몰 정보는 사전 확인 필수.","season":"4월 하순~11월 상순","access":"메만베쓰 공항에서 차로 약 2시간"},"摩周湖":{"name":"마슈호","desc":"일본 제일의 투명도를 자랑하는 신비의 호수. 안개에 싸인 환상적인 모습으로 「안개의 마슈호」로 유명.","detail":"칼데라 호수에서 유입·유출 하천이 없어 세계 굴지의 투명도를 자랑합니다. 전망대에서 내려다 보는 경치는 각별. 화창한 날은 깨어나는 코발트 블루.","season":"5월~10월(연중 방문 가능)","access":"JR 쿠시망 본선 「마슈역」에서 차로 20분"},"宗谷岬":{"name":"소야 미사키","desc":"일본 최북단의 땅. 광대한 오호츠크해와 소야 해협이 펼쳐지는 「여기가 일본의 끝」이라고 느끼는 절경.","detail":"날씨가 좋으면 사할린이 보일 수도 있습니다. 최북단의 비석 앞에서의 기념 촬영은 정평. 주변에는 소야 구릉의 둥근 언덕이 펼쳐지는 목가적인 경관도.","season":"연중(겨울에는 유빙을 볼 수 있음)","access":"왓카나이역에서 버스로 약 55분"},"奥入瀬渓流":{"name":"오이라세 계류","desc":"토와다호에서 흐르는 14km의 계류. 이끼 한 바위와 무수한 폭포가 연속하는 도호쿠 굴지의 절경 코스.","detail":"초코 오타키 등 크고 작은 다양한 폭포가 점재하여 산책로가 정비되어 있습니다. 신록의 5월과 단풍의 10월이 특히 아름답다. 버스를 사용하면서 한가로이 걷는 것이 추천.","season":"5월(신록), 10월(단풍)이 최고","access":"JR 하치노헤선 「하치노헤역」에서 버스로 약 2시간"},"蔵王の樹氷":{"name":"자오의 수빙","desc":"겨울에만 나타나는 거대한 얼음의 괴물 \"스노우 몬스터\". 환상적인 은 세계는 바로 다른 세계.","detail":"아오모리토 도마츠에 눈과 얼음이 부착되어 태어나는 자연의 예술. 자오 로프웨이로 산 정상 부근으로. 밤에는 라이트 업되어 환상적인 분위기에.","season":"1월 하순~3월 상순","access":"야마가타역에서 버스로 약 40분, 자오 로프웨이를 이용"},"松島":{"name":"마츠시마","desc":"일본 삼경의 하나. 260여 개의 섬들이 소나무를 감고 만 안에 떠있다. 마츠오 바쇼도 읊은 절경.","detail":"유람선에서의 섬 순회가 정평. 즈이간지 등 역사적인 사사도 많아 역사와 절경을 모두 즐길 수 있습니다. 굴이 명물로 음식도 충실.","season":"연중(봄의 벚꽃・가을의 단풍이 특히 인기)","access":"JR 센고쿠선 「마츠시마 해안역」에서 도보 5분"},"富士山（河口湖）":{"name":"후지산(가와구치코)","desc":"일본의 상징. 호수면에 비치는 거꾸로 후지는 전세계에서 사진가가 모이는 절경 명소.","detail":"가와구치코로부터의 후지산은 특히 아름답고, 아침의 거꾸로 후지는 필견. 오이시 공원의 라벤더와 후지산의 콜라보레이션도 그림이 됩니다. 오시노 핫카이도 근처 주유하기 쉽다.","season":"연중(관설의 만추~봄이 특히 아름답다)","access":"후지급행선 「가와구치코역」에서 버스 또는 도보"},"日光いろは坂":{"name":"닛코 이로하자카","desc":"48개의 곡선이 이어지는 산길. 가을의 단풍 시즌은 산 전체가 불타도록 염색되는 절경 드라이브 코스.","detail":"제1 이로하자카(내리막)·제2 이로하자카(오르막)의 일방통행로. 상단의 명치평에서는 로프웨이로 남체산과 중선사호의 절경을 바라볼 수 있습니다.","season":"10월 중순~11월 상순(단풍)","access":"JR닛코선 「닛코역」에서 버스로 약 40분"},"尾瀬ヶ原":{"name":"오세가하라","desc":"혼슈 최대의 고층 습원. 수바라기의 계절에는 흰 꽃이 습원을 가득 채우는 환상적인 광경이 펼쳐진다.","detail":"5월 하순~6월의 물바탕과 9월~10월의 잔디 단풍이 특히 유명. 목도가 정비되어 있어 하이킹하기 쉽다. 마이카 규제 있어, 셔틀 버스 이용이 필수.","season":"5~6월(물바탕), 9~10월(잔디 단풍)","access":"아이즈 고원 오세구치 역 · 누마타 역 등에서 버스 이용"},"上高地":{"name":"가미코치","desc":"북 알프스의 기슭에 펼쳐지는 빙하 지형의 계곡. 호타카 연봉을 배경으로 한 아즈카와의 경치는 일본 제일의 산악 풍경.","detail":"가도바시로부터의 호타카 연봉의 경치는 특히 유명. 다이쇼이케나 묘진지 등 볼거리도 많다. 마이카 규정이 있으며 셔틀 버스 또는 택시로 입산합니다.","season":"4월 하순~11월 중순(동계 폐쇄)","access":"마츠모토 IC로부터 약 1시간. 사와 와타로 마이카를 주차하고 버스 환승"},"白川郷":{"name":"시라카와고","desc":"유네스코 세계 유산. 가파른 갓쇼즈쿠리 가옥과 설경이 그림처럼 아름다운 산간 마을.","detail":"겨울의 설경과 밤의 라이트 업은 환상적이며 전세계 관광객이 방문합니다. 낡은 민가에 숙박할 수 있는 갓쇼즈쿠리의 민박도 있어, 독특한 체험을 할 수 있습니다.","season":"연중(12월~2월의 설경이 절경)","access":"다카야마역・가나자와역 등에서 버스로 약 50~75분"},"立山黒部アルペンルート":{"name":"다테야마 구로베 알펜 루트","desc":"해발 3000m급의 능선을 관통하는 산악 관광 루트. 봄의 「눈의 오타니」에서는 높이 20m의 설벽 사이를 걷는다.","detail":"도야마측·나가노측 어느쪽에서도 입산 가능. 로프웨이·케이블카 등 6개의 놀이기구를 환승하는 것이 묘미. 무로도다이라에서 다테야마 연봉의 전망은 압권.","season":"4월 중순~6월(유키노오타니), 10월(단풍)","access":"도야마역에서 도야마지철로 다테야마역까지 약 1시간"},"御射鹿池":{"name":"미사카 연못","desc":"나가노현 오쿠다테과의 고원에 자리한 조용한 연못. 수면에 비치는 나무들의 환상적인 풍경은 히가시야마 치조의 회화의 모델.","detail":"농업용으로 연못이지만, 그 신비한 아름다움이 평판에. 아침 안개가 쏟아지는 이른 아침이 특히 아름답고, 단풍기의 10월이 베스트 시즌. 주변은 타테시나 고원의 드라이브도 즐겁다.","season":"5월~11월(10월의 단풍이 최고)","access":"지노역에서 버스 또는 차로 약 40분"},"天橋立":{"name":"아마노하시다테","desc":"일본 삼경의 하나. 전체 길이 3.6km의 모래 부리가 미야즈 만을 횡단. 「가랑이 엿보기」로 보면 하늘에 가설되는 다리처럼.","detail":"우산마쓰 공원과 아마노하시다테 뷰랜드의 전망대에서 바라보는 것이 정평. 소나무길의 산책길을 자전거나 도보로 건너는 것도 기분 좋다. 대안의 이네의 후나야도 세트로 방문하고 싶다.","season":"연중(봄・가을이 특히 아름다운)","access":"교토역에서 특급으로 약 1시간 40분, 아마노하시다테역 하차"},"竹田城跡":{"name":"다케다 성터","desc":"운해에 떠있는 환상의 성터. 「일본의 마추픽추」라고도 불리는 국내 굴지의 절경 명소.","detail":"가을~겨울 이른 아침, 기온차가 생기면 눈 아래로 운해가 퍼져 성터가 떠오릅니다. 대안의 다테 운쿄 전망대에서의 전망이 특히 유명합니다.","season":"9월~11월(운해) 이른 아침 5~8시경","access":"JR 산인 본선 「다케다 역」에서 도보 40 분 또는 픽업 버스 이용"},"曽爾高原":{"name":"소지 고원","desc":"일면에 퍼지는 스스키의 원. 석양에 비추어진 황금빛 호파는 압권의 아름다움.","detail":"가을(10~11월)에는 스스키가 일제히 금빛으로 빛나고 방문하는 사람들을 매료합니다. 카메야마 고개로부터의 경치가 특히 유명. 황혼에 방문하는 것이 좋습니다.","season":"10월~11월(스스키의 절정)","access":"긴테쓰 오사카선 ‘요시하라역’에서 버스로 약 35분"},"熊野古道":{"name":"구마노 고도","desc":"세계유산에 등록된 태고의 순례로. 이끼로 만든 자갈길과 스기기타치가 이어지는 신비한 숲길.","detail":"이세로·나카베로 등 여러 루트가 있습니다. 다이몬자카~구마노 나치타이샤의 루트가 가장 인기. 나치의 폭포(일본 3대 명폭)도 필견입니다.","season":"연중(봄・가을이 걷기 쉽다)","access":"기이타나베역・신노미야역에서 버스로 액세스"},"鳥取砂丘":{"name":"돗토리 사구","desc":"일본 최대의 모래 언덕. 일본해를 배경으로 한 장엄한 사구는 마치 사막과 같은 이세계감.","detail":"높이 47m의 모래 언덕을 트레킹. 말의 등으로 불리는 능선으로부터의 일본해의 경치는 절경. 낙타 라이드와 모래 미술관 등도 인기.","season":"연중","access":"돗토리역에서 버스로 약 20분"},"角島大橋":{"name":"가쿠시마 오하시","desc":"에메랄드 그린의 바다를 가로 지르는 1780m 다리. 일본 굴지의 절경 드라이브 스포트.","detail":"야마구치현의 본토와 카도시마를 연결하는 다리. 다리 안쪽에서 보는 바다의 색은 남국과 같은 아름다움. CM이나 영화의 로케지로도 유명. 가쿠시마 등대도 함께 방문하고 싶다.","season":"연중(맑은 날씨의 바다의 색이 최고)","access":"JR 산인 본선 「특규역」에서 차로 약 15분"},"尾道・千光寺公園":{"name":"오노미치・센코지 공원","desc":"언덕 마을·오노미치 산맥에 펼쳐지는 벚꽃의 명소. 눈 아래에 펼쳐지는 오노미치 수도와 세토 내해의 전망이 절경.","detail":"센코지산 로프웨이에서의 전망대에서의 전망이 유명. 고사나 골목의 산책도 즐겁고, 영화의 성지로서도 인기의 「영화의 거리」. 고양이 명소로도 유명.","season":"연중(3월 하순~4월의 벚꽃이 특히 유명)","access":"JR 산요 본선 「오노미치역」에서 도보 권내"},"四万十川":{"name":"시만토가와","desc":"일본 마지막 청류. 시모시타바시가 점재하는 시만토가와의 원 풍경은 일본인의 마음의 원점이라고도 할 수 있는 아름다움.","detail":"전국적으로 유명한 사다 시모시타 다리 등, 난간이 없는 다리가 강의 곳곳에. 카누나 사이클링으로 청류를 체감하는 것도 추천. 은어·천연 장어 등 음식도 일품.","season":"연중(신록의 5월·가을의 10~11월이 특히 아름답다)","access":"JR 토찬 선 「쿠보카와 역」에서 노선 버스 또는 렌터카"},"祖谷のかずら橋":{"name":"이즈야의 카즈라 다리","desc":"시라쿠치카즈라로 만들어진 비경의 매달려 다리. 발밑이 보이는 다리바닥과 깊은 계곡의 조합이 스릴 만점.","detail":"깊은 계곡에 걸치는 길이 45m의 카즈라 다리. 3년마다 교체되는 전통의 다리. 근처에는 「소변 코승」의 동상이나 헤이케 저택 등 비경의 관광지가 점재.","season":"연중","access":"오보케역에서 버스로 약 40분"},"父母ヶ浜":{"name":"부모가하마","desc":"간조시에 하늘의 거울이 되는 「일본의 우유니 소금 호수」. 일몰 하늘이 웅덩이에 비치는 환상적인 절경.","detail":"간조와 황혼이 겹치는 타이밍이 최고의 조건. 타이드 그래프로 간조 시간을 확인하고 방문을. 바람이 없는 날은 완벽한 경면을 즐길 수 있습니다.","season":"3~10월(일몰 전후의 간조시)","access":"사카마역에서 택시로 약 10분"},"しまなみ海道":{"name":"시마 나미 카이도","desc":"세토우치의 섬들을 연결하는 다리가 연속하는 루트. 세계 최고봉의 사이클링 로드로 유명하다.","detail":"이마바리~오노미치를 잇는 약 70km의 루트에 복수의 다리가 가설됩니다. 내마 해협 대교 다타라 대교에서의 전망은 각별하다. 자전거로 여유롭게 섬 순회가 최고의 즐기는 방법.","season":"연중(봄・가을의 사이클링이 특히 추천)","access":"오노 미치 역 · 이마 바리 역의 양측에서 액세스 가능"},"阿蘇山":{"name":"아소산","desc":"세계 최대급의 칼데라. 활화산과 광대한 초원이 만들어내는 장엄한 규모로 압도된다.","detail":"나카다케 화구(분화 상황에 의해 입입 규제 있음), 다이칸봉, 쿠사센리가하마가 주요 볼거리. 아소 쿠쥬 국립 공원 내. 말고기 요리와 아소 소도 명물.","season":"연중(화구의 입입은 분화 경계 레벨에 따름)","access":"JR 토요히 본선 「아소역」에서 차로 약 20분"},"屋久島（縄文杉）":{"name":"야쿠시마(조몬 삼나무)","desc":"추정 수령 수천년~7200년의 조몬 삼나무가 자는 세계 자연 유산의 섬. 이끼 한 원생림은 별세계.","detail":"조몬 스기까지의 왕복은 약 22km・10시간의 본격 트레킹. 시라타니 운수협이나 오카와 폭포 등 다양한 즐기는 방법도. 야쿠사, 야쿠 원숭이 등 고유종을 만날 수 있습니다.","season":"3~5월・10~11월(조몬 삼나무 트레킹)","access":"가고시마공항에서 비행기로 35분 또는 고속선으로 약 2시간"},"高千穂峡":{"name":"다카치호협","desc":"아소의 화산 활동이 낳은 현무암의 주상 절리의 계곡. 마나이의 폭포가 에메랄드 그린의 연에 떨어지는 절경.","detail":"보트에서 올려다보는 마나이 폭포(낙차 17m)는 압권의 박력. 다리 위에서의 전망도 절경. 다카치호 신사·텐이와도 신사 등 신화의 땅도 점재합니다.","season":"연중(단풍의 10~11월이 특히 아름답다)","access":"노베 오카 역에서 버스로 약 1 시간 20 분"},"宮古島・砂山ビーチ":{"name":"미야코지마・사야마 비치","desc":"투명도 뛰어난 에메랄드 블루 바다. 사암이 만들어내는 아치와 백사·산호초가 남국의 낙원 그 자체.","detail":"산호초에 둘러싸인 맑은 바다는 스노클링에 최적. 오키나와 중에서도 특히 아름다운 해변 중 하나. 미야코 블루라고 불리는 바다의 색은 보는 사람을 매료합니다.","season":"4~10월(수영하기 쉬운)","access":"미야코 공항에서 차로 약 15분"},"竹富島":{"name":"다케토미시마","desc":"산호초의 바다로 둘러싸인 작은 낙도. 붉은 기와와 백사의 전통적인 마을이 오키나와의 원풍경을 지금에 전한다.","detail":"물소차에 흔들리면서 마을을 산책하는 것이 정평. 호시 모래의 해변 (카이지 해변), 콘도이 해변의 푸른 바다도 필견. 이시가키섬에서 페리로 10분.","season":"연중(3~5월・9~11월이 보내기 쉽다)","access":"이시가키항에서 페리로 약 10~15분"},"青い池":{"name":"푸른 연못","desc":"비에이쵸에 있는 신비한 코발트 블루 연못. 죽은 나무가 수중에 자리 잡은 환상적인 경치는 Apple의 벽지에도 채용.","detail":"도카치다케의 분화 대책 공사가 낳은 우연의 산물. 수중의 알루미늄 이온이 청색을 낳습니다. 밤의 라이트 업도 환상적이고 인기. 계절・날씨로 색이 변화합니다.","season":"연중(겨울의 라이트 업도 필견)","access":"비에이역에서 차로 약 20분"},"神威岬":{"name":"神威岬","desc":"샤코탄 반도의 끝에 뻗어있는 절벽 절벽의 곶. 에메랄드 그린의 샤코탄 블루의 바다와 거친 암초가 압권.","detail":"챌린카의 길 (편도 약 1km)을 걸어 곶의 첨단으로. 신위암이 돋보이는 바다의 경치는 홋카이도 제일의 절경. 성게가 명물로 6~8월이 먹을 무렵.","season":"4월 하순~11월(동계 폐쇄)","access":"오타루역에서 차로 약 1시간 20분"},"洞爺湖":{"name":"도야코","desc":"약 11만년 전의 분화로 탄생한 칼데라 호수. 호수면에 떠 있는 나카지마와 아리주산·쇼와 신산이 만들어내는 절경.","detail":"4월 하순~10월 말은 매일 밤 불꽃놀이가 개최되는 드문 관광지. 호반에는 온천 여관이 늘어서 있으며, 도야코 온천으로 유명하다. 시코쓰 도야 국립 공원 내.","season":"연중(불꽃놀이는 4월 하순~10월 말)","access":"JR 무로란 본선 「도야역」에서 버스로 약 15분"},"浄土ヶ浜":{"name":"죠토가하마","desc":"하얀 유문암이 해안에 임립하는 마치 극락 정토와 같은 이와테현의 절경 해안. 산리쿠를 대표하는 경승지.","detail":"흰 바위와 에메랄드 그린 바다의 대비가 아름답습니다. 유람선으로 바다의 동굴 「푸른 동굴」에도 갈 수 있습니다. 우미네코의 먹이 체험도 인기.","season":"연중(5~9월이 해수욕도 즐길 수 있다)","access":"미야코역에서 버스로 약 10분"},"五色沼":{"name":"고시키누마","desc":"반다이산의 분화에서 태어난 여러 가지 빛깔의 호수 늪군. 코발트 블루에서 옥색까지 변화하는 호수가 약 4km 계속된다.","detail":"毘沙門沼・赤沼・みどろ沼・龍沼・弁天沼 등 다양한 색의 늪이 점재. 산책로에서 약 1시간 내에 산책할 수 있습니다. 단풍 시즌은 특히 아름답습니다.","season":"5월~11월(단풍의 10월이 특히 절경)","access":"이노 요시로 역에서 버스로 약 35 분"},"山寺（立石寺）":{"name":"야마데라(타테이시지)","desc":"860년 창건의 산악 영장. 1015단의 돌계단을 올라간 곳에 펼쳐지는 야마가타 분지의 절경과 '한점과 바위에 물들이 들어오는 매미의 목소리'의 마츠오 바쇼의 구로 유명.","detail":"암벽에 달라붙도록 세우는 당우군이 압권. 고대당에서의 전망은 특히 훌륭합니다. 이른 아침의 조용함 속을 오르는 것이 추천. 단풍·설경도 아름답다.","season":"연중(단풍의 10~11월, 눈의 1~2월이 환상적)","access":"JR 센잔선 「야마데라역」에서 도보 5분"},"袋田の滝":{"name":"부쿠로다 폭포","desc":"일본 3명 폭의 하나. 높이 120m・폭 73m의 대폭포가 4단으로 나뉘어 떨어지는 이바라키현의 절경. 겨울의 빙포도 압권.","detail":"'네번 타키'라고도 불리며 4개로 나뉘어 떨어지는 모습이 특징적. 겨울에는 폭포 전체가 얼어붙는 빙포를 볼 수 있다. 관폭 터널에서 보는 경치도 박력 만점.","season":"연중(단풍의 11월·빙폭의 1~2월이 특히 인기)","access":"JR미즈군 선 「부쿠로다역」에서 버스로 10분 또는 도보 약 25분"},"五箇山（相倉集落）":{"name":"고카야마(아이쿠라 마을)","desc":"시라카와고와 늘어선 세계 유산의 갓쇼즈쿠리 마을. 한적한 산 사이에 조용히 자리한 하라 풍경이 시라카와고보다 조용히 즐길 수 있다.","detail":"시라카와고보다 관광객이 적고, 차분한 분위기로 합장 구조를 감상할 수 있습니다. 민박에서는 고카야마 두부 등의 향토 요리도 맛볼 수 있습니다. 겨울의 설경이 특히 아름답습니다.","season":"연중(겨울의 설경이 절경)","access":"다카오카역에서 가에쓰노 버스로 약 1시간 20분"},"兼六園":{"name":"겐로쿠엔","desc":"일본 삼명원 중 하나. 가가 백만석의 다이묘 정원. 눈 매달려 겨울 풍경과 매화, 벚꽃, 단풍으로 사계절의 아름다움.","detail":"「롯카츠」(히로다이, 유저, 인력, 창고, 수천, 조망)를 겸비한 명원. 인접한 가나자와성 공원과 세트로 방문하고 싶다. 야간 라이트 업도 실시.","season":"연중(2월의 눈매와 봄의 매화가 특히 유명)","access":"가나자와역에서 버스로 약 20분"},"奥飛騨温泉郷":{"name":"오쿠히다 온천향","desc":"북 알프스 기슭에 펼쳐지는 일본 최대급의 야천탕 지역. 산악 절경과 온천을 즐길 수 있는 비경의 온천지.","detail":"신호타카온천에는 일본 유일의 2층짜리 로프웨이가 있어 해발 2156m의 전망대에서 북알프스의 360도 파노라마를 즐길 수 있습니다.","season":"연중(겨울의 유키미 노천과 봄의 잔설이 절경)","access":"다카야마역에서 버스로 약 1시간 10분"},"嵐山（竹林の道）":{"name":"아라시야마(대나무 숲의 길)","desc":"교토 아라시야마의 푸른 대나무 숲이 하늘을 향해 늘어나는 길. 바람에 흔들리는 대나무의 소리와 빛이 환상적인 공간을 만들어 낸다.","detail":"이른 아침에는 사람이 적고 환상적인 분위기를 즐길 수 있습니다. 도츠키바시·텐류지·노미야 신사 등 주변에도 명소 다수. 아라시야마는 봄의 벚꽃・가을의 단풍도 절경.","season":"연중(이른 아침이 추천)","access":"아라시덴 「아라시야마역」 또는 한큐 「아라시야마역」에서 도보 5분"},"吉野山":{"name":"요시노산","desc":"약 3만 그루의 벚꽃이 산 전체를 덮는 일본 제일의 꽃놀이 명소. 세계 유산에도 등록된 봄의 절경.","detail":"시모 센본 · 나카 센본 · 카미 센본 · 오쿠 센본과 고도 차이에 따라 단계적으로 벚꽃이 피어 있습니다. 자오당이나 금봉산사 등 역사적 건축물도 많다. 가을 단풍도 아름답다.","season":"4월 초순~중순(벚꽃), 11월(단풍)","access":"긴테츠 요시노선 「요시노역」에서 로프웨이 또는 도보"},"伊勢神宮":{"name":"이세진구","desc":"일본 최고의 성지. 20년마다 식년 천궁이 열리는 내궁·외궁. 이세로의 신비한 공기는 일본인의 마음의 고향.","detail":"덕분에 요코초에서의 먹거리도 인기. 우지바시에서 오십 스즈카와의 청류를 바라보는 경치가 특히 아름답다. 이른 아침 참배가 조용하고 장엄한 분위기를 맛볼 수 있습니다.","season":"연중(하츠미의 설날이 가장 붐비는)","access":"긴테쓰 「우지 야마다 역」또는 「이가 스즈카와 역」에서 버스로 5 분"},"高野山":{"name":"고야산","desc":"공해가 열린 진언종의 성지. 해발 1000m의 산 위에 펼쳐지는 종교도시와 스기기타치 안의 오쿠노인은 별세계의 조용함.","detail":"오쿠노인 참배길에는 무장들의 묘비가 늘어선 약 2km의 길이 이어집니다. 숙방 체험과 정진 요리도 인기. 이른 아침의 근행 참가도 깊은 체험. 겨울의 설경은 특히 환상적.","season":"연중(단풍의 10월·눈의 겨울이 특히 신비적)","access":"난카이 타카노선 「타카노야마역」에서 케이블카＋버스"},"琵琶湖":{"name":"비와코","desc":"일본 최대의 호수. 400만년 이상의 역사를 지닌 고대 호수로, 다케우지마·시라우쓰 신사 등 호수·호안의 절경이 점재.","detail":"호수 안에 도리이가 서 있는 시라우쓰 신사는 「오미노 이쓰쿠시마」라고도. 다케이 섬의 파워 스폿도 인기. 석양·아사기리 등 시간대에 따라 다양한 표정을 보여줍니다.","season":"연중","access":"JR 비와코선 각 역에서 액세스 가능"},"宮島・厳島神社":{"name":"미야지마・이쓰쿠시마 신사","desc":"바다에 떠있는 주홍색의 큰 도리이는 일본의 상징적 절경. 일본 삼경의 하나이며 세계 유산의 신성한 섬.","detail":"만조시에는 사전이 바다에 떠있는 것처럼 보이고 환상적. 간조시에는 큰 도리이까지 걸어갈 수 있습니다. 석양에 물드는 오토리이는 특히 그림이 되는 절경. 미야지마의 야생 사슴도 명물.","season":"연중(간조의 시간대를 노려 방문)","access":"JR 산요 본선 「미야지마구치역」에서 페리로 약 10분"},"出雲大社":{"name":"이즈모타이샤","desc":"인연의 하나님·대국주대신을 모시는 일본에서 가장 오래된 신사 중 하나. 일본 최대의 주련 줄과 신비한 신역.","detail":"음력 10월(신재월)에는 전국의 하나님이 모이는 신성한 땅. 높이 6m의 대주 연줄은 압권. 이나사의 바닷가와 히노미나 등대 등 주변의 절경도 함께 방문하고 싶다.","season":"연중(음력 10월의 신재월이 특히 신비적)","access":"이치하타 전철 「이즈모타이샤마에역」에서 도보 5분"},"大歩危峡":{"name":"다이호 위협","desc":"요시노가와가 새긴 약 8km의 V자협곡. 흰색과 녹색의 기암이 이어지는 협곡미는 「검산국정공원」의 절경 명소.","detail":"계곡을 가는 유람선에서 올려다보는 암벽이 압권. 봄의 신록·가을 단풍이 특히 아름답다. 근처의 코보위협과 세트로 방문하는 것이 추천. 이부야 카즈라 다리에의 액세스 거점이기도 하다.","season":"연중(단풍의 10~11월이 최고)","access":"JR 토요선 「오보케역」 하차 바로"},"室戸岬":{"name":"무로토 미사키","desc":"고치현의 태평양에 돌출한 곶. 거친 바위밭과 절벽이 이어져 공해가 수행한 땅으로도 유명한 영장.","detail":"유네스코 세계 지오파크에 인정. 암맥이나 주상절리 등 지질학적으로 볼거리 가득. 등대에서의 전망은 태평양을 독점하는 호쾌한 절경.","season":"연중","access":"고치역에서 버스로 약 2시간 30분"},"九十九島":{"name":"구주쿠시마","desc":"나가사키현 사세보시 앞바다에 점재하는 208개의 섬들. 섬의 밀도가 일본 제일로, 석양에 물드는 섬 그림자의 경치가 일품.","detail":"전해봉·이시다케 전망대에서의 전망이 특히 유명. 펄시 리조트에서 유람선을 타고 섬들을 꿰매는 체험도 인기. 굴·진주의 산지이기도 하다.","season":"연중(석양의 가을·겨울이 특히 아름답다)","access":"사세보 역에서 차로 약 20 분"},"霧島連山":{"name":"기리시마 연산","desc":"기리시마 신궁과 화산군이 공존하는 규슈 남부의 절경 에리어. 한국악산 정상에서의 전망과 다카치호의 미네가 장대.","detail":"천손 강림의 땅으로 여겨지는 기리시마는 신화의 무대. 기리시마 온천향은 일본에서 가장 오래된 온천 중 하나. 연못 순회 코스에서는 화산 호수, 로쿠칸논 연못 등도 즐길 수 있습니다.","season":"연중(봄의 미야마 키리시마가 유명)","access":"기리시마 진구역에서 버스로 약 25분"},"古宇利島":{"name":"코우리지마","desc":"오키나와 본섬 북부에 걸치는 고우리 오하시와 에메랄드 그린의 바다가 만들어내는 절경. 「사랑의 섬」으로서 유명.","detail":"다리를 건너면 백사장과 산호초의 아름다운 해변이 펼쳐집니다. 하트 록은 연애 파워 스폿으로 인기. 다리 위에서 바다의 전망은 압권.","season":"4~10월(바다의 투명도가 특히 높음)","access":"나하 공항에서 차로 약 2시간"},"慶良間諸島":{"name":"게라마 제도","desc":"나하에서 배로 약 30~50분의 낙도군. 세계 굴지의 투명도를 자랑하는 바다는 '케라마 블루'로 불린다.","detail":"스노클링과 다이빙에서 볼 수 있는 여러 가지 빛깔의 산호와 바다거북은 압권. 혹등고래를 볼 수 있는 겨울(1~3월)도 인기. 자마미지마・아카지마가 특히 유명.","season":"연중(겨울은 고래 관찰, 봄~가을은 해양 스포츠)","access":"나하・박항에서 페리로 약 50분~2시간"},"西表島":{"name":"이리오모테지마","desc":"일본 최대의 맹그로브 숲을 가지는 「동양의 갈라파고스」. 일리오 모테야마네코가 서식하는 아열대의 비경.","detail":"피나이사라 폭포(오키나와 최대 폭포)로의 카누 트레킹이 인기. 동료강의 맹그로브 크루즈도 필견. 세계 자연유산(2021년 등록)에 인정되었습니다.","season":"연중(3~6월・10~11월이 보내기 쉽다)","access":"이시가키항에서 페리로 약 35~50분"},"支笏湖":{"name":"시코쓰호","desc":"일본 최북의 부동호. 투명도의 높이는 일본 톱 클래스로, 호수 바닥까지 바라볼 수 있는 신비한 코발트 블루의 호수.","detail":"카누와 카약으로 호수를 건너면서 호수 바닥의 바위를 관찰할 수 있습니다. 겨울의 시코쓰호 빙주 축제에서는 무수한 얼음의 오브제가 환상적인 광경을 만들어 냅니다.","season":"연중(겨울의 빙주 축제는 1월 하순~2월)","access":"신치토세 공항에서 차로 약 40분"},"大沼国定公園":{"name":"오누마 국정 공원","desc":"고마가다케를 배경으로 크고 작은 126개의 섬이 흩어져 있는 호수 늪군. 호수에 비치는 고마가다케의 거꾸로 후지와 단풍이 절경.","detail":"사이클링, 카누, 낚시 등 활동도 풍부. 겨울에는 스케이트와 빙어 낚시도 즐길 수 있습니다. 하코다테로부터의 액세스도 좋고 당일치기 관광에 최적.","season":"연중(10월의 단풍이 특히 아름답다)","access":"JR 하코다테 본선 「오누마 공원역」에서 도보 5분"},"層雲峡":{"name":"소운협","desc":"다이세츠산 국립공원 내, 이시카리강이 새긴 절벽 절벽이 24km 계속되는 협곡. 주상절리의 암벽과 유성·은하의 폭포가 압권.","detail":"로프웨이+리프트로 쿠로다케 5합목·7합목에. 가을의 단풍(9월 하순~)은 특히 아름답고, 겨울의 빙포 축제도 유명. 온천가도 충실.","season":"연중(단풍의 9월 하순~10월・겨울의 빙폭이 특히 인기)","access":"아사히카와역에서 버스로 약 2시간"},"礼文島・桃岩展望台":{"name":"레분도·모모이와 전망대","desc":"일본 최북의 꽃이 떠 있는 섬. 다카야마 식물이 해안 근처에서 피어 자랑, 리시리 후지를 바라보는 절경과 합쳐져 천국과 같은 경치.","detail":"레분도는 고도가 낮기 때문에 고산 식물이 가까이에 피어 있습니다. 모모이와 전망대 코스에서는 리시리섬·레분도의 웅대한 경치와 꽃밭을 동시에 즐길 수 있습니다.","season":"5~8월(꽃 시즌)","access":"왓카나이항에서 페리로 약 2시간"},"ニセコ・羊蹄山":{"name":"니세코 · 양발산","desc":"일본 스키 리조트의 성지. 파우더 스노우의 눈질은 세계 톱 클래스. 여름에는 양발산을 배경으로 한 시골 풍경이 절경.","detail":"양발산은 ‘에조후지’라고도 불리는 우아한 성층화산. 산기슭의 시골과 농장에서 바라보는 경치는 홋카이도다운 장엄한 절경. 여름 등산(왕복 약 8시간)도 인기.","season":"겨울(스키)・여름(등산・사이클링)","access":"케지안역에서 차로 약 15분"},"角館・武家屋敷と桜":{"name":"각관·무가 저택과 벚꽃","desc":"도호쿠의 교토라고 불리는 성시. 무가 저택을 따라 시다레자쿠라와 칠판담이 만들어내는 압권의 봄 경치.","detail":"약 400그루의 시다레자쿠라가 무가 저택 거리를 물들이는 봄(4월 하순~5월 상순)은 특히 유명. 중요 전통적 건조물군 보존지구로 선정. 가을 단풍도 아름답다.","season":"4월 하순~5월 상순(벚꽃), 10~11월(단풍)","access":"JR 아키타 신칸센 「카쿠다테역」에서 도보 15~20분"},"十和田湖":{"name":"토와다 호","desc":"이중 칼데라 호수에서 일본 최대의 고원 호수. 호수를 둘러싼 원생림의 단풍과 미쿠라 반도에서의 경치가 절경.","detail":"오이라세 계류의 근원. 유람선과 호반 하이킹을 즐길 수 있습니다. 토와다 신사가 있는 미쿠라 반도는 신비한 분위기. 겨울은 눈 덮인 환상적인 경치에.","season":"10월~11월(단풍)이 최고","access":"JR 하치노헤선 「하치노헤역」에서 버스로 약 2시간"},"龍泉洞":{"name":"용천동","desc":"세계 유수의 투명도를 자랑하는 지저호를 가진 종유동. 코발트 블루에 빛나는 호수의 깊이는 120m에 이른다.","detail":"세계 3대 종유동의 하나라고도 불리는 이와테의 비경. 지저호는 깊을수록 흡입되는 듯한 청색이 아름답다. 동내는 연간 10℃ 전후로 여름은 시원하다.","season":"연중","access":"모리오카 역에서 버스로 약 2 시간"},"猊鼻渓":{"name":"추비계","desc":"모래 철강이 석회암을 새긴 아름다운 협곡. 선두가 장대 하나로 조종하는 배 아래로 양안의 절벽과 초록을 즐긴다.","detail":"약 2km를 배로 왕복하는 배 아래가 명물. 선두가 노래하는 「게이비 추분」이 계곡에 울려 퍼집니다. 가을 단풍과 겨울 설경도 훌륭합니다.","season":"연중(단풍의 11월·눈의 1~2월이 환상적)","access":"JR 오후나도선 '쿠니코케이역'에서 도보 5분"},"象潟（きさかた）":{"name":"象潟 (기사 카타)","desc":"한때 송도와 늘어선 경승지로 여겨진 아키타 해안. 지진 융기 후에는 육지로 바뀌고, 논 속에 섬이 떠오르는 독특한 시골 절경.","detail":"마츠오 바쇼가 「안쪽의 길」에서 방문한 땅. 현재는 토리카이산을 배경으로 논 속에 도만사의 나무들이 섬처럼 떠오르는 독특한 경관. 석양의 명소로도 유명.","season":"6~8월(논이 녹색으로 빛난다)","access":"JR 하코시 본선 '상가역'에서 도보 20분"},"鎌倉・長谷寺":{"name":"가마쿠라·하세지","desc":"바다를 내려다보는 고대에 서 있는 고찰. 수국의 명소로 유명하며 장마철에는 경내가 2500주의 수국으로 물들여진다.","detail":"목조 입상에서는 일본 최대급의 11면 관음 보살이 본존. 전망대에서는 사가미만과 유이가하마를 한눈에 볼 수 있습니다. 11월의 단풍과 봄의 매화도 아름답다.","season":"6월(수국), 11월(단풍)이 특히 유명","access":"에노덴 「하세역」에서 도보 5분"},"日光東照宮":{"name":"닛코 도쇼구","desc":"도쿠가와 이에야스를 모시는 장려한 사전군. 「보지 않는다・말하지 않는다・듣지 않는다」의 삼원과 잠 고양이로 유명한 세계 유산.","detail":"양명문(닛포몬)은 에도 장식예술의 멋을 모은 걸작. 닛코의 사사로서 세계 유산 등록. 주변의 닛코 니아라야마 신사·와노지와 함께 참배를.","season":"연중(봄의 벚꽃・가을의 단풍이 특히 아름답다)","access":"JR닛코선 「닛코역」에서 도보・버스로 약 20분"},"草津温泉・湯畑":{"name":"구사쓰 온천・유바타","desc":"일본 3명천의 하나. 중심부에 펼쳐지는 유바타는 매분 4000리터 이상의 원천이 솟아나는 압권의 광경.","detail":"유바타를 중심으로 한 온천 마을은 풍정이 있어 유모미 쇼도 인기. 독특한 산성천질은 많은 병에 효과가 있다고 하여 에도시대부터 계속되는 명탕. 겨울의 설경과 온천의 조합이 일품.","season":"연중(겨울의 유키미 온천이 특히 인기)","access":"가루이자와・시부카와・나가노하라 구사쓰구치역 등에서 버스로 약 1시간~"},"那須高原":{"name":"나스 고원","desc":"나스다케를 배경으로 펼쳐지는 고원 리조트. 다우스다케의 분기와 사계의 꽃밭, 단풍, 스키와 연중 즐길 수 있다.","detail":"나스 로프웨이로 차우스 타케 산 정상 부근에. 살생석의 분기공도 볼거리. 고원에는 미술관·목장·아울렛 등 관광 시설도 충실.","season":"연중(10~11월 단풍이 특히 인기)","access":"JR도호쿠 본선 ‘쿠로이소역’에서 버스로 약 50분"},"昇仙峡":{"name":"승선협","desc":"일본 제일의 계곡미라고 불리는 야마나시의 협곡. 기암괴석이 연속하는 계곡과 센다이 폭포의 낙차 30m의 호쾌한 폭포가 절경.","detail":"센다이 폭포·각원봉·석문 등 독특한 지형이 이어지는 약 5km의 코스. 수정과 보석의 산지로도 유명하고 보석 가게가 많다. 가을 단풍이 특히 절경.","season":"연중(10~11월 단풍이 최고)","access":"고후역에서 버스로 약 40분"},"富士山・スバルライン五合目":{"name":"후지산・스바루 라인 오합목","desc":"후지산 고아메까지 차로 액세스할 수 있는 절경 명소. 운해 위에 나오면 다른 세계의 경치가 펼쳐진다.","detail":"해발 2305m, 눈 아래로 펼쳐지는 운해와 후지산의 산 정상을 가까이에 체감할 수 있다. 등산의 기점이기도 하고, 7~8월의 등산 시즌은 매우 혼잡. 마이카 규제 기간 있음.","season":"7~8월(등산), 가을 겨울 운해도 인기","access":"가와구치코역에서 후지 스바루 라인(마이카 규제 기간은 버스)"},"能登半島・白米千枚田":{"name":"노토 반도·백미 치마타","desc":"일본해에 면한 급사면에 1004장의 계단식 논이 펼쳐지는 압권의 경관. 일본의 원풍경과 일루미네이션 「아제의 반짝임」이 유명.","detail":"10월~3월은 약 25,000개의 LED가 계단식 논을 물들이는 「아제의 반짝임」이 개최. 일본의 계단식 논 백선에 선정. 석양과 계단식 논의 대비도 일품.","season":"연중(10~3월의 LED 라이트 업이 인기)","access":"가나자와역에서 차로 약 1시간 30분"},"妻籠宿":{"name":"츠마사쿠야도","desc":"나카야마도의 여관초가 거의 완전한 형태로 남는 나가노의 절경. 에도 시대에 타임 슬립 한 것 같은 자갈길과 고민가의 거리 풍경.","detail":"일본에서 최초로 거리를 보존한 스쿠바초. 전주가 없어 철저한 경관 보전이 인상적. 옆의 마고주쿠(기후현)까지 약 8km의 하이킹도 인기.","season":"연중(봄의 벚꽃・가을의 단풍이 특히 아름답다)","access":"JR 중앙 본선 「난기 소역」에서 버스로 약 10 분"},"奥大井湖上駅":{"name":"오쿠오이코가미역","desc":"댐 호수로 돌출한 반도의 끝에 서있는 비경의 역. 압토식 철도와 호수의 절경이 환상적인 경치를 만들어낸다.","detail":"오시코 호수에 떠있는 것처럼 보이는 역으로 철교 '레인보우 브릿지'를 걸을 수 있습니다. 주변은 하이킹 코스도 정비된 오이가와 철도의 비경 에리어.","season":"연중(단풍의 10~11월이 특히 절경)","access":"오이가와 철도 이카와선 「오쿠오이코가미역」 하차"},"天竜峡":{"name":"천룡협","desc":"텐류강이 남 알프스를 깎아 만들어낸 계곡. '일본 라인'이라고도 불리는 절벽 절벽과 계류미가 이어진다.","detail":"유람선에서의 라인 다운이 명물. 봄의 벚꽃과 가을의 단풍이 특히 아름답고, 사계를 통해 변화하는 계곡미가 매력. 텐류쿄 온천도 근처 당일치기 온천도 즐길 수 있습니다.","season":"연중(10~11월 단풍이 최고)","access":"JR 이이다선 「텐류쿄역」에서 도보 5분"},"馬籠宿":{"name":"馬籠宿","desc":"나카야마도 69구의 여관초. 시마자키 후지무라의 출신지로, 조약돌과 수차 오두막이 남는 산의 경사면에 펼쳐지는 그림 같은 숙소.","detail":"츠마사쿠야도와의 고개 넘어 워킹(약 8 km)이 인기. 도중의 마고 고개로부터의 전망도 훌륭하다. 후지무라 기념관에서도 깊게 역사를 배울 수 있습니다.","season":"연중(벚꽃의 4월·단풍의 10~11월)","access":"JR 중앙 본선 「나카츠가와역」에서 버스로 약 30분"},"貴船神社":{"name":"키부네 신사","desc":"교토의 산 안쪽에 진좌하는 물의 신의 사. 초록의 참배길과 등롱이 늘어선 환상적인 돌계단, 여름의 강바닥 요리가 유명.","detail":"겨울의 설경과 등롱 라이트 업은 환상적인 아름다움. 6월의 수면에 떠오르는 물 점도 인기. 계산 전철 「키후네구치」에서 강변을 걷는 길도 그림이 됩니다.","season":"연중(단풍의 11월·눈의 1~2월이 특히 환상적)","access":"계산 전철 「키부네구치역」에서 도보 약 20분"},"大台ヶ原":{"name":"오다이가하라","desc":"연간 강수량 5000mm를 넘는 일본 제일의 다우 지대. 원생 숲과 이끼, 안개에 싸여 환상적인 세계 유산의 산.","detail":"히데가가타케 정상(해발 1695m)에서는 맑은 날씨에 후지산도 보일 수 있다. 동대대 코스(약 8km)는 패밀리에서도 걸을 수 있습니다. 일본 지카의 서식지이기도 하다.","season":"5월~11월(봄의 신록·가을의 단풍)","access":"야마토 카미시 역 또는 오다이 쵸에서 버스 또는 차로 약 1 시간"},"城崎温泉":{"name":"기노사키 온천","desc":"일본해에 가까운 산간 온천 마을. 야나기 가로수와 오가와가 흐르는 정서 있는 외탕 순회를 즐길 수 있는 간사이 굴지의 온천지.","detail":"7개의 외탕을 유카타로 걷는 「외탕 순회」가 명물. 게게게의 키타로의 작자 미즈키 시게루가 사랑한 땅이기도 하다. 겨울의 마츠바게(일본해의 대게)도 일품.","season":"연중(11~3월의 게 시즌・겨울의 설경도 인기)","access":"JR 산인 본선 「기로사키 온천역」 바로"},"奈良・東大寺と春日大社":{"name":"나라·도다이지와 카스가타이샤","desc":"세계 유산의 대불과 광대 한 공원. 1300마리의 야생 사슴이 인간과 공존하는 세계에서도 유례없는 절경의 고도.","detail":"세계 최대급의 목조 건축·도다이지 대불전과 나라의 대불은 압권. 봄의 벚꽃・가을의 단풍도 사슴과 함께 그림이 되는 경치. 와카쿠사야마에서 나라 분지의 전망도 필견.","season":"연중","access":"긴테쓰 나라 역 · JR 나라 역에서 도보 또는 시내 버스"},"帝釈峡":{"name":"제석협","desc":"중국 지방 최대의 계곡 국정 공원. 석회암이 새겨진 계곡과 천연의 이시바시 「오오하시」가 만들어내는 절경.","detail":"유바시는 세계에서도 최대급의 천연석 다리(폭 90m·높이 40m). 제석천을 가는 유람선에서 바라보는 절벽 절벽은 박력 만점. 단풍 시즌은 특히 아름답습니다.","season":"연중(11월의 단풍이 최고)","access":"JR 후쿠시오 선 「비고 오치아이 역」에서 차로 약 30 분"},"蒜山高原":{"name":"가야마 고원","desc":"중국 산지 최고봉·아오야마 산자를 배경으로 펼쳐지는 상쾌한 고원. 저지 소가 잔디를 먹는 목가적인 경치가 그림이 된다.","detail":"중국 지방 굴지의 피서지. 가마야마 고원 센터를 중심으로 사이클링과 승마도 즐길 수 있습니다. 아오야마 야키소바는 명물 음식. 가을 코스모스밭도 인기.","season":"연중(봄~가을의 드라이브가 특히 기분 좋다)","access":"요나고 자동차도로 「아키야마 IC」에서 차로 약 10분"},"秋吉台・秋芳洞":{"name":"아키요시다이·아키요시동","desc":"일본 최대의 카르스트 대지와 일본 최대의 종유동. 석회암이 만들어내는 하얀 돔 모양의 초원과 지저 사원.","detail":"아키요시다이는 약 300만년 전의 산호초가 지상에 나타난 카르스트 대지. 매년 봄에 열리는 노야키로 새까맣게 되어, 이윽고 초록의 대지로 돌아오는 독특한 경관도 볼거리.","season":"연중(3월 노야키 후 신록이 특히 아름답다)","access":"신야마구치역・야마구치역에서 버스로 약 45분"},"津和野":{"name":"쓰와노","desc":"산인의 교토라고 불리는 시마네의 작은 성시. 굴할 수영하는 무수한 금잉과 흰 벽 토장이 아름답다.","detail":"타이코야 이나세이 신사의 센본 도리이가 특히 유명. 5월의 사무라이 신사(유네스코 무형문화유산)도 볼거리. SL 야마구치호에서의 액세스도 여정 넘치는 체험.","season":"연중(벚꽃・잉어・단풍과 사계절의 경치)","access":"JR 야마구치선 「쓰와노역」 바로"},"仁淀川":{"name":"니요도가와","desc":"수질 일본 제일(국토 교통성 조사)을 기록한 적이 있는 고치현의 청류. 「니요도 블루」라고 불리는 투명감 발군의 청색.","detail":"강의 보석 상자라고 불리는 야스이 계곡, 니코 후치 등 여러 절경 명소가 점재. 카누와 강 놀이도 즐길 수 있습니다. 시만토가와와 늘어선 고치의 2대 청류.","season":"연중(여름의 강놀이·가을의 단풍이 특히 인기)","access":"고치역에서 차로 약 1~2시간(스폿에 따라 다름)"},"足摺岬":{"name":"아시즈리곶","desc":"태평양에 돌출한 고치현 최남단의 곶. 절벽에서 내려다 보이는 쿠로시오의 대해원과 등대가 그림이 되는 절경.","detail":"백악의 아시즈리미사키 등대는 일본 최대의 등대의 하나. 주변 산책로에서 태평양의 장엄한 전망을 즐기실 수 있습니다. 존 만지로 연고의 땅이기도 하다.","season":"연중(겨울에도 온난하고 방문하기 쉽다)","access":"고치역・스쿠모역에서 버스로 약 3~4시간"},"道後温泉":{"name":"도고 온천","desc":"일본에서 가장 오래된 온천으로 여겨지는 마쓰야마의 명탕. 나츠메 소세키의 「보짱」에 등장하는 역사 있는 온천 누각이 상징.","detail":"도고 온천 본관은 메이지 27년 축하의 역사적 건조물(현재 개수중·일부 영업중). 주변은 상가도 충실하고 먹고 걷는 것도 즐겁다. 마쓰야마성과 세트로 방문하고 싶다.","season":"연중","access":"JR 마츠야마역에서 시전으로 약 15분, 「도고온천」하차"},"鳴門の渦潮":{"name":"나루토의 소용돌이","desc":"세계 3대 조류의 하나, 최대 직경 30m에 달하는 소용돌이 나루토 해협에서 발생하는 자연의 대 스펙터클.","detail":"오나루토 다리의 유리로 된 산책로 \"와류의 길\"에서 소용돌이를 내려다보십시오. 유람선에서 근거리에서 소용돌이를 관찰하는 체험도 인기. 조위표에서 대조의 날을 노리고 방문을.","season":"연중(봄・가을의 대조시가 최대의 소용돌이에)","access":"JR 나루토선 「나루토역」에서 버스로 약 20분"},"指宿・砂むし温泉":{"name":"이부스키 · 모래 무시 온천","desc":"가고시마의 모래사장에 솟는 천연온천에서 전신을 모래마다 따뜻하게 하는 「모래찜질 온천」. 세계에서도 드문 자연의 건강 체험.","detail":"모래 속에 온천이 솟아 나오고 있으며, 그 위에 자고 모래를 걸어주는 독특한 입욕법. 해독 효과가 높으면 인기. 개문악의 전망도 아름답다.","season":"연중","access":"JR 이부스키 쿠라사키선 「이부스키역」에서 도보 약 15분"},"軍艦島（端島）":{"name":"군함도(단도)","desc":"나가사키 앞바다의 폐허의 섬. 최성기는 세계 최고의 인구 밀도를 자랑한 탄광의 섬으로 지금은 세계 유산의 폐허가 해상에 떠오른다.","detail":"게임이나 영화의 모델이 된 독특한 폐허 경관이 세계적으로 주목. 유람선＋상륙 투어로 섬내를 견학할 수 있습니다(날씨에 의해 중지 있음).","season":"연중(황천시에는 상륙 불가)","access":"나가사키항에서 유람선으로 약 40분(예약 필요 투어)"},"由布院温泉":{"name":"유후인 온천","desc":"유후다케를 배경으로 펼쳐지는 오이타현의 인기 온천지. 아사기리가 들어갈 수 있는 호수 위와 유후다케의 절경이 대명사.","detail":"금린호의 호수 바닥에서 온천이 솟아 나오고, 이른 아침에는 환상적인 안개가 쌓입니다. 세련된 카페와 잡화점이 늘어선 유노평 가도 산책도 인기.","season":"연중(이른 아침 금린호 안개가 가장 환상적)","access":"JR 쿠다이 본선 「유후인 역」하차 바로"},"天草・崎津集落":{"name":"아마쿠사・사키즈 마을","desc":"그리스도 탄압의 역사를 가진 세계 유산의 어촌. 고딕 양식의 사키츠 텐슈도가 해변에 우뚝 솟은 독특한 절경.","detail":"바다의 천주당으로 유명한 사키즈 천주당은 어촌 안에 세워진 드문 교회. 바다를 향해 세우는 모습과 석양의 콘트라스트가 아름답다. 주변 아마쿠사탄의 바다도 푸르고 아름답다.","season":"연중","access":"구마모토역에서 차로 약 2시간 30분"},"雲仙地獄":{"name":"운젠 지옥","desc":"나가사키현의 운젠 온천에 펼쳐지는 지열 지대. 분기와 온천이 지면 곳곳에서 분출하는 이상하고 환상적인 광경.","detail":"대규환 지옥·실 지옥 등 30개 이상의 지옥이 점재. 에도시대는 키리시탄 탄압의 땅이기도 하다. 운젠 온천은 일본 최초의 국립공원으로 지정된 온천지.","season":"연중","access":"JR 나가사키 본선 「이사하야역」에서 버스로 약 1시간 10분"},"波照間島":{"name":"하 테루마 섬","desc":"일본 최남단의 유인도. 코발트 블루의 바다 '하텔마블루'와 만천의 밤하늘은 일본에서 가장 아름답다고 한다.","detail":"광해가 거의 없기 때문에 밤하늘의 별의 수가 압도적. 남십자성이 보이는 일본 유일의 장소로도 알려져 있습니다. 니시하마의 바다의 투명도는 일본 톱 클래스.","season":"3~6월(남십자성 관측과 바다가 아름답다)","access":"이시가키항에서 페리로 약 1시간"},"ハテの浜（久米島）":{"name":"하테의 해변(쿠메지마)","desc":"쿠메지마 앞바다에 떠 있는 무인 모래 주. 에메랄드 그린의 바다에 하얀 모래만이 늘어나는, 바로 「천국의 바다」.","detail":"쿠메지마에서 배로 30분. 모래사장과 에메랄드의 바다만이 펼쳐지는 압도적인 절경. 스노클링으로 바다 거북을 만날 수 있는 것도. 당일치기 투어로 방문이 기본.","season":"4~10월(바다가 가장 아름다운)","access":"구메지마 공항에서 차로 약 20분＋배로 30분"},"与那国島":{"name":"요나 구니 섬","desc":"일본 최서단의 섬. 대만까지 약 111km의 위치에 있으며, 거대한 해머 헤드 상어가 모이는 다이빙 명소로 세계적으로 유명.","detail":"겨울(1~3월)에는 해머헤드 상어(슈모쿠상어)의 무리를 만날 수 있는 다이빙 포인트로서 전세계에서 다이버가 방문합니다. 해저 유적도 있다.","season":"연중(겨울 상어 다이빙·여름 바다가 절경)","access":"나하 공항에서 비행기로 약 1시간(이시가키 경유)"},"長瀞（ながとろ）":{"name":"나가토로","desc":"아라카와가 결정편암을 깎아낸 사이타마현의 계곡. 라인 다운과 핑크 바위 다다미가 유명한 관동 근교의 절경 명소.","detail":"래프팅 라인 내리막으로 바위 다다미의 계곡미를 체감할 수 있습니다. 이와 다다미는 천연 기념물로 지정된 특이한 지형. 가을은 단풍, 봄은 벚꽃의 명소이기도 하다.","season":"연중(3월 벚꽃·11월 단풍·여름 래프팅이 인기)","access":"치치부 철도 “나가토로역”에서 도보 5분"},"天橋立・伊根の舟屋":{"name":"아마노하시다테・이네의 후나야","desc":"일본 유일의 해상 마을. 에도시대부터 이어지는 어부의 집이 해면 스레슬리에 늘어서 1층이 배의 차고가 되고 있다.","detail":"약 230채의 후나야가 늘어선 이네만은 마치 바다에 집이 떠 있는 것 같다. 유람선에서 바라보는 것이 정평으로, 민박에 묵어 어부 요리를 즐길 수 있는 체험도 인기.","season":"연중","access":"아마노하시다테역에서 버스로 약 30분"},"別府温泉・地獄めぐり":{"name":"벳푸 온천・지옥 순회","desc":"일본 제일의 원천수를 자랑하는 벳푸에 솟는 개성 풍부한 「지옥」. 코발트 블루의 해지옥·붉은 피의 연못 지옥 등 7종을 즐길 수 있다.","detail":"관광지옥으로 정비된 7곳의 원천을 둘러싼 ‘지옥 순회’가 명물. 벳푸만을 바라보는 족탕, 찜 요리 등 개성 넘치는 온천 체험이 충실.","season":"연중","access":"JR 닛포 본선 「벳푸역」에서 버스로 약 20분"},"平尾台":{"name":"히라오다이","desc":"기타큐슈시 교외에 펼쳐지는 규슈 최대의 카르스트 대지. 양 무리 같은 석회암 바위가 초원에 흩어져있는 독특한 절경.","detail":"아키요시다이와 늘어선 서일본을 대표하는 카르스트 대지. 종유동(천불 종유동)도 인근에 있습니다. 봄의 야끼 후 신록과 바위봉의 대비가 특히 아름답습니다.","season":"연중(3월의 노야키·5월의 신록이 특히 아름답다)","access":"JR 닛포 본선 「고쿠라역」에서 차로 약 40분"}}};</script>

const baseToast=toast;toast=function(message){const maps={en:{'行きたいリストに追加しました':'Saved','行きたいリストから外しました':'Removed from saved places','行きたいに追加しました':'Saved','行きたいから外しました':'Removed from saved places','旅行計画に追加しました':'Added to trip','メモを保存しました':'Notes saved','写真を保存しました':'Photo saved','データを読み込みました':'Data imported'},'zh-TW':{'行きたいリストに追加しました':'已收藏','行きたいリストから外しました':'已取消收藏','行きたいに追加しました':'已收藏','行きたいから外しました':'已取消收藏','旅行計画に追加しました':'已加入行程','メモを保存しました':'筆記已儲存','写真を保存しました':'照片已儲存','データを読み込みました':'資料已匯入'},ko:{'行きたいリストに追加しました':'저장했습니다','行きたいリストから外しました':'저장에서 삭제했습니다','行きたいに追加しました':'저장했습니다','行きたいから外しました':'저장에서 삭제했습니다','旅行計画に追加しました':'여행에 추가했습니다','メモを保存しました':'메모를 저장했습니다','写真を保存しました':'사진을 저장했습니다','データを読み込みました':'데이터를 가져왔습니다'}};baseToast(maps[mapLanguage]?.[message]||message)};
applyFilters=function(){const q=$('searchInput').value.trim().toLowerCase(),season=$('seasonFilter').value,access=$('accessFilter').value;filteredSpots=data.filter(s=>{const d=trSpot(s),hay=(kind==='scenic'?`${s.name} ${s.region} ${s.desc} ${s.detail} ${s.season} ${s.access} ${(s.tags||[]).join(' ')} ${d.name} ${d.region} ${d.desc} ${d.detail} ${d.season} ${d.access}`:`${s.name} ${s.region} ${s.desc} ${s.quality} ${s.effect} ${s.season} ${s.access} ${d.name} ${d.region} ${d.desc} ${d.quality} ${d.effect} ${d.season} ${d.access}`).toLowerCase();let ok=(!currentRegion||s.region===currentRegion)&&(!q||hay.includes(q))&&(!season||(season==='通年'?s.season.includes('通年'):(season===currentSeason()?isInSeason(s):s.season.includes(season))))&&(!access||accessType(s)===access)&&(!$('wishOnly').checked||wishes.has(s.name))&&(!$('unvisitedOnly').checked||!visited.has(s.name))&&(!$('nowOnly').checked||isInSeason(s));if(kind==='scenic')ok=ok&&(!$('typeFilter').value||(s.tags||[]).includes($('typeFilter').value));else ok=ok&&(!$('qualityFilter').value||s.quality.includes($('qualityFilter').value))&&(!$('effectFilter').value||s.effect.includes($('effectFilter').value));return ok});const sort=$('sortFilter').value;if(sort==='distance'&&userPosition)filteredSpots.sort((a,b)=>distanceKm(userPosition,a)-distanceKm(userPosition,b));if(sort==='season')filteredSpots.sort((a,b)=>Number(isInSeason(b))-Number(isInSeason(a)));if(sort==='name')filteredSpots.sort((a,b)=>trSpot(a).name.localeCompare(trSpot(b).name,mapLanguage));setText('resultCount',`${filteredSpots.length} / ${TOTAL} ${ui().resultUnit}`);renderMarkers();renderList();closePanel()};
const baseRenderSaved=renderSaved;renderSaved=function(){baseRenderSaved();if(mapLanguage==='ja')return;const t=ui(),box=$('savedContent');if(currentTab==='wishes'){const arr=[...wishes].map(spotByName).filter(Boolean);box.innerHTML=arr.length?arr.map(s=>{const d=trSpot(s);return`<div class="saved-item"><span><strong>${esc(d.name)}</strong><br><small>${esc(d.region)}${kind==='onsen'?'・'+esc(d.quality):''}</small></span><span><button class="action-btn" data-add="${s.id}">${t.toPlan}</button><button class="action-btn danger" data-unwish="${s.id}">${t.remove}</button></span></div>`}).join(''):`<p>${t.emptyWish}</p>`;box.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addToPlan(data[+b.dataset.add].name));box.querySelectorAll('[data-unwish]').forEach(b=>b.onclick=()=>{wishes.delete(data[+b.dataset.unwish].name);persist(kind==='scenic'?'japanScenicWishes':'japanOnsenWishes',[...wishes]);renderSaved();renderList()});return}if(!tripPlan.length){box.innerHTML=`<p>${t.emptyPlan}</p>`;return}const days=[...new Set(tripPlan.map(x=>x.day))].sort((a,b)=>a-b);box.innerHTML=days.map(day=>`<div class="plan-day">${mapLanguage==='zh-TW'?'第'+day+'天':mapLanguage==='en'?t.day+' '+day:day+t.day}</div>${tripPlan.filter(x=>x.day===day).map(x=>{const s=spotByName(x.name),d=s?trSpot(s):{name:x.name,region:''};return`<div class="plan-item"><span>${esc(d.name)}<br><small>${esc(d.region)}</small></span><span><button class="action-btn" data-day="${esc(x.name)}">${t.nextDay}</button><button class="action-btn danger" data-remove="${esc(x.name)}">${t.remove}</button></span></div>`}).join('')}`).join('')+`<div class="action-row"><button class="action-btn primary" id="routeAll">${t.openRoute}</button><button class="action-btn" id="copyPlan">${t.copyPlan}</button></div>`;box.querySelectorAll('[data-day]').forEach(b=>b.onclick=()=>{const x=tripPlan.find(x=>x.name===b.dataset.day);x.day++;persist(kind==='scenic'?'japanScenicPlan':'japanOnsenPlan',tripPlan);renderSaved()});box.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{tripPlan=tripPlan.filter(x=>x.name!==b.dataset.remove);persist(kind==='scenic'?'japanScenicPlan':'japanOnsenPlan',tripPlan);renderSaved()});$('routeAll').onclick=()=>{const pts=tripPlan.map(x=>spotByName(x.name)).filter(Boolean);if(!pts.length)return;const o=pts[0],d=pts[pts.length-1],w=pts.slice(1,-1).map(s=>`${s.lat},${s.lng}`).join('|');window.open(`https://www.google.com/maps/dir/?api=1&origin=${o.lat},${o.lng}&destination=${d.lat},${d.lng}${w?'&waypoints='+encodeURIComponent(w):''}`,'_blank','noopener')};$('copyPlan').onclick=()=>copyText(days.map(day=>`${day}: `+tripPlan.filter(x=>x.day===day).map(x=>trSpot(spotByName(x.name)).name).join(' → ')).join('\n'),t.copyPlan)};
async function localizedWeather(s){const t=ui(),names={en:{0:'Clear',1:'Mostly clear',2:'Partly cloudy',3:'Cloudy',45:'Fog',61:'Rain',71:'Snow',80:'Showers',95:'Thunderstorm'},'zh-TW':{0:'晴朗',1:'大致晴朗',2:'局部多雲',3:'陰天',45:'霧',61:'雨',71:'雪',80:'陣雨',95:'雷雨'},ko:{0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',45:'안개',61:'비',71:'눈',80:'소나기',95:'뇌우'}};setText('liveInfo',t.loading);$('conditionAdvice').innerHTML='';const params=kind==='scenic'?'current=temperature_2m,weather_code,cloud_cover,wind_speed_10m&daily=sunrise,sunset,precipitation_probability_max':'current=temperature_2m,weather_code,precipitation,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max';try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&${params}&timezone=Asia%2FTokyo&forecast_days=1`);if(!r.ok)throw 0;const d=await r.json(),c=d.current,rain=d.daily.precipitation_probability_max[0],w=names[mapLanguage]?.[c.weather_code]||names[mapLanguage]?.[3];if(kind==='scenic'){const sunrise=d.daily.sunrise[0].slice(11),sunset=d.daily.sunset[0].slice(11),labels=mapLanguage==='en'?['Weather','Temperature','Clouds','Wind','Sunrise','Sunset','Rain']:mapLanguage==='zh-TW'?['天氣','氣溫','雲量','風速','日出','日落','降雨']:['날씨','기온','운량','바람','일출','일몰','강수'];$('liveInfo').innerHTML=`<div class="live-grid"><span>${labels[0]}: ${w}</span><span>${labels[1]}: ${c.temperature_2m}℃</span><span>${labels[2]}: ${c.cloud_cover}%</span><span>${labels[3]}: ${c.wind_speed_10m}km/h</span><span>${labels[4]}: ${sunrise}</span><span>${labels[5]}: ${sunset}</span><span>${labels[6]}: ${rain}%</span></div>`}else{const labels=mapLanguage==='en'?['Weather','Temperature','High','Low','Rain','Wind']:mapLanguage==='zh-TW'?['天氣','氣溫','最高','最低','降雨','風速']:['날씨','기온','최고','최저','강수','바람'];$('liveInfo').innerHTML=`<div class="live-grid"><span>${labels[0]}: ${w}</span><span>${labels[1]}: ${c.temperature_2m}℃</span><span>${labels[2]}: ${d.daily.temperature_2m_max[0]}℃</span><span>${labels[3]}: ${d.daily.temperature_2m_min[0]}℃</span><span>${labels[4]}: ${rain}%</span><span>${labels[5]}: ${c.wind_speed_10m}km/h</span></div>`}}catch{setText('liveInfo',t.weatherFail)}}
loadLiveInfo=localizedWeather;

// Rebind controls that originally captured the Japanese-only filter function.
let multilingualSearchTimer;
$('searchInput').oninput=()=>{clearTimeout(multilingualSearchTimer);multilingualSearchTimer=setTimeout(applyFilters,180)};
(kind==='scenic'?['seasonFilter','typeFilter','accessFilter','sortFilter']:['qualityFilter','effectFilter','seasonFilter','accessFilter','sortFilter']).forEach(id=>$(id).onchange=applyFilters);

function applyLanguage(lang){mapLanguage=lang;localStorage.setItem('japanMapLanguage',lang);$('languageSelect').value=lang;applyStatic();updateCounter();renderMarkers();renderList();if($('savedDrawer').classList.contains('open'))renderSaved();if(currentSpotName){const s=spotByName(currentSpotName);if(s)localizePanel(s)}}
window.applyMapLanguage=applyLanguage;
$('languageSelect').addEventListener('change',e=>applyLanguage(e.target.value));
applyLanguage(mapLanguage);
})();
