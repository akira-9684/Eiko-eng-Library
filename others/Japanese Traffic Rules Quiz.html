<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本の交通ルール ○×クイズ</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d2430;
      --muted: #647083;
      --line: #d9e0ea;
      --panel: #ffffff;
      --soft: #f4f7fb;
      --road: #303842;
      --accent: #0f766e;
      --warn: #b45309;
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: #eef3f8; color: var(--ink); }
    main { width: min(1120px, calc(100% - 28px)); margin: 0 auto; padding: 22px 0 36px; }
    header {
      display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 16px; align-items: end;
      padding: 0 0 16px; border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0 0 6px; font-size: clamp(24px, 4vw, 38px); letter-spacing: 0; line-height: 1.2; }
    p { margin: 0; line-height: 1.7; }
    .lead { color: var(--muted); max-width: 780px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; align-items: center; }
    select, button {
      border: 1px solid var(--line); background: var(--panel); color: var(--ink); min-height: 40px;
      border-radius: 6px; padding: 8px 12px; font: inherit;
    }
    button { cursor: pointer; font-weight: 700; }
    button.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 16px; margin-top: 18px; align-items: start; }
    .quiz, .side { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .quiz-head {
      display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; padding: 16px;
      background: #f8fafc; border-bottom: 1px solid var(--line); align-items: center;
    }
    .quiz-title { margin: 0; font-size: 20px; line-height: 1.35; }
    .progress { color: var(--muted); font-weight: 700; white-space: nowrap; }
    .question-list { display: grid; gap: 0; }
    .question { display: grid; grid-template-columns: 48px minmax(0, 1fr) auto; gap: 12px; align-items: start; padding: 16px; border-bottom: 1px solid var(--line); }
    .question:last-child { border-bottom: 0; }
    .num { display: grid; place-items: center; width: 36px; height: 36px; border-radius: 50%; background: var(--soft); font-weight: 800; color: var(--muted); }
    .qtext { font-size: 17px; line-height: 1.65; }
    .original { display: block; margin-top: 8px; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .pending { display: inline-block; margin-top: 8px; color: var(--warn); font-size: 13px; font-weight: 700; }
    .answer-box { display: grid; grid-template-columns: 54px 54px; gap: 8px; min-width: 116px; }
    .answer-box input { position: absolute; opacity: 0; pointer-events: none; }
    .answer-box label { display: grid; place-items: center; height: 42px; border: 1px solid var(--line); border-radius: 6px; font-size: 22px; font-weight: 900; background: #fff; cursor: pointer; }
    .answer-box input:checked + label { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15, 118, 110, .15); color: var(--accent); }
    .question.correct { background: #effaf5; }
    .question.wrong { background: #fff3f0; }
    .explain { display: none; grid-column: 2 / 4; margin-top: -4px; color: var(--muted); line-height: 1.7; }
    .question.correct .explain, .question.wrong .explain { display: block; }
    .side { position: sticky; top: 12px; padding: 16px; }
    .score { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .metric { background: var(--soft); border-radius: 8px; padding: 12px; }
    .metric b { display: block; font-size: 28px; line-height: 1; margin-bottom: 4px; }
    .metric span { color: var(--muted); font-size: 13px; }
    .road-wrap { margin: 14px 0; padding: 16px 14px 18px; background: #dce8ee; border-radius: 8px; }
    .road {
      position: relative; height: 88px; border-radius: 6px;
      background: linear-gradient(90deg, transparent 0 8%, rgba(255,255,255,.9) 8% 12%, transparent 12% 20%) 0 42px / 120px 4px repeat-x, var(--road);
      overflow: hidden; border: 4px solid #202832;
    }
    .finish { position: absolute; right: 8px; top: 0; width: 18px; height: 100%; background: linear-gradient(45deg, #fff 25%, #111 25% 50%, #fff 50% 75%, #111 75%) 0 0 / 18px 18px; opacity: .9; }
    .car { position: absolute; left: 8px; top: 30px; width: 54px; height: 28px; border-radius: 10px 15px 8px 8px; background: #dc2626; box-shadow: inset 12px -4px 0 rgba(0,0,0,.12); transform: translateX(0); transition: transform .35s cubic-bezier(.17,.84,.35,1); }
    .car::before { content: ""; position: absolute; left: 14px; top: -10px; width: 26px; height: 14px; border-radius: 10px 10px 0 0; background: #f8fafc; border: 3px solid #dc2626; border-bottom: 0; }
    .car::after { content: ""; position: absolute; left: 7px; bottom: -6px; width: 42px; height: 12px; background: radial-gradient(circle at 6px 6px, #111 0 6px, transparent 6px), radial-gradient(circle at 36px 6px, #111 0 6px, transparent 6px); }
    .result { min-height: 96px; padding: 14px; border-radius: 8px; background: #fff; border: 1px solid var(--line); }
    .result h2 { margin: 0 0 8px; font-size: 20px; line-height: 1.3; }
    .reward { margin: 12px 0 4px; min-height: 74px; display: grid; place-items: center; border-radius: 8px; background: #f8fafc; overflow: hidden; position: relative; }
    .reward strong { position: relative; z-index: 2; font-size: 22px; line-height: 1.35; text-align: center; }
    .reward-perfect { background: #fff7ed; color: #9a3412; }
    .reward-perfect::before { content: "★ ★ ★ ★ ★"; position: absolute; inset: 10px 0 auto; text-align: center; color: #f59e0b; font-size: 28px; animation: sparkle 1s ease-in-out infinite alternate; }
    .reward-almost { background: #ecfeff; color: #155e75; }
    .reward-almost::before { content: ""; position: absolute; width: 42px; height: 42px; border-radius: 50%; background: #22d3ee; left: 16px; top: 16px; animation: roll 1.2s ease-in-out infinite alternate; opacity: .8; }
    .reward-try { background: #eef2ff; color: #3730a3; }
    .reward-try strong { animation: bounceText .9s ease-in-out infinite alternate; }
    @keyframes sparkle { from { transform: translateY(10px) scale(.9); opacity: .65; } to { transform: translateY(-2px) scale(1.08); opacity: 1; } }
    @keyframes roll { from { transform: translateX(0) rotate(0deg); } to { transform: translateX(220px) rotate(360deg); } }
    @keyframes bounceText { from { transform: translateY(5px); } to { transform: translateY(-5px); } }
    .notice { margin-top: 14px; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .actions { display: grid; gap: 10px; margin-top: 14px; }
    @media (max-width: 860px) {
      header, .layout { grid-template-columns: 1fr; }
      .toolbar { justify-content: stretch; }
      select, button { width: 100%; }
      .side { position: static; }
      .question { grid-template-columns: 40px minmax(0, 1fr); }
      .answer-box { grid-column: 2; width: 100%; grid-template-columns: 1fr 1fr; }
      .explain { grid-column: 2; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1 id="appTitle"></h1>
        <p class="lead" id="appLead"></p>
      </div>
      <div class="toolbar">
        <select id="languageSelect" aria-label="Language">
          <option value="ja">日本語</option>
          <option value="en">English</option>
          <option value="ko">한국어</option>
          <option value="zhTW">繁體中文</option>
          <option value="zhCN">简体中文</option>
          <option value="th">ไทย</option>
          <option value="vi">Tiếng Việt</option>
        </select>
        <select id="patternSelect" aria-label="出題パターン"></select>
        <button id="shuffleButton" type="button"></button>
      </div>
    </header>
    <div class="layout">
      <section class="quiz" aria-live="polite">
        <div class="quiz-head">
          <h2 class="quiz-title" id="quizTitle"></h2>
          <div class="progress" id="progressText">0 / 10</div>
        </div>
        <div class="question-list" id="questionList"></div>
      </section>
      <aside class="side">
        <div class="score">
          <div class="metric"><b id="answeredCount">0</b><span id="answeredLabel"></span></div>
          <div class="metric"><b id="scoreCount">-</b><span id="scoreLabel"></span></div>
        </div>
        <div class="road-wrap">
          <div class="road" id="road"><div class="finish"></div><div class="car" id="car" aria-hidden="true"></div></div>
        </div>
        <div class="result" id="resultBox"></div>
        <div class="actions">
          <button class="primary" id="gradeButton" type="button" disabled></button>
          <button id="resetButton" type="button"></button>
        </div>
        <p class="notice" id="noticeText"></p>
      </aside>
    </div>
  </main>
  <script>
    const patterns = [{"id":1,"title":"基本ルール","questions":[{"no":1,"question":"日本では、自動車は原則として道路の左側を通行する。","answer":true,"explanation":"日本は左側通行です。","i18n":{"en":{"question":"In Japan, vehicles generally drive on the left side of the road.","explanation":"Japan uses left-hand traffic."},"ko":{"question":"일본에서는 자동차가 원칙적으로 도로의 왼쪽으로 통행합니다.","explanation":"일본은 좌측통행입니다."},"zhTW":{"question":"在日本，汽車原則上靠道路左側通行。","explanation":"日本採用左側通行。"},"zhCN":{"question":"在日本，汽车原则上靠道路左侧通行。","explanation":"日本实行左侧通行。"},"th":{"question":"ในประเทศญี่ปุ่น โดยหลักแล้วรถยนต์ต้องวิ่งทางด้านซ้ายของถนน","explanation":"ญี่ปุ่นใช้ระบบจราจรชิดซ้าย"},"vi":{"question":"Ở Nhật Bản, ô tô về nguyên tắc đi bên trái đường.","explanation":"Nhật Bản áp dụng giao thông bên trái."}}},{"no":2,"question":"赤信号でも、歩行者や車がいなければ左折してよい。","answer":false,"explanation":"日本では原則として赤信号で左折できません。","i18n":{"en":{"question":"At a red light, you may turn left if there are no pedestrians or vehicles.","explanation":"In Japan, vehicles generally may not turn left on a red light."},"ko":{"question":"빨간불이어도 보행자나 차량이 없으면 좌회전해도 됩니다.","explanation":"일본에서는 원칙적으로 빨간불에 좌회전할 수 없습니다."},"zhTW":{"question":"紅燈時，如果沒有行人或車輛，也可以左轉。","explanation":"在日本，原則上紅燈不能左轉。"},"zhCN":{"question":"红灯时，如果没有行人或车辆，也可以左转。","explanation":"在日本，原则上红灯不能左转。"},"th":{"question":"เมื่อไฟแดง หากไม่มีคนเดินเท้าหรือรถคันอื่น สามารถเลี้ยวซ้ายได้","explanation":"ในญี่ปุ่น โดยหลักแล้วห้ามเลี้ยวซ้ายเมื่อไฟแดง"},"vi":{"question":"Khi đèn đỏ, nếu không có người đi bộ hoặc xe khác thì được rẽ trái.","explanation":"Ở Nhật Bản, về nguyên tắc không được rẽ trái khi đèn đỏ."}}},{"no":3,"question":"一時停止標識がある場所では、車が来ていなければ徐行で通過してよい。","answer":false,"explanation":"停止線の直前で完全に停止します。","i18n":{"en":{"question":"At a stop sign, you may pass slowly without stopping if no vehicle is coming.","explanation":"You must come to a complete stop before the stop line."},"ko":{"question":"일시정지 표지가 있는 곳에서는 차량이 오지 않으면 서행으로 통과해도 됩니다.","explanation":"정지선 바로 앞에서 완전히 정지해야 합니다."},"zhTW":{"question":"有停車標誌的地方，如果沒有來車，可以慢行通過。","explanation":"必須在停止線前完全停車。"},"zhCN":{"question":"有停车标志时，如果没有来车，可以慢行通过。","explanation":"必须在停止线前完全停车。"},"th":{"question":"เมื่อมีป้ายหยุด หากไม่มีรถมา สามารถขับผ่านช้า ๆ โดยไม่หยุดได้","explanation":"ต้องหยุดรถให้สนิทก่อนเส้นหยุด"},"vi":{"question":"Ở nơi có biển dừng, nếu không có xe tới thì có thể đi chậm qua mà không cần dừng.","explanation":"Phải dừng hẳn trước vạch dừng."}}},{"no":4,"question":"横断歩道を渡ろうとする歩行者がいるときは、車は一時停止する。","answer":true,"explanation":"横断歩道では歩行者優先です。","i18n":{"en":{"question":"When a pedestrian is about to cross at a crosswalk, the vehicle must stop.","explanation":"Pedestrians have priority at crosswalks."},"ko":{"question":"횡단보도를 건너려는 보행자가 있을 때 차량은 일시정지해야 합니다.","explanation":"횡단보도에서는 보행자가 우선입니다."},"zhTW":{"question":"有行人準備通過行人穿越道時，車輛必須停車。","explanation":"在行人穿越道，行人優先。"},"zhCN":{"question":"有行人准备通过人行横道时，车辆必须停车。","explanation":"在人行横道处，行人优先。"},"th":{"question":"เมื่อมีคนเดินเท้ากำลังจะข้ามทางม้าลาย รถต้องหยุด","explanation":"ทางม้าลายให้สิทธิคนเดินเท้าก่อน"},"vi":{"question":"Khi có người đi bộ chuẩn bị qua vạch sang đường, xe phải dừng lại.","explanation":"Tại vạch sang đường, người đi bộ được ưu tiên."}}},{"no":5,"question":"踏切では、警報機が鳴っていなくても原則として一時停止して安全確認する。","answer":true,"explanation":"停止し、左右と音を確認します。","i18n":{"en":{"question":"At a railroad crossing, you generally stop and check safety even if the alarm is not sounding.","explanation":"Stop and check both directions and listen for trains."},"ko":{"question":"철도 건널목에서는 경보기가 울리지 않아도 원칙적으로 일시정지하고 안전을 확인합니다.","explanation":"정지한 뒤 좌우와 소리를 확인합니다."},"zhTW":{"question":"在平交道，即使警報器沒有響，原則上也要停車確認安全。","explanation":"停車後確認左右方向，並注意聲音。"},"zhCN":{"question":"铁路道口即使警报器没有响，原则上也要停车确认安全。","explanation":"停车后确认左右方向并注意声音。"},"th":{"question":"ที่ทางข้ามรถไฟ แม้สัญญาณเตือนจะไม่ดัง โดยหลักแล้วต้องหยุดและตรวจสอบความปลอดภัย","explanation":"ให้หยุด แล้วตรวจสอบซ้ายขวาและฟังเสียงรถไฟ"},"vi":{"question":"Tại đường ngang đường sắt, dù chuông cảnh báo không kêu, về nguyên tắc vẫn phải dừng và kiểm tra an toàn.","explanation":"Hãy dừng lại, kiểm tra hai bên và lắng nghe âm thanh tàu."}}},{"no":6,"question":"後部座席の同乗者は、シートベルトをしなくてもよい。","answer":false,"explanation":"後席もシートベルト着用が必要です。","i18n":{"en":{"question":"Rear-seat passengers do not need to wear seat belts.","explanation":"Seat belts are required in rear seats as well."},"ko":{"question":"뒷좌석 동승자는 안전벨트를 하지 않아도 됩니다.","explanation":"뒷좌석도 안전벨트 착용이 필요합니다."},"zhTW":{"question":"後座乘客不繫安全帶也可以。","explanation":"後座也必須繫安全帶。"},"zhCN":{"question":"后排乘客不系安全带也可以。","explanation":"后排座位也需要系安全带。"},"th":{"question":"ผู้โดยสารเบาะหลังไม่จำเป็นต้องคาดเข็มขัดนิรภัย","explanation":"เบาะหลังก็ต้องคาดเข็มขัดนิรภัยเช่นกัน"},"vi":{"question":"Hành khách ghế sau không cần thắt dây an toàn.","explanation":"Ghế sau cũng cần thắt dây an toàn."}}},{"no":7,"question":"運転中にスマートフォンを手に持って通話してはいけない。","answer":true,"explanation":"ながら運転は重大事故につながります。","i18n":{"en":{"question":"You must not talk on a smartphone held in your hand while driving.","explanation":"Distracted driving can lead to serious crashes."},"ko":{"question":"운전 중 스마트폰을 손에 들고 통화해서는 안 됩니다.","explanation":"주의 산만 운전은 중대한 사고로 이어질 수 있습니다."},"zhTW":{"question":"駕駛中不得手持智慧型手機通話。","explanation":"分心駕駛可能導致重大事故。"},"zhCN":{"question":"驾驶中不得手持智能手机通话。","explanation":"分心驾驶可能导致重大事故。"},"th":{"question":"ห้ามถือสมาร์ตโฟนคุยโทรศัพท์ขณะขับรถ","explanation":"การขับรถโดยเสียสมาธิอาจนำไปสู่อุบัติเหตุร้ายแรง"},"vi":{"question":"Không được cầm điện thoại thông minh để nói chuyện khi đang lái xe.","explanation":"Lái xe mất tập trung có thể dẫn đến tai nạn nghiêm trọng."}}},{"no":8,"question":"追越しが終わったあとも、高速道路の追越車線を走り続けてよい。","answer":false,"explanation":"追越し後は走行車線に戻ります。","i18n":{"en":{"question":"After overtaking, you may continue driving in the passing lane on an expressway.","explanation":"After overtaking, return to the driving lane."},"ko":{"question":"추월이 끝난 뒤에도 고속도로 추월차로를 계속 달려도 됩니다.","explanation":"추월 후에는 주행차로로 돌아가야 합니다."},"zhTW":{"question":"超車結束後，也可以繼續行駛在高速公路的超車道。","explanation":"超車後應回到行駛車道。"},"zhCN":{"question":"     const patternSelect = document.getElementById("patternSelect");
    const languageSelect = document.getElementById("languageSelect");
    const quizTitle = document.getElementById("quizTitle");
    const questionList = document.getElementById("questionList");
    const progressText = document.getElementById("progressText");
    const answeredCount = document.getElementById("answeredCount");
    const scoreCount = document.getElementById("scoreCount");
    const gradeButton = document.getElementById("gradeButton");
    const resetButton = document.getElementById("resetButton");
    const shuffleButton = document.getElementById("shuffleButton");
    const resultBox = document.getElementById("resultBox");
    const car = document.getElementById("car");
    const road = document.getElementById("road");
    let currentPattern = patterns[0];
    let currentLang = "ja";
    let graded = false;

    function t(key) { return messages[currentLang][key] || messages.ja[key]; }
    function localTitle(pattern) { return (pattern.titleI18n && pattern.titleI18n[currentLang]) || pattern.title; }
    function localizedQuestion(item) {
      if (currentLang === "ja") return { question: item.question, explanation: item.explanation, translated: true };
      const translated = item.i18n && item.i18n[currentLang];
      if (translated) return { question: translated.question, explanation: translated.explanation, translated: true };
      return { question: item.question, explanation: item.explanation, translated: false };
    }
    function mark(value) { return value ? "○" : "×"; }

    function renderStaticText() {
      document.documentElement.lang = currentLang;
      document.getElementById("appTitle").textContent = t("title");
      document.getElementById("appLead").textContent = t("lead");
      document.getElementById("answeredLabel").textContent = t("answered");
      document.getElementById("scoreLabel").textContent = t("score");
      gradeButton.textContent = t("grade");
      resetButton.textContent = t("retry");
      shuffleButton.textContent = t("random");
      document.getElementById("noticeText").textContent = t("notice");
      document.title = t("title");
    }

    function renderOptions() {
      patternSelect.innerHTML = patterns.map((pattern, index) => {
        const label = String(pattern.id).padStart(2, "0") + " " + localTitle(pattern);
        return '<option value="' + index + '">' + escapeHtml(label) + '</option>';
      }).join("");
      patternSelect.value = String(patterns.indexOf(currentPattern));
    }

    function renderQuiz(pattern) {
      currentPattern = pattern;
      graded = false;
      quizTitle.textContent = "Pattern " + pattern.id + " / " + localTitle(pattern);
      scoreCount.textContent = "-";
      resultBox.innerHTML = "<h2>" + escapeHtml(t("waitingTitle")) + "</h2><p>" + escapeHtml(t("waitingBody")) + "</p>";
      moveCar(0);
      questionList.innerHTML = pattern.questions.map((item, index) => {
        const name = "q" + index;
        const local = localizedQuestion(item);
        const original = currentLang !== "ja" && local.translated ? '<span class="original">' + escapeHtml(t("original")) + ': ' + escapeHtml(item.question) + '</span>' : "";
        const pending = currentLang !== "ja" && !local.translated ? '<span class="pending">' + escapeHtml(t("pending")) + '</span>' : "";
        return [
          '<article class="question" data-index="' + index + '">',
          '<div class="num">' + item.no + '</div>',
          '<div class="qtext">' + escapeHtml(local.question) + original + pending + '</div>',
          '<div class="answer-box">',
          '<input id="' + name + '-true" name="' + name + '" type="radio" value="true">',
          '<label for="' + name + '-true" title="True">○</label>',
          '<input id="' + name + '-false" name="' + name + '" type="radio" value="false">',
          '<label for="' + name + '-false" title="False">×</label>',
          '</div>',
          '<p class="explain"></p>',
          '</article>'
        ].join("");
      }).join("");
      questionList.querySelectorAll("input").forEach((input) => input.addEventListener("change", updateProgress));
      updateProgress();
    }

    function updateProgress() {
      const answered = getAnswers().filter((value) => value !== null).length;
      answeredCount.textContent = answered;
      progressText.textContent = answered + " / " + currentPattern.questions.length;
      gradeButton.disabled = answered !== currentPattern.questions.length;
      if (!graded) scoreCount.textContent = "-";
    }
    function getAnswers() {
      return currentPattern.questions.map((_, index) => {
        const checked = questionList.querySelector('input[name="q' + index + '"]:checked');
        return checked ? checked.value === "true" : null;
      });
    }
    function grade() {
      const answers = getAnswers();
      let score = 0;
      graded = true;
      currentPattern.questions.forEach((item, index) => {
        const card = questionList.querySelector('[data-index="' + index + '"]');
        const ok = answers[index] === item.answer;
        if (ok) score += 1;
        card.classList.toggle("correct", ok);
        card.classList.toggle("wrong", !ok);
        const local = localizedQuestion(item);
        card.querySelector(".explain").textContent =
          (ok ? t("correct") : t("wrong") + t("yourAnswer") + ": " + mark(answers[index]) + " / " + t("correctAnswer") + ": " + mark(item.answer) + "。") + local.explanation;
      });
      scoreCount.textContent = score;
      resultBox.innerHTML = "<h2>" + escapeHtml(t("gradingTitle")) + "</h2><p>" + escapeHtml(t("gradingBody")) + "</p>";
      const duration = moveCar(score, true);
      window.setTimeout(() => showResult(score), duration * 1000);
    }
    function showResult(score) {
      const percent = Math.round(score / currentPattern.questions.length * 100);
      let title = t("retryTitle");
      let message = t("retryBody");
      let rewardClass = "reward-try";
      if (score === 10) {
        title = t("greatTitle");
        message = t("greatBody");
        rewardClass = "reward-perfect";
      } else if (score >= 8) {
        title = t("goodTitle");
        message = t("goodBody");
        rewardClass = "reward-almost";
      }
      const scoreText = currentLang === "en" ? score + t("ofTen") + " (" + percent + "%)" : score + t("ofTen") + "（" + percent + "%）";
      resultBox.innerHTML = '<div class="reward ' + rewardClass + '"><strong>' + escapeHtml(title) + '</strong></div><p>' + escapeHtml(scoreText) + '</p><p>' + escapeHtml(message) + '</p>';
    }
    function moveCar(score, animated = false) {
      const duration = animated ? Math.max(.5, score * .5) : .35;
      car.style.transitionDuration = duration + "s";
      requestAnimationFrame(() => {
        const max = Math.max(0, road.clientWidth - 78);
        car.style.transform = "translateX(" + Math.round(max * (score / 10)) + "px)";
      });
      return duration;
    }
    function reset() { renderQuiz(currentPattern); }
    function randomPattern() {
      const index = Math.floor(Math.random() * patterns.length);
      patternSelect.value = String(index);
      renderQuiz(patterns[index]);
    }
    function changeLanguage(lang) {
      currentLang = lang;
      renderStaticText();
      renderOptions();
      renderQuiz(currentPattern);
    }
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }
    patternSelect.addEventListener("change", () => renderQuiz(patterns[Number(patternSelect.value)]));
    languageSelect.addEventListener("change", () => changeLanguage(languageSelect.value));
    gradeButton.addEventListener("click", grade);
    resetButton.addEventListener("click", reset);
    shuffleButton.addEventListener("click", randomPattern);
    window.addEventListener("resize", () => { if (graded) moveCar(Number(scoreCount.textContent) || 0); });
    renderStaticText();
    renderOptions();
    renderQuiz(patterns[0]);
  </script>
