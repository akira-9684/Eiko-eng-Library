帶植物自然生長。可以一邊眺望太平洋的露天浴池，一邊在日本百選海灘之一的青島海岸衝浪的度假勝地。","quality":"氯化物泉（氯化鈉泉）","effect":"疲勞恢復、怕冷、神經痛","season":"一年四季（秋冬浪好衝浪）","access":"距離青島站僅幾步之遙"},"西表島温泉":{"name":"西表島溫泉","desc":"位於日本最西南端沖繩西表島的秘密溫泉。這個溫泉周圍環繞著亞熱帶叢林，是西表野貓的家。","quality":"氯化物泉（氯化鈉泉）","effect":"疲勞、神經痛、怕冷、慢性皮膚病恢復","season":"全年（四月至十一月最適合潛水）","access":"從石垣島搭乘渡輪約 40 至 60 分鐘"},"壁湯温泉":{"name":"甲部湯溫泉","desc":"位於大分縣九重町的溪流旁的天然露天浴池。岩石鑿成的洞穴般的浴缸裡充滿了熱水的秘密溫泉，您可以一邊洗澡一邊聆聽山谷中河水的聲音。","quality":"碳酸氫鹽泉（單純碳酸氫鹽泉）","effect":"疲勞恢復、神經痛、美麗肌膚","season":"全年（冬季露天賞雪很受歡迎）","access":"從楠IC開車約30分鐘"},"湯平温泉":{"name":"湯平溫泉","desc":"大分的隱藏溫泉，有石頭鋪成的斜坡和復古的昭和時代的溫泉旅館。幽靜的山間溫泉地，自江戶時代延續至今的溫泉文化，令人流連忘返。","quality":"氯化物泉（氯化鈉泉）","effect":"疲勞恢復、神經痛、慢性胃腸病、婦女病","season":"全年","access":"由布院站開車約 20 分鐘"},"天ヶ瀬温泉":{"name":"天瀨溫泉","desc":"從玖珠川溪谷湧出的溫泉。這個溫泉區以從河岸基岩湧出的「河原湯」而聞名，充滿鄉村魅力，沿河分佈著露天浴池。","quality":"氯化物泉/碳酸氫鹽泉","effect":"疲勞恢復、神經痛、慢性婦女病","season":"一年四季（秋天的紅葉尤其美麗）","access":"從天瀨站步行約5分鐘"},"地獄温泉（阿蘇）":{"name":"地獄溫泉（阿蘇）","desc":"阿蘇山山麓深山溫泉的秘密溫泉。鈴目湯是自明治時代就存在的硫磺泉，是含有灰泥的硫磺泉，是2016年熊本地震後復活的著名且持久的溫泉。","quality":"酸性硫磺泉","effect":"神經痛、風濕病、慢性皮膚病、疲勞恢復","season":"全年","access":"從阿蘇站開車約 30 分鐘"},"筋湯温泉":{"name":"蘇吉湯溫泉","desc":"九重山地的楠溪附近湧出的高原溫泉。這裡以擁有日本最多的歌打湯而聞名，強大的歌打湯對於緩解肩膀僵硬和腰痛非常有效。","quality":"碳酸氫鹽泉（單純溫泉）","effect":"肩膀酸痛、腰痛、疲勞恢復、神經痛","season":"全年無休（與九重「夢」吊橋的組合很受歡迎）","access":"從九重IC駕車約20分鐘"},"国頭温泉（沖縄）":{"name":"國頭溫泉（沖繩）","desc":"沖繩唯一的天然溫泉湧出於沖繩本島最北端的山原（Yanbaru）。溫泉與山原鐵路棲息地附近豐富的亞熱帶自然風光形成鮮明對比。","quality":"氯化物泉","effect":"疲勞恢復、怕冷、神經痛","season":"全年","access":"從那霸機場開車約 2 小時"}},"ko":{"登別温泉":{"name":"노보리베츠 온천","desc":"「지옥 계곡」으로 유명한 홋카이도 최대의 온천지. 다양한 온천수를 자랑하며 일본 굴지의 온수를 자랑한다. 곰 목장과 지옥 계 산책로도 인기.","quality":"유황천, 식염천, 아키오천 등 9종류","effect":"신경통, 피부병, 피로 회복, 류마티스","season":"연중(겨울에는 설경의 노천탕이 일품)","access":"노보리베츠역에서 버스로 약 15분"},"洞爺湖温泉":{"name":"도야코 온천","desc":"칼데라 호수 「토야코」의 호반에 펼쳐지는 온천 리조트. 여름 장기 불꽃놀이와 유람선이 인기. 세계 지오 파크에도 인정.","quality":"염화물천(나트륨염화물천)","effect":"냉증, 피로 회복, 신경통, 부인병","season":"연중(4~10월이 최적)","access":"도야역에서 버스로 약 15분"},"定山渓温泉":{"name":"조잔케이 온천","desc":"삿포로 시내에서 차로 약 1시간의 「삿포로의 안방」. 도요히라강의 계곡을 따라 여관이 늘어서 단풍의 명소로도 유명.","quality":"염화물천·황산염천","effect":"피로 회복 · 냉증 · 신경통 · 절상","season":"연중(단풍기 10월이 특히 인기)","access":"삿포로역에서 버스로 약 70분"},"層雲峡温泉":{"name":"소운쿄 온천","desc":"다이세츠산 국립공원의 입구. 절벽 절벽이 이어지는 소운쿄의 계곡미는 압권으로, 겨울의 「빙폭 축제」도 유명.","quality":"염화물천(나트륨·칼슘염화물천)","effect":"냉증, 피로 회복, 신경통, 류마티스","season":"연중(겨울의 빙폭・여름의 등산 시즌)","access":"카미카와역에서 버스로 약 30분"},"阿寒湖温泉":{"name":"아칸코 온천","desc":"천연 기념물 마리모가 서식하는 아칸 호반의 온천. 아이누 문화의 거점이기도 하며, 아이누코탄(마을)에서 코샨베와 이오만테의 의식을 볼 수 있다.","quality":"황산염천·염화물천","effect":"피로 회복 · 신경통 · 류마티스 · 피부 미용","season":"연중(4~11월이 최고)","access":"구시로 공항에서 차로 약 90분"},"知床ウトロ温泉":{"name":"시레토코 우토로 온천","desc":"세계 자연 유산 「시레토코 반도」의 거점 온천지. 유빙, 곰, 오지로 독수리 등 대자연의 박력을 온천에서 치유하는 호화스러운 체험이 매력.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 냉증 · 신경통","season":"4~11월(유빙기 2~3월은 특히 귀중)","access":"메만베쓰 공항에서 차로 약 2시간"},"ニセコ温泉郷":{"name":"니세코 온천 마을","desc":"국제 스키 리조트로 유명한 니세코. 양발산을 바라보는 노천탕은 절경으로, 파우더 스노우와 온천을 즐길 수 있는 겨울이 인기.","quality":"유황천·중탄산토류천","effect":"피로 회복 · 신경통 · 피부병 · 류마티스","season":"연중(스키는 12~3월)","access":"니세코 역에서 각 온천까지 셔틀 버스"},"支笏湖温泉":{"name":"시코쓰코 온천","desc":"투명도 발군의 칼데라호 「시코쓰호」호반의 온천. 카누나 다이빙 등 액티비티와 함께 ​​즐길 수 있다.","quality":"탄산수소염천","effect":"신경통, 근육통, 피로 회복, 피부 미용","season":"연중(겨울의 「빙기 축제」는 환상적)","access":"치토세역에서 버스로 약 40분"},"豊富温泉":{"name":"도요토미 온천","desc":"일본 최북의 온천지. 석유의 수반 가스와 함께 솟아나는 전국에서도 드문 석유 성분 함유 온천으로 아토피 치료에 효과가 있다고 주목받고 있다.","quality":"함유 식염천(염화물천)","effect":"아토피 성 피부염, 피부병, 신경통","season":"연중","access":"도요토미역에서 차로 약 5분"},"十勝川温泉":{"name":"도카치가와 온천","desc":"식물성 몰 온천으로 유명. 태고의 식물이 퇴적한 「몰」을 포함한 드문 온천으로, 피부 미용 효과가 높아 「미인의 탕」으로 알려져 있다.","quality":"몰천(식물성 부식질 식염천)","effect":"아름다운 피부, 신경통, 피로 회복, 만성 피부병","season":"연중(겨울의 백조 관찰과 조합이 인기)","access":"오비히로역에서 버스로 약 40분"},"酸ヶ湯温泉":{"name":"산가유 온천","desc":"야코다산중에 솟는 일본에서 가장 오래된 유지장의 하나. 천명 목욕이라고 불리는 큰 히바 구조 혼욕 욕조가 유명. 비탕의 정취 듬뿍.","quality":"산성 유황천(함황화수소산성천)","effect":"류마티스, 신경통, 피부병, 당뇨병","season":"연중(겨울은 호설로 육지의 고도에)","access":"아오모리역에서 버스로 약 65분"},"乳頭温泉郷":{"name":"유두 온천 마을","desc":"아키타현의 비탕. 쓰루노유・묘노유 등 개성 풍부한 7탕이 점재하는 온천 순회로 유명. 유백색의 탕이 아름다운 쓰루노유가 특히 유명.","quality":"유황천·탄산수소염천(숙소에 따라 다름)","effect":"신경통, 류마티스, 피로 회복, 아름다운 피부","season":"연중(겨울의 유키미 목욕탕이 절경)","access":"타자와코역에서 버스로 약 45분"},"蔵王温泉":{"name":"자오 온천","desc":"야마가타 자오 스키장 기슭에 솟는 강산성의 온천. 백탁한 물과 수빙(아이스 몬스터)의 콜라보레이션이 겨울의 풍물시.","quality":"산성 황산염염화물천","effect":"신경통, 근육통, 만성 피부병, 피로 회복","season":"연중(겨울의 수빙 투어가 특히 인기)","access":"야마가타역에서 버스로 약 40분"},"鳴子温泉郷":{"name":"나루코 온천향","desc":"미야기의 안방. 일본에 있는 온천질 11종류 중 9종류가 갖추어진 다채로운 온천지. 코케시의 산지로도 유명.","quality":"유황천·염화물천 외 다수","effect":"신경통, 류마티스, 피로 회복, 아름다운 피부","season":"연중(단풍의 10월이 가장 활기찬)","access":"나루코 온천역에서 도보 권내"},"銀山温泉":{"name":"긴잔 온천","desc":"다이쇼 로망 감도는 목조 여관이 시라긴강을 따라 늘어선 그림엽서 같은 온천가. 저녁에 가스등이 켜지는 풍경은 영화처럼.","quality":"염화물천·탄산수소염천","effect":"신경통, 피로 회복, 냉증, 피부 미용","season":"연중(설경의 겨울이 가장 환상적)","access":"오이시다역에서 버스로 약 40분"},"花巻温泉郷":{"name":"하나마키 온천향","desc":"미야자와 겐지의 고향·하나마키시의 온천. 타이온천·하나마키 온천 등 복수의 온천지로 구성된 온천 순회가 즐거운 온천향.","quality":"염화물천·탄산수소염천","effect":"신경통, 피로 회복, 만성 소화병, 냉증","season":"연중","access":"하나 마키 역에서 버스로 약 30 분"},"秋保温泉":{"name":"아키호 온천","desc":"센다이의 안방으로 옛부터 사랑받아 온 온천. 아키호 오오타키나 기소들협 등의 자연미도 매력. 대형 여관이 많이 센다이 관광의 거점에 최적.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 냉증 · 피부병","season":"연중","access":"센다이역에서 버스로 약 40분"},"東山温泉":{"name":"히가시야마 온천","desc":"「아이즈의 안방」으로 알려진 아이즈 와카마츠의 명탕. 쓰루가성에서 가까이, 아이즈 관광의 거점으로서 인기.","quality":"염화물천·황산염천","effect":"피로 회복 · 신경통 · 류마티스 · 만성 피부병","season":"연중(단풍 시즌이 특히 아름다운)","access":"아이즈 와카 마츠 역에서 버스로 약 10 분"},"飯坂温泉":{"name":"이이자카 온천","desc":"마츠오 바쇼도 방문한 도호쿠에서 가장 오래된 온천 중 하나. 공동 목욕탕 ‘사바코유’를 중심으로 한 온천 순회와 옛부터의 온천 문화가 뿌리 내린다.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 냉증 · 소화기 질환","season":"연중","access":"이이자카 온천역에서 도보로 바로"},"土湯温泉":{"name":"흙탕 온천","desc":"후쿠시마시 서방에 위치한 온천지. 코케시 인형의 산지이기도 하며 아라카와 계곡을 따라 여관이 점재하는 차분한 분위기가 특징.","quality":"탄산수소염천·염화물천","effect":"신경통, 피로 회복, 만성 피부병, 냉증","season":"연중","access":"후쿠시마역에서 버스로 약 50분"},"磐梯熱海温泉":{"name":"반다이 아타미 온천","desc":"반다이 산기슭의 고시키누마에도 가까운 온천지. 고리야마시의 안방으로 친숙해져 풍부한 온천량과 다채로운 숙박 시설이 갖추어져 있다.","quality":"염화물천·탄산수소염천","effect":"피로 회복 · 신경통 · 류마티스 · 냉증","season":"연중","access":"반다이 아타미역에서 도보로 바로"},"遠刈田温泉":{"name":"엔카리타 온천","desc":"자오 연봉의 기슭에 솟는 온천지. 고케시 발상지 중 하나로 유명하며 자오와 마츠시마의 중간에있는 관광 거점.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 근육통 · 아름다운 피부","season":"연중(자오 스키 시즌은 겨울도 인기)","access":"시라이시 자오역에서 버스로 약 30분"},"夏油温泉":{"name":"여름 기름 온천","desc":"이와테현 기타가미시의 비탕. 복수의 원천이 솟아나는 야유가 유명하고, 오유·타키노유 등 야취 넘치는 노천탕을 즐길 수 있는 동계 폐쇄의 산의 온천.","quality":"유황천·탄산수소염천","effect":"신경통, 류마티스, 피부병, 피로 회복","season":"5월~11월(동계 폐쇄)","access":"기타가미역에서 차로 약 60분"},"大鰐温泉":{"name":"오와 온천","desc":"아오모리현 제일의 온천지로 유명한 대형. 옛부터 \"쓰가루의 안방\"으로 사랑받아 스키장과 온천을 즐길 수 있다.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 류마티스 · 냉증","season":"연중","access":"오와 온천역에서 도보로 바로"},"草津温泉":{"name":"구사쓰 온천","desc":"「일본 3명탕」의 하나. 강산성의 유황천과 「탕 전나무」문화가 유명. 유바타를 중심으로 한 온천 마을은 풍정 만점으로 연간 200만명 이상이 방문한다.","quality":"산성 염화물 황산염천","effect":"피부병, 당뇨병, 신경통, 류마티스","season":"연중(스키의 겨울・신록의 여름 모두 인기)","access":"나가노하라 구사쓰구치역에서 버스로 약 25분"},"伊香保温泉":{"name":"이카호 온천","desc":"돌계단으로 유명한 조슈의 명탕. 다갈색의 황금탕과 투명한 백은탕의 2종류의 원천을 가진다. 덕후미꽃 연고의 땅이기도 하다.","quality":"염화물 황산염천(황금의 탕)·탄산수소염천(백은의 탕)","effect":"피로 회복 · 신경통 · 부인병 · 냉증","season":"연중","access":"시부카와 역에서 버스로 약 20 분"},"四万温泉":{"name":"시만 온천","desc":"군마의 산악에 솟아나는 「4만의 병을 치유한다」라는 전설의 탕. 푸른 코발트 블루의 적선관이 환상적이며 미야자키 영화의 모델이라고도 불린다.","quality":"염화물천·탄산수소염천","effect":"소화기병, 신경통, 피로 회복, 여성병","season":"연중(신록·단풍이 특히 아름답다)","access":"나카노조역에서 버스로 약 40분"},"水上温泉":{"name":"수상 온천","desc":"도네가와의 원유역에 솟는 온천 리조트. 래프팅과 SL 미나카미 등 액티비티가 풍부하고 겨울 스키와 온천의 조합이 인기.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 냉증 · 류마티스","season":"연중(래프팅은 5~10월)","access":"수상역에서 도보·버스"},"宝川温泉":{"name":"호카와 온천","desc":"일본 최대급의 혼욕 노천탕으로 알려진 비탕. 4개의 대노천탕의 총 면적은 470㎡ 이상. 수상 온천 마을의 가장 안쪽에 위치한 1채 숙소.","quality":"염화물천","effect":"피로 회복 · 신경통 · 류마티스","season":"연중(유키미 노천이 특히 인기)","access":"수상역에서 버스로 약 40분"},"万座温泉":{"name":"만자 온천","desc":"해발 1,800m에 위치한 일본 최고의 온천. 유황 성분이 특히 진하고, 백탁한 물은 독특. 구사쓰보다 더 산속의 비탕감이 있다.","quality":"산성 유황천","effect":"신경통, 류마티스, 피부병, 만성 부인병","season":"연중(스키 시즌은 특히 활기찬)","access":"카루이자와역에서 차로 약 50분"},"箱根温泉":{"name":"하코네 온천","desc":"수도권 제일의 온천 리조트지. 다채로운 천질과 미술관·절경이 갖추어져, 후지산을 바라보는 노천탕이 인기. 연간 2,000만명 이상이 방문한다.","quality":"염화물천·황산염천·탄산수소염천 등 다수","effect":"피로 회복 · 신경통 · 피부 미용 · 냉증","season":"연중","access":"오다큐 로맨스카로 신주쿠에서 약 90분"},"熱海温泉":{"name":"아타미 온천","desc":"도카이도의 요충에 솟는 일본 굴지의 온천지. 도쿠가와 이에야스도 사랑한 명탕으로 아타미 해상 불꽃놀이와 아타미 선 비치 등 해안 리조트로도 인기.","quality":"염화물천(나트륨·칼슘염화물천)","effect":"피로 회복 · 신경통 · 냉증 · 피부 미용","season":"연중","access":"도카이도 신칸센・코다까지 도쿄에서 약 45분"},"伊東温泉":{"name":"이토 온천","desc":"이즈 최대의 온천지. 풍부한 온수(매분 3만 리터)와 200개 이상의 원천을 자랑하며, 「일본 3대 온천」의 하나로 꼽히는 설도.","quality":"염화물천(나트륨·칼슘염화물천)","effect":"피로 회복 · 신경통 · 근육통 · 만성 피부병","season":"연중","access":"도쿄역에서 특급 오도코로 약 1시간 40분"},"修善寺温泉":{"name":"슈젠지 온천","desc":"이즈에서 가장 오래된 온천. 슈젠지를 중심으로 한 죽림의 소경 등 풍정 있는 온천가가 펼쳐진다. 나츠메 소세키와 가와바타 야스나리도 사랑한 문학의 땅.","quality":"염화물천","effect":"피로 회복 · 신경통 · 냉증 · 여성병","season":"연중(매화・벚꽃・단풍과 사계절의 아름다움)","access":"슈젠지역에서 버스로 약 10분"},"湯河原温泉":{"name":"유가와라 온천","desc":"만엽집에도 시전된 후루유. 사가미만을 바라보는 구릉지에 여관이 점재해, 도쿄 근교의 은신처적 온천으로서 문인 묵객에게 사랑받아 왔다.","quality":"염화물천(나트륨·칼슘염화물천)","effect":"피로 회복 · 신경통 · 만성 부인병 · 냉증","season":"연중(매림으로 유명한 2월도 인기)","access":"유가와라역에서 버스로 약 10분"},"鬼怒川温泉":{"name":"기누가와 온천","desc":"닛코의 안쪽에 솟는 관동 유수의 온천 리조트. 기누가와의 계곡을 따라 대형 여관이 늘어서 SL 다이키와 닛코 도쇼구 관광의 거점으로도 인기.","quality":"알칼리성 단순 분수","effect":"피로 회복 · 신경통 · 류마티스 · 냉증","season":"연중","access":"도부 닛코선 기누가와 온천역에서 도보"},"塩原温泉郷":{"name":"시오바라 온천향","desc":"시노가와를 따라 11개의 온천지가 점재하는 온천향. 11종류의 온천질이 갖추어져 있는 “온천 박사”도 방문하는 다양한 탕이 매력.","quality":"황산염천·염화물천 외 11종","effect":"신경통, 피로 회복, 만성 피부병, 소화기 질환","season":"연중(단풍의 10월이 특히 아름다운)","access":"나스시오바라역에서 버스로 약 50분"},"那須温泉郷":{"name":"나스 온천 마을","desc":"나스다케의 기슭에 펼쳐지는 온천 리조트. 살생석의 '가노노유'를 비롯한 다채로운 온천 순회를 즐길 수 있으며, 나스 하이랜드 파크 관광과의 조합도 인기.","quality":"산성 황산염천·염화물천","effect":"신경통, 류마티스, 피로 회복, 피부병","season":"연중(신록·단풍·스키가 인기)","access":"나스시오바라역에서 버스로 약 45분"},"石和温泉":{"name":"이시와 온천","desc":"고후 분지에 솟는 야마나시 현 최대의 온천지. 포도밭 안에 여관이 점재해, 와인과 온천을 조합한 여행을 즐길 수 있다. 후지산・남 알프스의 절경도.","quality":"알칼리성 단순 온천","effect":"피로 회복 · 신경통 · 냉증 · 피부 미용","season":"연중(포도・와인의 가을이 특히 인기)","access":"이시와 온천역에서 도보로 바로"},"下呂温泉":{"name":"게로 온천","desc":"「일본 3명천」의 하나. 히다가와를 따라 여관이 늘어선 풍정 있는 온천가에서 무색 투명한 나트륨 탄산수소염천은 피부 미용 효과가 높다.","quality":"알칼리성 단순 온천(탄산수소염천)","effect":"피부 미용, 신경통, 피로 회복, 만성 소화기 질환","season":"연중","access":"나고야역에서 특급 주름으로 약 1시간 40분"},"奥飛騨温泉郷":{"name":"오쿠히다 온천향","desc":"북 알프스의 기슭에 점재하는 5개의 온천지(히라유·후쿠치·신히라유·도치오·신호타카)의 총칭. 노천탕의 수는 일본 제일을 자랑한다.","quality":"단순 온천·탄산수소염천·염화물천","effect":"피로 회복 · 신경통 · 피부 피부 · 류마티스","season":"연중(단풍의 가을·유키미의 겨울이 절경)","access":"다카야마 역에서 버스로 약 1 시간"},"白骨温泉":{"name":"백골 온천","desc":"「3일 넣으면 3년 감기를 끌지 않는다」라고 하는 백탁의 피부 미용의 탕. 가미코치에 가까운 산악 온천에서, 신비한 백탁색의 야천탕이 유명한 비탕.","quality":"함황 칼슘·마그네슘 탄산수소염천","effect":"피로 회복 · 신경통 · 소화기병 · 피부병","season":"4월 하순~11월(동계는 일부 폐쇄)","access":"마쓰모토역에서 버스로 약 2시간"},"野沢温泉":{"name":"노자와 온천","desc":"공동욕장 「외탕」이 13개 있는 신슈의 명탕. 노자와나의 발상지이기도 하고, 온천가의 산책과 외탕 순회가 여행의 묘미. 겨울에는 스키도 인기.","quality":"염화물천·황산염천","effect":"신경통, 류마티스, 피로 회복, 여성병","season":"연중(스키는 11월~4월)","access":"이이야마역에서 버스로 약 25분"},"渋温泉":{"name":"시부 온천","desc":"9개의 외탕 순회로 유명한 나가노의 후루유. 지옥 골짜기 원숭이 공원의 유키미 노천탕에 들어가는 일본 원숭이의 모습이 세계적으로 유명하다.","quality":"염화물천·황산염천","effect":"신경통, 피로 회복, 만성 피부병, 류마티스","season":"연중(눈 원숭이로 유명한 겨울이 하이 시즌)","access":"유다나카역에서 버스로 약 10분"},"別所温泉":{"name":"벳쇼 온천","desc":"「신슈의 가마쿠라」라고도 불리는 북향 관음으로 유명한 우에다의 온천. 외탕 3곳을 둘러싼 탕 순회와 중요문화재의 삼중탑이 볼거리.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 류마티스 · 피부 미용","season":"연중","access":"벳쇼 온천역에서 도보로 바로"},"諏訪温泉":{"name":"스와 온천","desc":"스와 호반에 솟는 역사 있는 온천지. 전국의 스와 신사의 총 본사 「스와 대사」의 무릎에서 일본에서 가장 오래된 신사 중 하나와 온천을 즐길 수 있다.","quality":"염화물천(나트륨·칼슘염화물천)","effect":"피로 회복 · 신경통 · 만성 부인병 · 냉증","season":"연중(겨울의 신 신도리가 유명)","access":"가미 스와 역에서 도보로 바로"},"山代温泉":{"name":"야마시로 온천","desc":"가가 온천향을 대표하는 온천지. 요사노 아키코와 이즈미가미카 등 많은 문인들에게 사랑 받고 국화탕을 중심으로 한 풍정 있는 온천가가 펼쳐진다.","quality":"염화물천(나트륨염화물천)","effect":"신경통, 피로 회복, 만성 피부병, 냉증","season":"연중","access":"가가 온천역에서 버스로 약 10분"},"山中温泉":{"name":"야마나카 온천","desc":"마츠오 바쇼가 「수승의 탕」이라고 기른 카가의 명탕. 쓰루센케이의 계곡을 따라 여관이 늘어선 정서 풍부한 온천가. 구야야키의 산지이기도 하다.","quality":"염화물천(나트륨·칼슘염화물천)","effect":"피로 회복 · 신경통 · 만성 소화기병 · 여성병","season":"연중(계곡의 단풍이 특히 아름답다)","access":"가가 온천역에서 버스로 약 25분"},"片山津温泉":{"name":"카타야마즈 온천","desc":"시바야마 가타호반에 솟는 가가 온천 마을의 온천지. 호수의 중앙으로 뿜어지는 간헐천과 하쿠산의 전망이 아름답고 정취가 있는 온천의 거리.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 냉증 · 피부 미용","season":"연중","access":"가가 온천역에서 버스로 약 10분"},"和倉温泉":{"name":"와쿠라 온천","desc":"「노토의 안방」으로 알려진 이시카와현 최대의 온천지. 나나오만을 바라보는 절경과 풍부한 온천수, 바다의 행운이 매력. 가가야 등 명료관이 갖추어져 있다.","quality":"염화물천(나트륨·칼슘염화물천)","effect":"피로 회복 · 신경통 · 만성 피부병 · 냉증","season":"연중","access":"와쿠라 온천역에서 버스로 약 5분"},"芦原温泉":{"name":"아시하라 온천","desc":"호쿠리쿠의 온천 리조트. 에치젠 해안에 가까워 일본해의 신선한 해산물과 온천을 동시에 즐길 수 있다. 아시하라 온천 에치젠 철도의 종점에서 액세스도 양호.","quality":"염화물천(나트륨·칼슘염화물천)","effect":"피로 회복 · 신경통 · 부인병 · 냉증","season":"연중(에치젠 게의 겨울이 최성기)","access":"아시하라 온천역에서 버스로 약 10분"},"粟津温泉":{"name":"아와즈 온천","desc":"718년 개탕 전설을 가진 가가의 후루유. 일본에서 가장 오래된 여관 「법사」가 있는 온천지로서 세계적으로도 유명. 조용하고 차분한 분위기.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 류마티스 · 만성 소화기 질환","season":"연중","access":"고마쓰역에서 버스로 약 30분"},"越後湯沢温泉":{"name":"에치고 유자와 온천","desc":"가와바타 야스나리의 소설 「설국」의 무대. 일본 굴지의 스키 리조트로 알려져 에치고의 산들과 설경 속에서 즐기는 온천이 여정을 자아낸다.","quality":"단순 온천","effect":"피로 회복 · 신경통 · 냉증 · 피부 미용","season":"연중(스키는 12~3월)","access":"조에쓰 신칸센 에치고 유자와역에서 도보로 바로"},"月岡温泉":{"name":"쓰키오카 온천","desc":"에메랄드 그린의 유황천이 특징적인 니가타의 온천지. 「미인의 탕」으로 알려져 온천 마을의 먹거리 산책이나 예요 문화도 매력.","quality":"함황 나트륨 염화물 샘","effect":"아름다운 피부, 신경통, 피로 회복, 만성 피부병","season":"연중","access":"도요에 역에서 버스로 약 35 분"},"城崎温泉":{"name":"기노사키 온천","desc":"시가 나오야의 소설 「성의 사키에서」로 유명한 효고의 명탕. 7개의 외탕 순회와 유카타에서 걷는 정서 있는 온천 마을은 간사이 제일.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 만성 부인병 · 냉증","season":"연중(마츠바 게의 겨울이 특히 인기)","access":"기노사키 온천역에서 도보로 바로"},"有馬温泉":{"name":"아리마 온천","desc":"「일본 3명탕」의 하나. 오사카·고베에 가까운 가장 편리한 온천지. 「김의 탕」(철분을 포함한 다갈색)과 「은의 탕」(탄산천)의 2 종류의 탕이 유명.","quality":"함철 강염화물천(금노탕)·탄산수소염천(은노유)","effect":"신경통, 근육통, 냉증, 피로 회복","season":"연중","access":"고베 전철 아리마 온천역에서 도보로 바로"},"白浜温泉":{"name":"시라하마 온천","desc":"구마노 고도에 가까운 와카야마의 온천 리조트. 판다로 유명한 어드벤처 월드, 엔게츠지마의 절경, 시라라하마의 백사장이 갖추어진 리조트지.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 냉증 · 만성 피부병","season":"연중(해수욕의 여름이 특히 활기차다)","access":"시라하마역에서 버스로 약 10분"},"湯の峰温泉":{"name":"유노미네 온천","desc":"구마노 고도를 걸은 참배자가 입욕한 일본에서 가장 오래된 온천(1800년 이상의 역사). 세계유산에 등록된 온천 ‘츠보유’는 하루 6회 탕의 색이 바뀌는 신비의 탕.","quality":"함황 나트륨 탄산수소염천","effect":"피로 회복 · 신경통 · 피부병 · 만성 소화기 질환","season":"연중","access":"신노미야역에서 버스로 약 70분"},"川湯温泉":{"name":"가와유 온천","desc":"대탑강의 강바닥에서 온천이 자분하는 드문 온천지. 겨울에는 강을 멈추고 만드는 '선인탕'(길이 약 50m)이 유명한 대노천탕이 된다.","quality":"탄산수소염천(중조천)","effect":"피로 회복 · 신경통 · 만성 피부병 · 아름다운 피부","season":"연중(선인탕은 12~2월)","access":"신노미야역에서 버스로 약 90분"},"南紀勝浦温泉":{"name":"난키 카츠우라 온천","desc":"태평양을 바라보는 온천지. 참치의 튀김으로 유명한 나치 카츠우라의 항구 마을에서 세계 유산 '나치 폭포'에도 가깝다. 동굴탕이 특징적인 망귀동이 유명.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 냉증 · 신경통 · 만성 피부병","season":"연중","access":"기이 카츠 우라 역에서 도보 · 배"},"湯村温泉（兵庫）":{"name":"유무라 온천(효고)","desc":"98℃의 고온의 탕이 솟아나는 「황탕」으로 계란이나 야채를 삶는 문화가 유명. 산인의 마츠모토 키요하리 연고의 땅에서, 드라마 「유메 치요 일기」의 무대.","quality":"함중 탄산 식염천","effect":"피로 회복 · 신경통 · 만성 위장병 · 부인병","season":"연중","access":"하마사카역에서 버스로 약 20분"},"龍神温泉":{"name":"용신온천","desc":"일본 삼미인의 탕 중 하나. 타카노 류진 스카이 라인을 따라 솟아 알칼리성이 강하고 피부 미용 효과로 유명. 후카야마 유타니의 조용함 속에서 즐기는 비탕의 분위기.","quality":"단순 온천(알칼리성)","effect":"피부 미용, 피로 회복, 신경통, 냉증","season":"연중(단풍의 가을이 절경)","access":"하시모토역에서 차로 약 80분"},"洲本温泉":{"name":"스모토 온천","desc":"아와지시마 남부의 온천 리조트. 나루토 해협을 바라보는 절경과 아와지시마 특산 ​​양파와 나루토 도미 등 해산물을 즐길 수 있다.","quality":"염화물천","effect":"피로 회복 · 신경통 · 냉증","season":"연중","access":"스모토 버스 센터에서 버스 택시"},"天橋立温泉":{"name":"아마노하시다테 온천","desc":"일본 삼경의 하나 「아마노하시다테」를 바라보는 교토부의 온천지. 사슈가 일본해로 뻗어 있는 아마노하시다테의 절경을 온천 숙소에서 바라보는 호화스러운 체험.","quality":"염화물천(나트륨·칼슘염화물천)","effect":"피로 회복 · 신경통 · 만성 피부병 · 아름다운 피부","season":"연중(송나무의 단풍이 아름다운 가을)","access":"아마노하시다테역에서 도보로 바로"},"皆生温泉":{"name":"카이케 온천","desc":"일본해를 바라보는 돗토리현 최대의 온천 리조트. 원천이 일본해의 해저에서 솟아나온다는 드문 온천으로, 오야마의 절경과 신선한 사카이미나토의 해산물이 매력.","quality":"염화물천(나트륨·칼슘염화물천)","effect":"피로 회복 · 신경통 · 냉증 · 만성 피부병","season":"연중","access":"요나고역에서 버스로 약 15분"},"三朝温泉":{"name":"미사사 온천","desc":"세계 유수의 라듐 온천. 라돈 함유량은 세계 굴지로 음천·흡입도 이루어진다. 산토쿠산 산불사(투입당)로의 등산 기점이기도 하다.","quality":"방사능천(라듐천)","effect":"통풍, 신경통, 만성 부인병, 관절염","season":"연중","access":"구라요시역에서 버스로 약 20분"},"湯原温泉":{"name":"유바라 온천","desc":"일본 3대 노천탕 「사탕」으로 유명한 오카야마의 비탕. 아사히카와의 청류를 따라 무료 혼욕 노천탕이 있어, 사계절의 자연미와 함께 탕을 즐길 수 있다.","quality":"알칼리성 단순 온천","effect":"아름다운 피부, 피로 회복, 신경통, 만성 피부병","season":"연중(단풍 시즌이 특히 아름다운)","access":"유바라 IC 근처, 쓰야마 역에서 차로 약 40 분"},"奥津温泉":{"name":"오쿠츠 온천","desc":"오카야마현의 산속에 솟는 유지의 명탕. 강변의 암반에서 발판 세탁을 하는 「발판 세탁」의 문화가 지금도 전해지는 일본의 원풍경.","quality":"알칼리성 단순 온천","effect":"피부 미용, 피로 회복, 신경통","season":"연중","access":"쓰야마역에서 차로 약 50분"},"湯田温泉":{"name":"유다 온천","desc":"야마구치 시내에 솟는 산인의 명탕. 나카하라 나카야의 고향에서 백호 전설이 남는 온천지. 야마구치의 관광 거점으로서 시가지에 있는 편리함도 매력.","quality":"알칼리성 단순 온천","effect":"피부 미용, 피로 회복, 신경통, 만성 소화기 질환","season":"연중","access":"야마구치역에서 도보 약 15분"},"長門湯本温泉":{"name":"나가토 유모토 온천","desc":"야마구치현 제일의 온천지. 오토노부 강을 따라 여관이 늘어선 정서 있는 온천 마을은 2019년 대규모 리뉴얼을 거쳐 주목도가 급상승 중이다.","quality":"알칼리성 단순 온천","effect":"피부 미용, 피로 회복, 신경통","season":"연중","access":"나가토 유모토 역에서 도보로 바로"},"玉造温泉":{"name":"다마쿠리 온천","desc":"「이즈모 국풍 토기」에도 적힌 산인 가장 오래된 온천. '피부에 3일 잠기면 칠백이 된다'라고 칭할 정도의 피부 미용 효과로, 예전보다 '연결의 하나님' 이즈모타이샤와 세트로 방문하는 여행객이 많다.","quality":"알칼리성 단순 온천","effect":"피부 미용, 피로 회복, 신경통, 만성 부인병","season":"연중","access":"다마조 온천역에서 도보 약 10분"},"湯郷温泉":{"name":"유고 온천","desc":"「미사쿠 미유」의 하나. 백로가 상처를 치유하고 있는 것을 발견했다고 하는 백로 전설의 탕. 스포츠 합숙지로도 알려져, 여자 축구의 메카.","quality":"염화물천·탄산수소염천","effect":"피로 회복 · 신경통 · 만성 피부병 · 부인병","season":"연중","access":"미사카시역에서 차로 약 15분"},"道後温泉":{"name":"도고 온천","desc":"일본에서 가장 오래된 온천 중 하나. 나츠메 소세키 「보짱」의 무대에서, 메이지 시대 건축의 본관 「도고 온천 본관」은 국가 지정 중요 문화재. 온천의 상징적 존재.","quality":"알칼리성 단순 온천","effect":"피로 회복·신경통·만성 소화기병·미 피부","season":"연중","access":"마쓰야마역에서 시전으로 약 20분"},"こんぴら温泉":{"name":"곤피라 온천","desc":"시코쿠 제일의 파워 스포트 「금도 히라궁(곤피라씨)」의 몬젠마치에 솟는 온천. 1368단의 돌계단 참배 후에 즐기는 온천은 각별하다.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 냉증","season":"연중","access":"고토히라역에서 도보로 바로"},"祖谷温泉":{"name":"이즈야 온천","desc":"일본 3대 비경의 하나 「이즈야 계곡」에 솟는 비탕. 절벽 절벽의 계곡미와 헤이케의 낙인 전설이 남는 로망 있는 온천지. 케이블카로 내리는 노천탕이 절경.","quality":"알칼리성 단순 온천","effect":"피부 미용, 피로 회복, 신경통","season":"연중(단풍의 가을이 절경)","access":"오보위역에서 차로 약 30분"},"鳴門温泉":{"name":"나루토 온천","desc":"세계 3대 조류 “나루토의 소용돌이”에 가까운 온천지. 바다를 바라보는 노천탕에서 소용돌이를 바라볼 수 있는 숙소도 있어 시코쿠와 아와지시마를 연결하는 관광 거점.","quality":"염화물천","effect":"피로 회복 · 신경통 · 냉증","season":"연중(와오시오의 대조시가 제철)","access":"나루토역에서 버스로 약 15분"},"足摺温泉":{"name":"아시즈리 온천","desc":"시코쿠의 최남단, 도사 시미즈시 아시즈리 곶에 솟는 온천. 쿠로시오의 대해원을 바라보는 절경의 노천탕과 사카모토 료마 연고의 막부 말기 로망이 감도는 온천지.","quality":"염화물천","effect":"피로 회복 · 냉증 · 신경통","season":"연중(고래 워칭은 4~9월)","access":"도사 시미즈역에서 차로 약 40분"},"別府温泉":{"name":"벳푸 온천","desc":"「지옥 순회」로 유명한 일본 최대의 온천지. 용출량·원천수 모두 일본 제일을 자랑해, 「피의 연못 지옥」 등 개성 풍부한 지옥이 8개 점재한다.","quality":"염화물천·탄산수소염천·황산염천 등 다수","effect":"신경통, 류마티스, 피로 회복, 만성 피부병","season":"연중","access":"벳푸 역에서 도보 · 버스"},"由布院温泉":{"name":"유후인 온천","desc":"유후다케를 바라보는 규슈 제일의 인기 온천 리조트. 조용한 잡화점과 카페가 늘어선 탕의 평 가도와 아침 안개가 들어가는 금린호가 풍정 만점.","quality":"단순온천・탄산수소염천","effect":"피로 회복·신경통·만성 소화기병·미 피부","season":"연중(아사기리의 가을이 특히 환상적)","access":"유후인역에서 도보로 바로"},"黒川温泉":{"name":"구로카와 온천","desc":"「입탕 어음」에서의 노천탕 순회가 인기의 구마모토의 비탕. 산리에 녹아든 여관과 목립에 둘러싸인 야취 넘치는 노천탕이 전국적으로 평판.","quality":"황산염천·염화물천","effect":"피로 회복 · 신경통 · 류마티스 · 만성 피부병","season":"연중(단풍의 가을·유키미의 겨울이 인기)","access":"아소역에서 차로 약 40분"},"嬉野温泉":{"name":"우레시노 온천","desc":"「일본 3대 아름다움 피부의 탕」의 하나. 베이킹 소다 성분이 풍부한 토로토로의 탕은 피부가 매끄러워지면 평판. 사가현산 우레시노차와 두부요리도 명산.","quality":"중조천(탄산수소나트륨천)","effect":"피부 미용, 피로 회복, 신경통, 만성 소화기 질환","season":"연중","access":"우레시노 온천역에서 도보, 버스"},"武雄温泉":{"name":"다케오 온천","desc":"1300년의 역사를 가진 사가의 명탕. 시볼트도 입욕한 후루유로, 주홍색의 누문은 나라 지정 중요 문화재. 츠치야 서점이 병설된 문화 시설로도 유명.","quality":"탄산수소염천·염화물천","effect":"피로 회복 · 신경통 · 만성 피부병 · 아름다운 피부","season":"연중","access":"다케오 온천역에서 도보 약 5분"},"雲仙温泉":{"name":"운젠 온천","desc":"나가사키현 시마바라 반도의 운젠다케에 솟는 유황 온천. 일본 최초의 국립공원으로 지정된 에리어에서, 백연 일어나는 「운젠 지옥」의 경관이 환상적.","quality":"산성 황산염천","effect":"신경통, 류마티스, 피부병, 만성 부인병","season":"연중(은뇨로 한 안개가을 신비)","access":"이사하야역에서 버스로 약 90분"},"指宿温泉":{"name":"이부스키 온천","desc":"세계적으로도 드문 '모래찜질 온천'으로 유명. 온천에서 가열된 모래에 몸을 메우는 독특한 입욕법은 전신의 모공에서 온천 성분이 흡수되어 발한 효과가 발군.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 냉증 · 소화기 질환","season":"연중","access":"이부스키역에서 도보 약 10분"},"霧島温泉郷":{"name":"기리시마 온천향","desc":"기리시마 연산의 기슭에 솟는 복수의 온천지의 총칭. 사카모토 료마가 신혼 여행으로 방문한 온천으로 유명하며 기리시마 신궁에 참배하는 것과 함께하는 것이 정평.","quality":"황산염천·탄산수소염천·유황천(천지에 따라 다름)","effect":"신경통, 류마티스, 피로 회복, 아름다운 피부","season":"연중(미야마 키리시마의 5~6월이 특히 아름다운)","access":"가고시마 중앙역에서 버스로 약 90분"},"人吉温泉":{"name":"히토요시 온천","desc":"구마가와를 따라 여관이 늘어선 구마모토의 명탕. 일본 3급류 「구마가와」에서의 래프팅과 온천을 즐길 수 있고, 사가라 700년의 역사와 성시의 풍정이 매력.","quality":"염화물천·탄산수소염천","effect":"피로 회복 · 신경통 · 만성 소화기병 · 냉증","season":"연중(구마가와 내림은 4~10월)","access":"히토요시 역에서 도보로 바로"},"小浜温泉":{"name":"오바마 온천","desc":"운젠 반도의 뿌리에 위치해 일본에서 가장 긴 \"안심하고 105\"(전장 105m의 족탕)이 유명. 타치바나 만에 가라앉는 석양을 바라보는 절경 노천탕이 인기.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 냉증","season":"연중","access":"이사하야역에서 버스로 약 60분"},"長湯温泉":{"name":"나가유 온천","desc":"세계 유수의 탄산 농도를 자랑하는 「일본 제일의 탄산천」. 음천도 할 수 있어 심장·혈관에의 효과가 과학적으로 증명되고 있는 의료탕의 온천. 「라무네노유」의 애칭도.","quality":"탄산수소염천(고농도탄산천)","effect":"고혈압 · 동맥 경화 · 심장병 · 피로 회복","season":"연중","access":"다케다역에서 차로 약 20분"},"山鹿温泉":{"name":"야마가 온천","desc":"구마모토의 상도에 솟는 온천. 야치요자 등 역사적 건조물과 온천이 융합한 「유노마치」에서, 야마가 등롱 축제는 전국적으로 유명한 여름의 제전.","quality":"알칼리성 단순 온천","effect":"피부 미용, 피로 회복, 신경통, 냉증","season":"연중(등롱축제의 8월이 특히 활기차다)","access":"하카타역에서 버스로 약 90분"},"平山温泉":{"name":"히라야마 온천","desc":"구마모토의 야마사토에 솟는 「피부에 상냥한 토로토로의 탕」으로 알려진 아는 사람조차 아는 명탕. pH9.5이상의 고알칼리성으로 「온천 소믈리에」에 인기의 피부 미용의 탕.","quality":"알칼리성 단순 온천(고 pH)","effect":"아름다운 피부, 피로 회복, 신경통, 만성 피부병","season":"연중","access":"신타마나역에서 차로 약 20분"},"菊池温泉":{"name":"기쿠치 온천","desc":"기쿠치 계곡의 청류 근처에 솟는 구마모토의 온천. 푸른 기쿠치 계곡의 폭포 순회와 조합한 자연 체험과 온천은 최고의 조합.","quality":"알칼리성 단순 온천","effect":"피부 미용, 피로 회복, 신경통","season":"연중(계곡의 신록이 아름다운 5~6월)","access":"구마모토역에서 버스로 약 75분"},"えびの高原温泉":{"name":"새우의 고원 온천","desc":"기리시마산계 중에서도 가장 높은 곳에 있는 해발 1,200m의 고원 온천. 백조산의 분기를 가까이 보면서 들어가는 노천탕은 비일상적인 체험.","quality":"산성 유황천","effect":"신경통, 만성 피부병, 피로 회복, 류마티스","season":"연중(노카이도(환상의 벚꽃)의 4월)","access":"새우의 IC 근처 미야자키 공항에서 차로 약 90분"},"日南青島温泉":{"name":"니치난 칭다오 온천","desc":"아열대 식물이 자생하는 「칭다오」의 근처에 솟는 미야자키의 온천. 태평양을 바라보는 노천탕과 일본의 나기사 100선 ‘칭다오 해안’에서 서핑을 즐길 수 있는 리조트.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 냉증 · 신경통","season":"연중(서핑은 가을과 겨울의 파도가 좋다)","access":"칭다오역에서 도보로 바로"},"西表島温泉":{"name":"이리오모테지마 온천","desc":"일본 최남서단에 위치한 오키나와·이리오모테지마의 비탕. 아열대 정글에 둘러싸인 야취 넘치는 온천으로, 일리오 모테야마네코의 서식지이기도 하다.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 냉증 · 만성 피부병","season":"연중(다이빙은 4~11월이 최적)","access":"이시가키섬에서 페리로 약 40~60분"},"壁湯温泉":{"name":"벽탕 온천","desc":"오이타현 구에초의 계류를 따라 솟는 천연의 노천탕. 바위를 뚫은 동굴 모양의 욕조에 물이 쏟아져 계곡의 강 소리를 들으면서 입욕할 수 있는 비탕.","quality":"탄산수소염천(단순탄산수소염천)","effect":"피로 회복 · 신경통 · 아름다운 피부","season":"연중(겨울의 유키미 노천이 인기)","access":"구주 IC에서 차로 약 30분"},"湯平温泉":{"name":"유히라 온천","desc":"자갈길의 비탈길과 쇼와 레트로한 온천 숙소가 정서 풍부한 오이타의 비탕. 에도 시대부터 이어지는 유지 문화가 남아, 여정을 초대하는 조용한 산의 온천지.","quality":"염화물천(나트륨염화물천)","effect":"피로 회복 · 신경통 · 만성 위장병 · 부인병","season":"연중","access":"유후인역에서 차로 약 20분"},"天ヶ瀬温泉":{"name":"아마가세 온천","desc":"구스가와의 계곡에 솟아나는 온천. 강변의 암반에서 자분하는 '가와라유'가 유명하고, 강변에 노천탕이 점재하는 야취 넘치는 온천지.","quality":"염화물천·탄산수소염천","effect":"피로 회복 · 신경통 · 만성 부인병","season":"연중(단풍의 가을이 특히 아름답다)","access":"아마가세역에서 도보 약 5분"},"地獄温泉（阿蘇）":{"name":"지옥 온천 (아소)","desc":"아소 산기슭의 심산에 솟는 유지의 비탕. 메이지 시대부터 이어지는 「스즈메노유」는 회색 진흙을 포함한 유황천으로, 2016년 구마모토 지진에서 부활한 불굴의 명탕.","quality":"산성 유황천","effect":"신경통, 류마티스, 만성 피부병, 피로 회복","season":"연중","access":"아소역에서 차로 약 30분"},"筋湯温泉":{"name":"근탕 온천","desc":"구중연산의 규취계 근처에 솟는 고원온천. 치는 물의 수가 일본 제일 많은 것으로 유명하고, 강력한 치는 물은 어깨 결림 · 요통에 절대적인 효과.","quality":"탄산수소염천(단순온천)","effect":"어깨 결림, 요통, 피로 회복, 신경통","season":"연중(구중 「꿈」 현교와의 조합이 인기)","access":"구에 IC에서 차로 약 20 분"},"国頭温泉（沖縄）":{"name":"구니가미 온천(오키나와)","desc":"오키나와 본섬 최북단의 얀바루(야마바라)에 솟는 오키나와 유일의 천연 온천. 얀발쿠이나의 서식지에 가까운 풍부한 아열대의 자연과 온천의 대비가 드물다.","quality":"염화물천","effect":"피로 회복 · 냉증 · 신경통","season":"연중","access":"나하 공항에서 차로 약 2시간"}}};</script>

const baseToast=toast;toast=function(message){const maps={en:{'行きたいリストに追加しました':'Saved','行きたいリストから外しました':'Removed from saved places','行きたいに追加しました':'Saved','行きたいから外しました':'Removed from saved places','旅行計画に追加しました':'Added to trip','メモを保存しました':'Notes saved','写真を保存しました':'Photo saved','データを読み込みました':'Data imported'},'zh-TW':{'行きたいリストに追加しました':'已收藏','行きたいリストから外しました':'已取消收藏','行きたいに追加しました':'已收藏','行きたいから外しました':'已取消收藏','旅行計画に追加しました':'已加入行程','メモを保存しました':'筆記已儲存','写真を保存しました':'照片已儲存','データを読み込みました':'資料已匯入'},ko:{'行きたいリストに追加しました':'저장했습니다','行きたいリストから外しました':'저장에서 삭제했습니다','行きたいに追加しました':'저장했습니다','行きたいから外しました':'저장에서 삭제했습니다','旅行計画に追加しました':'여행에 추가했습니다','メモを保存しました':'메모를 저장했습니다','写真を保存しました':'사진을 저장했습니다','データを読み込みました':'데이터를 가져왔습니다'}};baseToast(maps[mapLanguage]?.[message]||message)};
applyFilters=function(){const q=$('searchInput').value.trim().toLowerCase(),season=$('seasonFilter').value,access=$('accessFilter').value;filteredSpots=data.filter(s=>{const d=trSpot(s),hay=(kind==='scenic'?`${s.name} ${s.region} ${s.desc} ${s.detail} ${s.season} ${s.access} ${(s.tags||[]).join(' ')} ${d.name} ${d.region} ${d.desc} ${d.detail} ${d.season} ${d.access}`:`${s.name} ${s.region} ${s.desc} ${s.quality} ${s.effect} ${s.season} ${s.access} ${d.name} ${d.region} ${d.desc} ${d.quality} ${d.effect} ${d.season} ${d.access}`).toLowerCase();let ok=(!currentRegion||s.region===currentRegion)&&(!q||hay.includes(q))&&(!season||(season==='通年'?s.season.includes('通年'):(season===currentSeason()?isInSeason(s):s.season.includes(season))))&&(!access||accessType(s)===access)&&(!$('wishOnly').checked||wishes.has(s.name))&&(!$('unvisitedOnly').checked||!visited.has(s.name))&&(!$('nowOnly').checked||isInSeason(s));if(kind==='scenic')ok=ok&&(!$('typeFilter').value||(s.tags||[]).includes($('typeFilter').value));else ok=ok&&(!$('qualityFilter').value||s.quality.includes($('qualityFilter').value))&&(!$('effectFilter').value||s.effect.includes($('effectFilter').value));return ok});const sort=$('sortFilter').value;if(sort==='distance'&&userPosition)filteredSpots.sort((a,b)=>distanceKm(userPosition,a)-distanceKm(userPosition,b));if(sort==='season')filteredSpots.sort((a,b)=>Number(isInSeason(b))-Number(isInSeason(a)));if(sort==='name')filteredSpots.sort((a,b)=>trSpot(a).name.localeCompare(trSpot(b).name,mapLanguage));setText('resultCount',`${filteredSpots.length} / ${TOTAL} ${ui().resultUnit}`);renderMarkers();renderList();closePanel()};
const baseRenderSaved=renderSaved;renderSaved=function(){baseRenderSaved();if(mapLanguage==='ja')return;const t=ui(),box=$('savedContent');if(currentTab==='wishes'){const arr=[...wishes].map(spotByName).filter(Boolean);box.innerHTML=arr.length?arr.map(s=>{const d=trSpot(s);return`<div class="saved-item"><span><strong>${esc(d.name)}</strong><br><small>${esc(d.region)}${kind==='onsen'?'・'+esc(d.quality):''}</small></span><span><button class="action-btn" data-add="${s.id}">${t.toPlan}</button><button class="action-btn danger" data-unwish="${s.id}">${t.remove}</button></span></div>`}).join(''):`<p>${t.emptyWish}</p>`;box.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addToPlan(data[+b.dataset.add].name));box.querySelectorAll('[data-unwish]').forEach(b=>b.onclick=()=>{wishes.delete(data[+b.dataset.unwish].name);persist(kind==='scenic'?'japanScenicWishes':'japanOnsenWishes',[...wishes]);renderSaved();renderList()});return}if(!tripPlan.length){box.innerHTML=`<p>${t.emptyPlan}</p>`;return}const days=[...new Set(tripPlan.map(x=>x.day))].sort((a,b)=>a-b);box.innerHTML=days.map(day=>`<div class="plan-day">${mapLanguage==='zh-TW'?'第'+day+'天':mapLanguage==='en'?t.day+' '+day:day+t.day}</div>${tripPlan.filter(x=>x.day===day).map(x=>{const s=spotByName(x.name),d=s?trSpot(s):{name:x.name,region:''};return`<div class="plan-item"><span>${esc(d.name)}<br><small>${esc(d.region)}</small></span><span><button class="action-btn" data-day="${esc(x.name)}">${t.nextDay}</button><button class="action-btn danger" data-remove="${esc(x.name)}">${t.remove}</button></span></div>`}).join('')}`).join('')+`<div class="action-row"><button class="action-btn primary" id="routeAll">${t.openRoute}</button><button class="action-btn" id="copyPlan">${t.copyPlan}</button></div>`;box.querySelectorAll('[data-day]').forEach(b=>b.onclick=()=>{const x=tripPlan.find(x=>x.name===b.dataset.day);x.day++;persist(kind==='scenic'?'japanScenicPlan':'japanOnsenPlan',tripPlan);renderSaved()});box.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{tripPlan=tripPlan.filter(x=>x.name!==b.dataset.remove);persist(kind==='scenic'?'japanScenicPlan':'japanOnsenPlan',tripPlan);renderSaved()});$('routeAll').onclick=()=>{const pts=tripPlan.map(x=>spotByName(x.name)).filter(Boolean);if(!pts.length)return;const o=pts[0],d=pts[pts.length-1],w=pts.slice(1,-1).map(s=>`${s.lat},${s.lng}`).join('|');window.open(`https://www.google.com/maps/dir/?api=1&origin=${o.lat},${o.lng}&destination=${d.lat},${d.lng}${w?'&waypoints='+encodeURIComponent(w):''}`,'_blank','noopener')};$('copyPlan').onclick=()=>copyText(days.map(day=>`${day}: `+tripPlan.filter(x=>x.day===day).map(x=>trSpot(spotByName(x.name)).name).join(' → ')).join('\n'),t.copyPlan)};
async function localizedWeather(s){const t=ui(),names={en:{0:'Clear',1:'Mostly clear',2:'Partly cloudy',3:'Cloudy',45:'Fog',61:'Rain',71:'Snow',80:'Showers',95:'Thunderstorm'},'zh-TW':{0:'晴朗',1:'大致晴朗',2:'局部多雲',3:'陰天',45:'霧',61:'雨',71:'雪',80:'陣雨',95:'雷雨'},ko:{0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',45:'안개',61:'비',71:'눈',80:'소나기',95:'뇌우'}};setText('liveInfo',t.loading);$('conditionAdvice').innerHTML='';const params=kind==='scenic'?'current=temperature_2m,weather_code,cloud_cover,wind_speed_10m&daily=sunrise,sunset,precipitation_probability_max':'current=temperature_2m,weather_code,precipitation,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max';try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&${params}&timezone=Asia%2FTokyo&forecast_days=1`);if(!r.ok)throw 0;const d=await r.json(),c=d.current,rain=d.daily.precipitation_probability_max[0],w=names[mapLanguage]?.[c.weather_code]||names[mapLanguage]?.[3];if(kind==='scenic'){const sunrise=d.daily.sunrise[0].slice(11),sunset=d.daily.sunset[0].slice(11),labels=mapLanguage==='en'?['Weather','Temperature','Clouds','Wind','Sunrise','Sunset','Rain']:mapLanguage==='zh-TW'?['天氣','氣溫','雲量','風速','日出','日落','降雨']:['날씨','기온','운량','바람','일출','일몰','강수'];$('liveInfo').innerHTML=`<div class="live-grid"><span>${labels[0]}: ${w}</span><span>${labels[1]}: ${c.temperature_2m}℃</span><span>${labels[2]}: ${c.cloud_cover}%</span><span>${labels[3]}: ${c.wind_speed_10m}km/h</span><span>${labels[4]}: ${sunrise}</span><span>${labels[5]}: ${sunset}</span><span>${labels[6]}: ${rain}%</span></div>`}else{const labels=mapLanguage==='en'?['Weather','Temperature','High','Low','Rain','Wind']:mapLanguage==='zh-TW'?['天氣','氣溫','最高','最低','降雨','風速']:['날씨','기온','최고','최저','강수','바람'];$('liveInfo').innerHTML=`<div class="live-grid"><span>${labels[0]}: ${w}</span><span>${labels[1]}: ${c.temperature_2m}℃</span><span>${labels[2]}: ${d.daily.temperature_2m_max[0]}℃</span><span>${labels[3]}: ${d.daily.temperature_2m_min[0]}℃</span><span>${labels[4]}: ${rain}%</span><span>${labels[5]}: ${c.wind_speed_10m}km/h</span></div>`}}catch{setText('liveInfo',t.weatherFail)}}
loadLiveInfo=localizedWeather;

// Rebind controls that originally captured the Japanese-only filter function.
let multilingualSearchTimer;
$('searchInput').oninput=()=>{clearTimeout(multilingualSearchTimer);multilingualSearchTimer=setTimeout(applyFilters,180)};
(kind==='scenic'?['seasonFilter','typeFilter','accessFilter','sortFilter']:['qualityFilter','effectFilter','seasonFilter','accessFilter','sortFilter']).forEach(id=>$(id).onchange=applyFilters);

function applyLanguage(lang){mapLanguage=lang;localStorage.setItem('japanMapLanguage',lang);$('languageSelect').value=lang;applyStatic();updateCounter();renderMarkers();renderList();if($('savedDrawer').classList.contains('open'))renderSaved();if(currentSpotName){const s=spotByName(currentSpotName);if(s)localizePanel(s)}}
window.applyMapLanguage=applyLanguage;
$('languageSelect').addEventListener('change',e=>applyLanguage(e.target.value));
applyLanguage(mapLanguage);
})();
