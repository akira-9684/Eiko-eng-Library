<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛁 日本 温泉地マップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" onerror="this.onerror=null;this.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif; height:100vh; display:flex; flex-direction:column; background:#1a0a00; }

/* HEADER */
header {
  background: linear-gradient(135deg, #3a1505 0%, #6b2a0e 50%, #3a1505 100%);
  color:#fff; padding:10px 16px; display:flex; align-items:center;
  gap:12px; flex-wrap:wrap; box-shadow:0 2px 12px rgba(0,0,0,0.5);
  border-bottom:2px solid #c45e1a;
}
header h1 { font-size:1.2rem; white-space:nowrap; letter-spacing:0.05em; }
.region-filters { display:flex; gap:6px; flex-wrap:wrap; flex:1; }
.region-btn {
  padding:5px 11px; border:none; border-radius:20px; cursor:pointer;
  font-size:0.75rem; font-weight:700; color:#fff;
  opacity:0.75; transition:all 0.2s; white-space:nowrap;
}
.region-btn:hover, .region-btn.active { opacity:1; transform:scale(1.07); box-shadow:0 2px 8px rgba(0,0,0,0.4); }
.region-btn.all-btn { background:#7a3c0a; }

/* STAMP COUNTER */
.stamp-counter {
  display:flex; align-items:center; gap:10px; background:rgba(0,0,0,0.35);
  border-radius:12px; padding:6px 12px; border:1px solid rgba(196,94,26,0.4);
}
.sc-block { display:flex; flex-direction:column; align-items:center; }
.sc-num { font-size:1.3rem; font-weight:900; line-height:1; }
.sc-visited { color:#f5a623; }
.sc-remaining { color:#ff7043; }
.sc-label { font-size:0.6rem; color:rgba(255,255,255,0.7); margin-top:2px; }
.sc-divider { width:1px; height:32px; background:rgba(255,255,255,0.2); }
.sc-bar-wrap { min-width:120px; }
.sc-bar-bg { background:rgba(255,255,255,0.15); border-radius:6px; height:8px; overflow:hidden; margin-bottom:3px; }
.sc-bar-fill { height:100%; background:linear-gradient(90deg,#f5a623,#ff7043); border-radius:6px; transition:width 0.4s ease; }
.sc-bar-label { font-size:0.6rem; color:rgba(255,255,255,0.75); text-align:center; }

/* MAP */
#map { flex:1; z-index:1; }

/* PANEL */
#panel {
  position:fixed; top:0; right:0; width:370px; height:100%;
  background:#fff; z-index:1000; box-shadow:-4px 0 24px rgba(0,0,0,0.35);
  transform:translateX(100%); transition:transform 0.3s ease;
  display:flex; flex-direction:column; overflow:hidden;
}
#panel.open { transform:translateX(0); }
.panel-photo { width:100%; height:200px; object-fit:cover; background:#f0e0d0; flex-shrink:0; }
.panel-body { padding:16px; overflow-y:auto; flex:1; }
.panel-name { font-size:1.3rem; font-weight:900; color:#3a1505; margin-bottom:4px; }
.panel-region-badge {
  display:inline-block; padding:2px 10px; border-radius:10px;
  font-size:0.72rem; color:#fff; font-weight:700; margin-bottom:10px;
}
.panel-desc { font-size:0.88rem; color:#444; line-height:1.65; margin-bottom:12px; }
.panel-detail-row {
  display:flex; gap:8px; margin-bottom:8px;
  font-size:0.83rem; align-items:flex-start;
}
.panel-detail-row .icon { font-size:1rem; flex-shrink:0; width:22px; }
.panel-detail-row .label { color:#7a3c0a; font-weight:700; min-width:52px; flex-shrink:0; }
.panel-detail-row .value { color:#333; line-height:1.5; }
.panel-url { margin-top:12px; }
.panel-url a {
  display:inline-flex; align-items:center; gap:6px;
  background:#c45e1a; color:#fff; padding:8px 16px; border-radius:6px;
  text-decoration:none; font-size:0.82rem; font-weight:700; transition:background 0.2s;
}
.panel-url a:hover { background:#a34b15; }
.visit-btn {
  display:flex; align-items:center; gap:8px; margin-top:14px; padding:10px 18px;
  border-radius:8px; border:2px solid #c45e1a; background:#fff;
  cursor:pointer; font-size:0.9rem; font-weight:700; color:#c45e1a;
  transition:all 0.2s; width:100%;
}
.visit-btn:hover { background:#fff5ee; }
.visit-btn.visited { background:#c45e1a; color:#fff; }
.visit-btn.visited:hover { background:#a34b15; }
.close-btn {
  position:absolute; top:10px; right:10px; width:32px; height:32px;
  border-radius:50%; background:rgba(0,0,0,0.55); color:#fff;
  border:none; cursor:pointer; font-size:1.1rem; display:flex;
  align-items:center; justify-content:center; z-index:10;
}
.close-btn:hover { background:rgba(0,0,0,0.75); }

/* MARKERS */
.custom-marker {
  width:28px; height:28px; border-radius:50% 50% 50% 0;
  transform:rotate(-45deg); border:2px solid rgba(255,255,255,0.85);
  box-shadow:0 2px 6px rgba(0,0,0,0.4); position:relative;
  cursor:pointer; transition:transform 0.15s;
}
.custom-marker.visited { opacity:0.85; }
.custom-marker.visited::after {
  content:'✓'; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  color:#fff; font-size:13px; font-weight:900;
  text-shadow:0 1px 2px rgba(0,0,0,0.5); line-height:1;
}
</style>

.list-panel{position:fixed;z-index:750;top:0;right:0;bottom:0;width:400px;background:#f8f3ef;box-shadow:var(--shadow);display:none;flex-direction:column}.list-panel.open{display:flex}.list-head{padding:84px 14px 10px;display:flex;justify-content:space-between;align-items:center}.spot-list{overflow:auto;padding:0 12px 18px;display:grid;gap:10px}.spot-card{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px;display:grid;grid-template-columns:1fr auto;gap:7px;cursor:pointer;text-align:left}.spot-card:hover{border-color:#d08a5b;transform:translateY(-1px)}.spot-card h3{font-size:15px;color:var(--brown)}.spot-card p{grid-column:1/-1;color:#666;font-size:12px;line-height:1.45}.mini-tags{display:flex;gap:4px;flex-wrap:wrap;grid-column:1/-1}.tag{padding:2px 7px;border-radius:999px;background:#fff0e7;color:#914013;font-size:10px}.fav{color:#d1495b;font-size:18px}
.drawer{position:fixed;z-index:2000;top:0;right:0;width:min(460px,100%);height:100%;background:#fff;box-shadow:var(--shadow);transform:translateX(105%);transition:.25s;display:flex;flex-direction:column}.drawer.open{transform:none}.drawer-head{padding:16px;color:#fff;background:var(--brown);display:flex;justify-content:space-between;align-items:center}.drawer-body{padding:16px;overflow:auto;flex:1}.drawer-close{border:0;background:transparent;color:#fff;font-size:22px;cursor:pointer}.tabs{display:flex;gap:6px;margin-bottom:14px}.tab-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}.tab-btn.active{background:var(--brown);color:#fff}.saved-item,.plan-item{padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;display:flex;gap:8px;justify-content:space-between;align-items:center}.plan-day{margin:14px 0 6px;font-weight:700;color:var(--brown)}
.action-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}.action-btn{border:1px solid #d3b9a8;background:#fff;color:#713415;border-radius:9px;padding:9px 11px;cursor:pointer;text-decoration:none;font-size:12px}.action-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.action-btn.danger{color:#a72d3d}.panel-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.panel-actions button{border:1px solid #dec4b3;background:#fff8f3;border-radius:9px;padding:9px;cursor:pointer}.live-card{background:#fff7f1;border:1px solid #ead3c3;border-radius:10px;padding:11px;margin-top:12px;font-size:12px;line-height:1.65}.live-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}.notice{background:#fff7df;border-left:3px solid #e2a92c;padding:8px;margin-top:8px}.note-area{width:100%;min-height:75px;border:1px solid #ccc;border-radius:9px;padding:8px;margin-top:8px;resize:vertical}.photo-fallback{display:none;width:100%;height:200px;place-items:center;background:linear-gradient(135deg,#f6dfcf,#dca276);font-size:54px}.toast{position:fixed;z-index:3000;left:50%;bottom:24px;transform:translate(-50%,20px);background:#3a1505;color:#fff;padding:10px 16px;border-radius:999px;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}.legend{position:fixed;z-index:700;left:10px;bottom:24px;background:#fffffff0;border-radius:9px;padding:8px;font-size:10px;box-shadow:0 2px 8px #0003}.legend-row{display:flex;align-items:center;gap:5px;margin:3px}.legend-dot{width:9px;height:9px;border-radius:50%}.leaflet-marker-icon.cluster-marker{border-radius:50%;background:#6b2a0e;color:#fff;display:grid!important;place-items:center;border:3px solid #ffffffcc;box-shadow:0 2px 8px #0005;font-weight:700}

@media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}

<body>

<header>
  <h1>🛁 日本 温泉地マップ</h1>
  <div class="region-filters" id="regionFilters"></div>
  <div class="stamp-counter" id="stampCounter">
    <div class="sc-block">
      <div class="sc-num sc-visited" id="visitedCount">0</div>
      <div class="sc-label">訪問済み</div>
    </div>
    <div class="sc-divider"></div>
    <div class="sc-block">
      <div class="sc-num sc-remaining" id="remainingCount">100</div>
      <div class="sc-label">未訪問</div>
    </div>
    <div class="sc-divider"></div>
    <div class="sc-block sc-bar-wrap">
      <div class="sc-bar-bg"><div class="sc-bar-fill" id="progressBar" style="width:0%"></div></div>
      <div class="sc-bar-label" id="progressLabel">0 / 100 達成</div>
    </div>
  </div>
  <div class="top-actions">
    <label class="language-picker" aria-label="表示言語"><span aria-hidden="true">🌐</span><select id="languageSelect" aria-label="表示言語を選択"><option value="ja">日本語</option><option value="en">English</option><option value="zh-TW">繁體中文</option><option value="ko">한국어</option></select></label>
    <button class="icon-btn" id="locateBtn" type="button" title="現在地周辺を表示">◎ 現在地</button>
    <button class="icon-btn" id="savedBtn" type="button" title="保存・旅行計画">♡ 保存・計画</button>
    <button class="icon-btn" id="dataBtn" type="button" title="共有・バックアップ">⇧ 共有</button>
  </div>
</header>

<div id="map"></div>
<div class="search-tools" role="search">
  <div class="search-box"><input id="searchInput" type="search" placeholder="温泉名・泉質・効能・地域など" aria-label="温泉検索"><button id="clearSearch" type="button" aria-label="検索を消去">✕</button></div>
  <button class="filter-toggle" id="advancedToggle" type="button" aria-expanded="false">⚙ 条件</button>
  <button class="view-toggle" id="listToggle" type="button" aria-expanded="false">☷ 一覧</button>
  <div class="advanced-filters" id="advancedFilters">
    <div class="filter-grid">
      <label class="field">泉質<select id="qualityFilter"><option value="">すべて</option><option>硫黄泉</option><option>塩化物泉</option><option>炭酸水素塩泉</option><option>単純泉</option><option>酸性泉</option><option>硫酸塩泉</option><option>放射能泉</option></select></label>
      <label class="field">期待する特徴<select id="effectFilter"><option value="">すべて</option><option>美肌</option><option>冷え性</option><option>神経痛</option><option>疲労回復</option><option>皮膚病</option><option>リウマチ</option></select></label>
      <label class="field">季節<select id="seasonFilter"><option value="">すべて</option><option>春</option><option>夏</option><option>秋</option><option>冬</option><option>通年</option></select></label>
      <label class="field">アクセス<select id="accessFilter"><option value="">すべて</option><option value="train">公共交通向き</option><option value="car">車向き</option><option value="walk">徒歩を含む</option></select></label>
      <label class="field">並び順<select id="sortFilter"><option value="default">標準</option><option value="distance">現在地から近い</option><option value="season">今の季節向き</option><option value="name">名前順</option></select></label>
    </div>
    <div class="check-row"><label><input id="wishOnly" type="checkbox"> 行きたいのみ</label><label><input id="unvisitedOnly" type="checkbox"> 未訪問のみ</label><label><input id="nowOnly" type="checkbox"> 今の季節向き</label></div>
    <div class="result-count"><span id="resultCount">100件</span><button class="action-btn" id="resetFilters" type="button">条件をリセット</button></div>
  </div>
</div>
<section class="list-panel" id="listPanel" aria-label="温泉一覧"><div class="list-head"><strong>温泉一覧</strong><button class="action-btn" id="closeList" type="button">閉じる</button></div><div class="spot-list" id="spotList"></div></section>
<div class="legend" id="legend" aria-label="地域の色分け"></div>

<div id="panel">
  <button class="close-btn" onclick="closePanel()">✕</button>
  <img class="panel-photo" id="panelPhoto" src="" alt="">
  <div class="panel-body">
    <div class="panel-name" id="panelName"></div>
    <div class="panel-region-badge" id="panelBadge"></div>
    <div class="panel-desc" id="panelDesc"></div>
    <div class="panel-detail-row">
      <span class="icon">💧</span>
      <span class="label">泉質</span>
      <span class="value" id="panelQuality"></span>
    </div>
    <div class="panel-detail-row">
      <span class="icon">✨</span>
      <span class="label">効能</span>
      <span class="value" id="panelEffect"></span>
    </div>
    <div class="panel-detail-row">
      <span class="icon">🗓</span>
      <span class="label">シーズン</span>
      <span class="value" id="panelSeason"></span>
    </div>
    <div class="panel-detail-row">
      <span class="icon">🚗</span>
      <span class="label">アクセス</span>
      <span class="value" id="panelAccess"></span>
    </div>
    <div class="panel-url" id="panelUrl"></div>
    <div class="panel-actions">
      <button id="wishBtn" type="button">♡ 行きたい</button><button id="planBtn" type="button">＋ 旅行計画</button>
      <button id="routeBtn" type="button">↗ 経路</button><button id="spotShareBtn" type="button">共有</button>
      <button id="fallbackSearchBtn" type="button" style="grid-column:1/-1">🔎 公式リンクが開かない場合はこちら</button>
    </div>
    <div class="live-card"><strong>今日の温泉旅情報</strong><div id="liveInfo">温泉を選ぶと現地の天気を取得します。</div><div id="conditionAdvice"></div></div>
    <div class="notice">効能表記は一般的な参考情報です。治療目的ではなく、持病・妊娠・飲酒後などは医師や施設の案内に従ってください。</div>
    <label class="field" style="margin-top:12px">入浴・旅行メモ<textarea class="note-area" id="spotNote" placeholder="訪問日、湯の感想、宿、立ち寄り湯など"></textarea></label>
    <div class="action-row"><button class="action-btn" id="saveNoteBtn" type="button">メモを保存</button><label class="action-btn">写真を追加<input id="photoInput" type="file" accept="image/*" hidden></label></div>
    <div id="userPhoto"></div>
    <button class="visit-btn" id="visitBtn" onclick="toggleVisited()">
      <span id="visitBtnIcon">☐</span>
      <span id="visitBtnText">訪問済みにする</span>
    </button>
  </div>
</div>

<aside class="drawer" id="savedDrawer" aria-label="保存と旅行計画"><div class="drawer-head"><strong>保存・温泉旅行計画</strong><button class="drawer-close" data-close="savedDrawer" aria-label="閉じる">×</button></div><div class="drawer-body"><div class="tabs"><button class="tab-btn active" data-tab="wishes">行きたい</button><button class="tab-btn" data-tab="plan">旅行計画</button></div><div id="savedContent"></div></div></aside>
<aside class="drawer" id="dataDrawer" aria-label="共有とバックアップ"><div class="drawer-head"><strong>共有・バックアップ</strong><button class="drawer-close" data-close="dataDrawer" aria-label="閉じる">×</button></div><div class="drawer-body"><p style="line-height:1.7;color:#555">訪問履歴・行きたい・旅行計画・メモを端末間で移動できます。</p><div class="action-row"><button class="action-btn primary" id="copyShareBtn">共有リンクをコピー</button><button class="action-btn" id="exportBtn">JSONを書き出す</button><label class="action-btn">JSONを読み込む<input id="importInput" type="file" accept="application/json" hidden></label><button class="action-btn danger" id="clearDataBtn">保存データを消去</button></div></div></aside>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const REGION_COLORS = {
  "北海道":"#1565c0",
  "東北":"#6a1b9a",
  "関東・甲信越":"#bf360c",
  "中部・北陸":"#e65100",
  "近畿":"#ad1457",
  "中国":"#2e7d32",
  "四国":"#00838f",
  "九州・沖縄":"#b71c1c"
};

const onsen = [
  // 北海道 (10)
  { name:"登別温泉", region:"北海道", lat:42.429, lng:141.105,

<script>
const weatherNames={0:'快晴',1:'晴れ',2:'一部曇り',3:'曇り',45:'霧',48:'霧氷',51:'弱い霧雨',61:'雨',63:'雨',65:'強い雨',71:'雪',80:'にわか雨',95:'雷雨'};
async function loadLiveInfo(s){$('liveInfo').textContent='天気情報を取得中…';$('conditionAdvice').innerHTML='';const url=`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&current=temperature_2m,weather_code,precipitation,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo&forecast_days=1`;try{const r=await fetch(url);if(!r.ok)throw 0;const d=await r.json(),c=d.current,rain=d.daily.precipitation_probability_max[0];$('liveInfo').innerHTML=`<div class="live-grid"><span>天気：${weatherNames[c.weather_code]||'変わりやすい'}</span><span>気温：${c.temperature_2m}℃</span><span>最高：${d.daily.temperature_2m_max[0]}℃</span><span>最低：${d.daily.temperature_2m_min[0]}℃</span><span>降水：${rain}%</span><span>風：${c.wind_speed_10m}km/h</span></div>`;$('conditionAdvice').innerHTML=travelAdvice(s,c,rain)}catch{$('liveInfo').textContent='天気情報を取得できませんでした。公式情報をご確認ください。'}}
function travelAdvice(s,c,rain){const tips=[];if(c.temperature_2m<=5)tips.push('湯冷めしやすい気温です。入浴後は体と髪をよく乾かしましょう。');if(c.temperature_2m>=28)tips.push('入浴前後の水分補給を十分に。長湯は避けましょう。');if(rain>=50)tips.push('雨天時は露天風呂・山道・河原の増水に注意してください。');if(/冬|雪/.test(s.season))tips.push('積雪・凍結・冬季通行止めを出発前に確認してください。');tips.push('営業時間、日帰り入浴の可否、休館日は公式サイトで直前確認してください。');return tips.map(x=>`<div class="notice">${esc(x)}</div>`).join('')}
$('saveNoteBtn').onclick=()=>{if(!currentSpotName)return;notes[currentSpotName]={text:$('spotNote').value,updated:new Date().toISOString()};persist('japanOnsenNotes',notes);toast('メモを保存しました')};
$('photoInput').onchange=e=>{const f=e.target.files[0];if(!f||!currentSpotName)return;if(f.size>1200000)return toast('写真は1.2MB以下にしてください');const reader=new FileReader();reader.onload=()=>{userPhotos[currentSpotName]=reader.result;try{persist('japanOnsenPhotos',userPhotos);renderUserPhoto(currentSpotName);toast('写真を保存しました')}catch{delete userPhotos[currentSpotName];toast('保存容量が不足しています')}};reader.readAsDataURL(f)};
function renderUserPhoto(name){$('userPhoto').innerHTML=userPhotos[name]?`<img src="${userPhotos[name]}" alt="自分で追加した${esc(name)}の写真" style="width:100%;margin-top:10px;border-radius:9px"><button class="action-btn danger" id="removePhoto">写真を削除</button>`:'';if($('removePhoto'))$('removePhoto').onclick=()=>{delete userPhotos[name];persist('japanOnsenPhotos',userPhotos);renderUserPhoto(name)}}
$('savedBtn').onclick=()=>openDrawer('savedDrawer');$('dataBtn').onclick=()=>openDrawer('dataDrawer');document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>$(b.dataset.close).classList.remove('open'));
function openDrawer(id){document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('open'));$(id).classList.add('open');if(id==='savedDrawer')renderSaved()}
document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{currentTab=b.dataset.tab;document.querySelectorAll('.tab-btn').forEach(x=>x.classList.toggle('active',x===b));renderSaved()});
function addToPlan(name){if(tripPlan.some(x=>x.name===name))return toast('旅行計画に追加済みです');tripPlan.push({name,day:1});persist('japanOnsenPlan',tripPlan);toast('旅行計画に追加しました');renderSaved()}
function renderSaved(){const box=$('savedContent');if(currentTab==='wishes'){const arr=[...wishes].map(spotByName).filter(Boolean);box.innerHTML=arr.length?arr.map(s=>`<div class="saved-item"><span><strong>${esc(s.name)}</strong><br><small>${esc(s.region)}・${esc(s.quality)}</small></span><span><button class="action-btn" data-add="${s.id}">計画へ</button><button class="action-btn danger" data-unwish="${s.id}">削除</button></span></div>`).join(''):'<p>まだ「行きたい」はありません。</p>';box.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addToPlan(onsen[+b.dataset.add].name));box.querySelectorAll('[data-unwish]').forEach(b=>b.onclick=()=>{wishes.delete(onsen[+b.dataset.unwish].name);persist('japanOnsenWishes',[...wishes]);renderSaved();renderList()});return}const days=[...new Set(tripPlan.map(x=>x.day))].sort((a,b)=>a-b);box.innerHTML=tripPlan.length?days.map(day=>`<div class="plan-day">${day}日目</div>${tripPlan.filter(x=>x.day===day).map(x=>`<div class="plan-item"><span>${esc(x.name)}<br><small>${esc(spotByName(x.name)?.region||'')}</small></span><span><button class="action-btn" data-day="${esc(x.name)}">翌日へ</button><button class="action-btn danger" data-remove="${esc(x.name)}">削除</button></span></div>`).join('')}`).join(''):'<p>旅行計画は空です。温泉詳細から追加できます。</p>';if(tripPlan.length)box.innerHTML+=`<div class="action-row"><button class="action-btn primary" id="routeAll">選択地点を経路で開く</button><button class="action-btn" id="copyPlan">計画をコピー</button></div>`;box.querySelectorAll('[data-day]').forEach(b=>b.onclick=()=>{const x=tripPlan.find(x=>x.name===b.dataset.day);x.day++;persist('japanOnsenPlan',tripPlan);renderSaved()});box.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{tripPlan=tripPlan.filter(x=>x.name!==b.dataset.remove);persist('japanOnsenPlan',tripPlan);renderSaved()});if($('routeAll'))$('routeAll').onclick=()=>{const pts=tripPlan.map(x=>spotByName(x.name)).filter(Boolean);if(!pts.length)return;const origin=pts[0],dest=pts[pts.length-1],way=pts.slice(1,-1).map(s=>`${s.lat},${s.lng}`).join('|');window.open(`https://www.google.com/maps/dir/?api=1&origin=${origin.lat},${origin.lng}&destination=${dest.lat},${dest.lng}${way?'&waypoints='+encodeURIComponent(way):''}`,'_blank','noopener')};if($('copyPlan'))$('copyPlan').onclick=()=>copyText(days.map(d=>`${d}日目：`+tripPlan.filter(x=>x.day===d).map(x=>x.name).join(' → ')).join('\n'),'旅行計画をコピーしました')}
function appData(){return{version:1,visited:[...visited],wishes:[...wishes],tripPlan,notes}}
function copyText(text,msg){if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(()=>toast(msg)).catch(()=>fallbackCopy(text,msg));else fallbackCopy(text,msg)}function fallbackCopy(text,msg){const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();toast(msg)}
function shareSpot(s){copyText(`${s.name}｜日本 温泉地マップ\n泉質：${s.quality}\n${s.desc}\nhttps://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`,'温泉情報をコピーしました')}
$('copyShareBtn').onclick=()=>{const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(appData()))));copyText(location.href.split('#')[0]+'#data='+encoded,'共有リンクをコピーしました')};
$('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(appData(),null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`japan-onsen-map-${new Date().toISOString().slice(0,10)}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)};
$('importInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{importData(JSON.parse(r.result));toast('データを読み込みました')}catch{toast('読み込めないファイルです')}};r.readAsText(f)};
function importData(d){visited=new Set(d.visited||[]);wishes=new Set(d.wishes||[]);tripPlan=d.tripPlan||[];notes=d.notes||{};persist('japanOnsenVisited',[...visited]);persist('japanOnsenWishes',[...wishes]);persist('japanOnsenPlan',tripPlan);persist('japanOnsenNotes',notes);updateCounter();applyFilters();renderSaved()}
$('clearDataBtn').onclick=()=>{if(!confirm('訪問履歴・行きたい・計画・メモ・写真をすべて消去しますか？'))return;['japanOnsenVisited','japanOnsenWishes','japanOnsenPlan','japanOnsenNotes','japanOnsenPhotos'].forEach(k=>localStorage.removeItem(k));visited=new Set();wishes=new Set();tripPlan=[];notes={};userPhotos={};updateCounter();applyFilters();toast('保存データを消去しました')};
if(location.hash.startsWith('#data=')){try{importData(JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(6))))));history.replaceState(null,'',location.pathname+location.search);toast('共有データを読み込みました')}catch{}}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.drawer,.advanced-filters,.list-panel').forEach(x=>x.classList.remove('open'));closePanel()}if(e.key==='/'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){e.preventDefault();$('searchInput').focus()}});
function refreshMapSize(){requestAnimationFrame(()=>{if(map&&map.invalidateSize)map.invalidateSize({pan:false})})}
window.addEventListener('resize',refreshMapSize,{passive:true});window.addEventListener('orientationchange',()=>setTimeout(refreshMapSize,250),{passive:true});if(window.visualViewport)window.visualViewport.addEventListener('resize',refreshMapSize,{passive:true});
updateCounter();applyFilters();
setTimeout(refreshMapSize,0);setTimeout(refreshMapSize,300);setTimeout(refreshMapSize,1000);
</script>

<script>const MULTILINGUAL_KIND="onsen";const MULTILINGUAL_TRANSLATIONS={"en":{"登別温泉":{"name":"Noboribetsu Onsen","desc":"Hokkaido's largest hot spring resort, famous for \"Jigokudani\". Boasting a wide variety of spring qualities, it boasts one of the highest volumes of hot water in Japan. The bear farm and Jigokudani promenade are also popular.","quality":"9 types including sulfur spring, salt spring, alum spring, etc.","effect":"Neuralgia, skin diseases, fatigue recovery, rheumatism","season":"All year round (in winter, the open-air bath with snowy scenery is exquisite)","access":"Approximately 15 minutes by bus from Noboribetsu Station"},"洞爺湖温泉":{"name":"Toyako Onsen","desc":"A hot spring resort located on the shore of Lake Toya, a caldera lake. The long summer fireworks display and excursion boats are popular. Also certified as a global geopark.","quality":"Chloride spring (sodium chloride spring)","effect":"Sensitivity to cold, recovery from fatigue, neuralgia, women's diseases","season":"All year round (April to October is best)","access":"Approximately 15 minutes by bus from Toya Station"},"定山渓温泉":{"name":"Jozankei Onsen","desc":"\"Sapporo's Okuzashiki\" is about an hour's drive from Sapporo city. Inns line the valley of the Toyohira River, and it is also a famous spot for viewing autumn leaves.","quality":"Chloride spring/sulfate spring","effect":"Recovery from fatigue, sensitivity to cold, neuralgia, cuts","season":"All year round (October is especially popular during the autumn leaves season)","access":"Approximately 70 minutes by bus from Sapporo Station"},"層雲峡温泉":{"name":"Sounkyo Onsen","desc":"The gateway to Daisetsuzan National Park. The beauty of the Sounkyo valley with its continuous cliffs is breathtaking, and the winter Icefall Festival is also famous.","quality":"Chloride spring (sodium/calcium chloride spring)","effect":"Sensitivity to cold, recovery from fatigue, neuralgia, rheumatism","season":"All year round (winter icefall, summer mountain climbing season)","access":"Approximately 30 minutes by bus from Kamikawa Station"},"阿寒湖温泉":{"name":"Lake Akan Onsen","desc":"A hot spring on the shores of Lake Akan where the natural monument marimo lives. It is also a hub of Ainu culture, and you can see Koshanbe and Iomante ceremonies at the Ainu kotan (village).","quality":"Sulfate spring/chloride spring","effect":"Fatigue recovery, neuralgia, rheumatism, beautiful skin","season":"All year round (April to November is best)","access":"Approximately 90 minutes by car from Kushiro Airport"},"知床ウトロ温泉":{"name":"Shiretoko Utoro Onsen","desc":"A hot spring area that is the base of the world natural heritage site, the Shiretoko Peninsula. The attraction is the luxurious experience of soaking in the power of nature such as drift ice, brown bears, and white-tailed eagles in a soothing hot spring.","quality":"Chloride spring (sodium chloride spring)","effect":"Recovery from fatigue, sensitivity to cold, neuralgia","season":"April to November (February to March during the drift ice season is especially valuable)","access":"Approximately 2 hours by car from Memanbetsu Airport"},"ニセコ温泉郷":{"name":"Niseko hot spring village","desc":"Niseko is also famous as an international ski resort. The open-air bath overlooking Mt. Yotei has a spectacular view, and is popular in the winter when you can enjoy the powder snow and hot springs.","quality":"Sulfur spring/bicarbonate earth spring","effect":"Fatigue recovery, neuralgia, skin disease, rheumatism","season":"All year round (skiing from December to March)","access":"Shuttle bus from Niseko Station to each hot spring"},"支笏湖温泉":{"name":"Lake Shikotsu Onsen","desc":"A hot spring on the shore of Lake Shikotsu, a caldera lake with outstanding transparency. You can enjoy it in combination with activities such as canoeing and diving.","quality":"hydrogen carbonate spring","effect":"Neuralgia, muscle pain, fatigue recovery, beautiful skin","season":"All year round (winter's Ice Festival is fantastic)","access":"Approximately 40 minutes by bus from Chitose Station"},"豊富温泉":{"name":"Toyotomi Onsen","desc":"Japan's northernmost hot spring area. It is a hot spring that contains petroleum components, which is rare in Japan because it gushes out along with petroleum-associated gas, and is attracting attention for its effectiveness in treating atopic dermatitis.","quality":"Oil-containing salt spring (chloride spring)","effect":"Atopic dermatitis, skin diseases, neuralgia","season":"All year round","access":"Approximately 5 minutes by car from Toyotomi Station"},"十勝川温泉":{"name":"Tokachigawa Onsen","desc":"It is famous as a botanical moor hot spring. This is a rare hot spring that contains a ``mol'' made up of ancient plants, and is known as a ``beauty hot spring'' for its skin-beautifying effects.","quality":"Moor spring (vegetable humus saline spring)","effect":"Beautiful skin, neuralgia, fatigue recovery, chronic skin disease","season":"All year round (combination with winter swan watching is popular)","access":"Approximately 40 minutes by bus from Obihiro Station"},"酸ヶ湯温泉":{"name":"Sukayu Onsen","desc":"One of the oldest spas in Japan, located in the Hakkoda mountains. It is famous for its large cypress-made mixed bathing bath called the Senninburo. Full of the charm of a secret hot spring.","quality":"Acidic sulfur spring (hydrogen sulfide acidic spring)","effect":"Rheumatism, neuralgia, skin disease, diabetes","season":"All year round (in winter, it becomes an isolated island due to heavy snowfall)","access":"Approximately 65 minutes by bus from Aomori Station"},"乳頭温泉郷":{"name":"Nyuto Onsenkyo","desc":"A secret hot spring in Akita Prefecture. It is famous for its 7 unique hot springs, including Tsuru-no-yu and Taeno-yu. Tsuru-no-yu is especially famous for its beautiful milky white water.","quality":"Sulfur spring/hydrogen carbonate spring (varies depending on the inn)","effect":"Neuralgia, rheumatism, fatigue recovery, beautiful skin","season":"All year round (the snow-viewing bath in winter is spectacular)","access":"Approximately 45 minutes by bus from Tazawako Station"},"蔵王温泉":{"name":"Zao Onsen","desc":"A highly acidic hot spring that gushes out at the foot of Yamagata Zao Ski Resort. The collaboration of cloudy hot springs and frost-covered trees (ice monsters) is a winter tradition.","quality":"acidic sulfate chloride spring","effect":"Neuralgia, muscle pain, chronic skin disease, fatigue recovery","season":"All year round (winter rime tours are especially popular)","access":"Approximately 40 minutes by bus from Yamagata Station"},"鳴子温泉郷":{"name":"Naruko hot spring village","desc":"Miyagi's inner parlor. A diverse hot spring area with 9 of the 11 types of hot springs in Japan. It is also famous as a production area for kokeshi dolls.","quality":"Sulfur springs, chloride springs, and many others","effect":"Neuralgia, rheumatism, fatigue recovery, beautiful skin","season":"All year round (October is the busiest month for autumn leaves)","access":"Within walking distance from Naruko Onsen Station"},"銀山温泉":{"name":"Ginzan Onsen","desc":"A hot spring town that looks like a picture postcard, with wooden inns lining the Shirogane River that exude Taisho romance. The scenery lit up by gas lamps in the evening looks like something out of a movie.","quality":"Chloride spring/hydrogen carbonate spring","effect":"Neuralgia, fatigue recovery, sensitivity to cold, beautiful skin","season":"All year round (the snowy winter scenery is the most magical)","access":"Approximately 40 minutes by bus from Oishida Station"},"花巻温泉郷":{"name":"Hanamaki Onsenkyo","desc":"A hot spring in Hanamaki City, the hometown of Kenji Miyazawa. It is a hot spring village where you can enjoy touring the hot springs that are made up of multiple hot spring areas such as Dai Onsen and Hanamaki Onsen.","quality":"Chloride spring/hydrogen carbonate spring","effect":"Neuralgia, fatigue recovery, chronic digestive diseases, sensitivity to cold","season":"All year round","access":"Approximately 30 minutes by bus from Hanamaki Station"},"秋保温泉":{"name":"Akiu hot spring","desc":"A hot spring that has been popular as a back-room in Sendai for a long time. The natural beauty of Akiu Otaki and Rairikyo Gorge is also attractive. There are many large inns, making it an ideal base for sightseeing in Sendai.","quality":"Chloride spring (sodium chloride spring)","effect":"Recovery from fatigue, neuralgia, sensitivity to cold, skin diseases","season":"All year round","access":"Approximately 40 minutes by bus from Sendai Station"},"東山温泉":{"name":"Higashiyama Onsen","desc":"A famous hot spring in Aizuwakamatsu, known as ``Aizu's inner parlor''. Close to Tsuruga Castle, it is a popular base for sightseeing in Aizu.","quality":"Chloride spring/sulfate spring","effect":"Fatigue recovery, neuralgia, rheumatism, chronic skin disease","season":"All year round (especially beautiful during the autumn leaves season)","access":"Approximately 10 minutes by bus from Aizuwakamatsu Station"},"飯坂温泉":{"name":"Iizaka Onsen","desc":"One of the oldest hot springs in Tohoku, visited by Matsuo Basho. Hot spring culture has been rooted in the area for a long time, with hot spring tours centered around the communal bath ``Sabakoyu''.","quality":"Chloride spring (sodium chloride spring)","effect":"Recovery from fatigue, neuralgia, sensitivity to cold, digestive disorders","season":"All year round","access":"Short walk from Iizakaonsen Station"},"土湯温泉":{"name":"Tsuchiyu Onsen","desc":"A hot spring area located to the west of Fukushima City. It is also a production area for kokeshi dolls, and is characterized by a calm atmosphere with inns dotted along the Arakawa Valley.","quality":"Hydrogen carbonate spring/chloride spring","effect":"Neuralgia, fatigue recovery, chronic skin disease, sensitivity to cold","season":"All year round","access":"Approximately 50 minutes by bus from Fukushima Station"},"磐梯熱海温泉":{"name":"Bandai Atami Onsen","desc":"A hot spring area near Goshikinuma at the foot of Mt. Bandai. It is popular as the inner quarters of Koriyama City, and has an abundant amount of hot spring water and a variety of accommodation facilities.","quality":"Chloride spring/hydrogen carbonate spring","effect":"Fatigue recovery, neuralgia, rheumatism, sensitivity to cold","season":"All year round","access":"A short walk from Bandai-Atami Station"},"遠刈田温泉":{"name":"Togatta Onsen","desc":"A hot spring area at the foot of the Zao mountain range. Famous as one of the birthplaces of kokeshi dolls, it is a tourist hub located between Zao and Matsushima.","quality":"Chloride spring (sodium chloride spring)","effect":"Fatigue recovery, neuralgia, muscle pain, beautiful skin","season":"All year round (winter is also popular during Zao ski season)","access":"Approximately 30 minutes by bus from Shiroishi Zao Station"},"夏油温泉":{"name":"Natsuyu hot spring","desc":"A secret hot spring in Kitakami City, Iwate Prefecture. This mountain hot spring is famous for its wild hot springs with multiple sources, and is closed during the winter, where you can enjoy open-air baths with a rustic feel, such as Oyu and Taki-no-yu.","quality":"Sulfur spring/hydrogen carbonate spring","effect":"Neuralgia, rheumatism, skin disease, fatigue recovery","season":"May to November (closed in winter)","access":"Approximately 60 minutes by car from Kitakami Station"},"大鰐温泉":{"name":"Owani Onsen","desc":"Owani is famous as the best hot spring area in Aomori Prefecture. It has long been known as the ``Okuzashiki of Tsugaru'', and you can enjoy ski resorts and hot springs.","quality":"Chloride spring (sodium chloride spring)","effect":"Fatigue recovery, neuralgia, rheumatism, sensitivity to cold","season":"All year round","access":"Short walk from Owani Onsen Station"},"草津温泉":{"name":"Kusatsu Onsen","desc":"One of Japan's three famous hot springs. It is famous for its highly acidic sulfur springs and ``yumomi'' culture. The hot spring town centered around Yubatake is full of elegance and is visited by more than 2 million people a year.","quality":"Acid chloride sulfate spring","effect":"Skin diseases, diabetes, neuralgia, rheumatism","season":"All year round (both winter for skiing and summer for fresh greenery are popular)","access":"Approximately 25 minutes by bus from Naganohara Kusatsuguchi Station"},"伊香保温泉":{"name":"Ikaho Onsen","desc":"A famous hot spring in Joshu, famous for its stone steps. It has two types of hot springs: the brown golden hot spring and the transparent white silver hot spring. It is also a place associated with Tokutomi Roka.","quality":"Chloride sulfate spring (Kogane-no-Yu)/hydrogen carbonate spring (Shirogane-no-Yu)","effect":"Recovery from fatigue, neuralgia, women's diseases, sensitivity to cold","season":"All year round","access":"Approximately 20 minutes by bus from Shibukawa Station"},"四万温泉":{"name":"Shima Onsen","desc":"A hot spring in the mountains of Gunma that is said to heal 40,000 illnesses. The cobalt blue Sekizenkan building is so dreamlike that it is said to be the model for a Miyazaki movie.","quality":"Chloride spring/hydrogen carbonate spring","effect":"Digestive diseases, neuralgia, fatigue recovery, women's diseases","season":"All year round (fresh greenery and autumn leaves are especially beautiful)","access":"Approximately 40 minutes by bus from Nakanojo Station"},"水上温泉":{"name":"Minakami Onsen","desc":"A hot spring resort located at the headwaters of the Tone River. There are many activities such as rafting and SL Minakami, and the combination of winter skiing and hot springs is popular.","quality":"Chloride spring (sodium chloride spring)","effect":"Fatigue recovery, neuralgia, sensitivity to cold, rheumatism","season":"All year round (Rafting from May to October)","access":"Walk/bus from Minakami Station"},"宝川温泉":{"name":"Takaragawa Onsen","desc":"A secret hot spring known for having one of the largest mixed bathing open-air baths in Japan. The total area of ​​the four large open-air baths is over 470㎡. A solitary inn located at the deepest part of Minakami Onsen Village.","quality":"chloride spring","effect":"Fatigue recovery, neuralgia, rheumatism","season":"Year-round (Yukimi open-air is especially popular)","access":"Approximately 40 minutes by bus from Minakami Station"},"万座温泉":{"name":"Manza Onsen","desc":"Japan's highest hot spring located at an altitude of 1,800m. The sulfur content is particularly high, and the cloudy water is unique. It has the feel of a secret hot spring even deeper in the mountains than Kusatsu.","quality":"acidic sulfur spring","effect":"Neuralgia, rheumatism, skin diseases, chronic women's diseases","season":"All year round (especially crowded during ski season)","access":"Approximately 50 minutes by car from Karuizawa Station"},"箱根温泉":{"name":"Hakone Onsen","desc":"The metropolitan area's premier hot spring resort. The open-air bath with a view of Mt. Fuji is popular, with a variety of hot springs, art museums, and spectacular views. Over 20 million people visit each year.","quality":"Chloride spring, sulfate spring, hydrogen carbonate spring, and many others","effect":"Fatigue recovery, neuralgia, beautiful skin, sensitivity to cold","season":"All year round","access":"Approximately 90 minutes from Shinjuku by Odakyu Romancecar"},"熱海温泉":{"name":"Atami hot spring","desc":"One of Japan's leading hot spring resorts located at strategic points along the Tokaido. It is a famous hot spring loved by Tokugawa Ieyasu, and is also popular as a coastal resort for the Atami Sea Fireworks Festival and Atami Sun Beach.","quality":"Chloride spring (sodium/calcium chloride spring)","effect":"Fatigue recovery, neuralgia, sensitivity to cold, beautiful skin","season":"All year round","access":"Approximately 45 minutes from Tokyo on the Tokaido Shinkansen/Kodama"},"伊東温泉":{"name":"Ito Onsen","desc":"Izu's largest hot spring resort. Boasting an abundant amount of hot water (30,000 liters per minute) and over 200 hot springs, it is said to be one of Japan's top three hot springs.","quality":"Chloride spring (sodium/calcium chloride spring)","effect":"Recovery from fatigue, neuralgia, muscle pain, chronic skin disease","season":"All year round","access":"Approximately 1 hour and 40 minutes by Limited Express Odoriko from Tokyo Station"},"修善寺温泉":{"name":"Shuzenji Onsen","desc":"The oldest hot spring in Izu. A charming hot spring town with a bamboo forest path centered around Shuzenji Temple. A place of literature loved by Natsume Soseki and Kawabata Yasunari.","quality":"chloride spring","effect":"Fatigue recovery, neuralgia, sensitivity to cold, women's diseases","season":"All year round (plum blossoms, cherry blossoms, autumn leaves and the beauty of each season)","access":"Approximately 10 minutes by bus from Shuzenji Station"},"湯河原温泉":{"name":"Yugawara Onsen","desc":"An old hot spring mentioned in the Manyoshu. Inns are dotted on the hill overlooking Sagami Bay, and it has been loved by literary figures and artists as a hidden hot spring near Tokyo.","quality":"Chloride spring (sodium/calcium chloride spring)","effect":"Recovery from fatigue, neuralgia, chronic women's diseases, sensitivity to cold","season":"All year round (February, famous for its plum grove, is also popular)","access":"Approximately 10 minutes by bus from Yugawara Station"},"鬼怒川温泉":{"name":"Kinugawa Onsen","desc":"One of the best hot spring resorts in Kanto, deep in Nikko. Large inns line the valley of the Kinugawa River, and it is also a popular base for sightseeing in SL Taiju and Nikko Toshogu Shrine.","quality":"Alkaline simple spring","effect":"Fatigue recovery, neuralgia, rheumatism, sensitivity to cold","season":"All year round","access":"Walk from Kinugawa Onsen Station on the Tobu Nikko Line"},"塩原温泉郷":{"name":"Shiobara hot spring village","desc":"A hot spring village with 11 hot spring spots dotted along the Hoki River. With 11 types of hot springs, the variety of hot springs is attractive and has even . Known as one of Japan's best ski resorts, the hot springs you can enjoy amidst the snowy scenery of the Echigo mountains will tempt you to travel.","quality":"simple hot spring","effect":"Fatigue recovery, neuralgia, sensitivity to cold, beautiful skin","season":"All year round (skiing from December to March)","access":"A short walk from Echigo-Yuzawa Station on the Joetsu Shinkansen"},"月岡温泉":{"name":"Tsukioka Onsen","desc":"A hot spring area in Niigata characterized by emerald green sulfur springs. Known as the ``Beauty Bath'', the hot spring town's food and geisha culture are also attractive.","quality":"Sulfur-containing sodium chloride spring","effect":"Beautiful skin, neuralgia, fatigue recovery, chronic skin disease","season":"All year round","access":"Approximately 35 minutes by bus from Toyosaka Station"},"城崎温泉":{"name":"Kinosaki Onsen","desc":"A famous hot spring in Hyogo that is famous for Naoya Shiga's novel \"At Kinosaki.\" This is Kansai's best hot spring town where you can visit seven public baths and walk around wearing yukata.","quality":"Chloride spring (sodium chloride spring)","effect":"Recovery from fatigue, neuralgia, chronic women's diseases, sensitivity to cold","season":"All year round (Matsuba crab is especially popular in winter)","access":"Short walk from Kinosaki Onsen Station"},"有馬温泉":{"name":"Arima Onsen","desc":"One of Japan's three famous hot springs. The most convenient hot spring resort near Osaka and Kobe. There are two famous types of hot springs: ``Kin-no-Yu'' (brown color containing iron) and ``Gin-no-Yu'' (carbonated spring).","quality":"Iron-containing strong chloride spring (Kin-no-Yu)/hydrogen carbonate spring (Gin-no-Yu)","effect":"Neuralgia, muscle pain, sensitivity to cold, recovery from fatigue","season":"All year round","access":"A short walk from Kobe Electric Railway Arima Onsen Station"},"白浜温泉":{"name":"Shirahama hot spring","desc":"A hot spring resort in Wakayama near the Kumano Kodo. A resort area with Adventure ooking the Sea of Japan. This is a rare hot spring whose source springs from the ocean floor of the Sea of ​​Japan, and the attraction is the spectacular view of Mt. Daisen and the fresh seafood from Sakaiminato.","quality":"Chloride spring (sodium/calcium chloride spring)","effect":"Recovery from fatigue, neuralgia, sensitivity to cold, chronic skin disease","season":"All year round","access":"Approximately 15 minutes by bus from Yonago Station"},"三朝温泉":{"name":"Misasa Onsen","desc":"One of the world's leading radium hot springs. It has one of the highest levels of radon in the world, and the springs are both drinkable and inhalable. It is also the starting point for climbing Mt. Mitoku Sanbutsu-ji Temple (Nageire-do Hall).","quality":"Radioactive spring (radium spring)","effect":"Gout, neuralgia, chronic women's diseases, arthritis","season":"All year round","access":"Approximately 20 minutes by bus from Kurayoshi Station"},"湯原温泉":{"name":"Yubara Onsen","desc":"A secret hot spring in Okayama that is famous for being one of Japan's three largest open-air baths, \"Sunayu.\" There is a free mixed open-air bath along the clear stream of the Asahi River, where you can enjoy the hot springs while enjoying the natural beauty of each season.","quality":"Alkaline simple hot spring","effect":"Beautiful skin, fatigue recovery, neuralgia, chronic skin disease","season":"All year round (especially beautiful during the autumn leaves season)","access":"Near Yubara IC, about 40 minutes by car from Tsuyama Station"},"奥津温泉":{"name":"Okutsu Onsen","desc":"A famous hot spring springing up in the mountains of Okayama Prefecture. This is an original Japanese landscape where the culture of ``foot washing'', where washing is carried out by foot from the bedrock along the river, is still passed down to this day.","quality":"Alkaline simple hot spring","effect":"Beautiful skin, fatigue recovery, neuralgia","season":"All year round","access":"Approximately 50 minutes by car from Tsuyama Station"},"湯田温泉":{"name":"Yuda Onsen","desc":"A famous hot spring in the San'in region that springs up in Yamaguchi City. This is the hometown of Chuya Nakahara, and a hot spring area where the legend of the white fox remains. The convenience of being located in the city center as a sightseeing base in Yamaguchi is also appealing.","quality":"Alkaline simple hot spring","effect":"Beautiful skin, recovery from fatigue, neuralgia, chronic digestive diseases","season":"All year round","access":"Approximately 15 minutes walk from Yamaguchi Station"},"長門湯本温泉":{"name":"Nagato Yumoto Onsen","desc":"The best hot spring area in Yamaguchi Prefecture. This atmospheric hot spring town with inns lined up along the Otogawa River is rapidly gaining attention after undergoing a large-scale renovation in 2019.","quality":"Alkaline simple hot spring","effect":"Beautiful skin, fatigue recovery, neuralgia","season":"All year round","access":"Short walk from Nagato Yumoto Station"},"玉造温泉":{"name":"Tamatsukuri Onsen","desc":"The oldest hot spring in the San'in region, which is also recorded in the Izumo no Kuni Fudoki. It is said to have a beautiful skin effect that is said to ``soak your skin for three days and it will become seven whites.'' Since ancient times, many travelers visit Izumo Taisha Shrine, the ``god of matchmaking.''","quality":"Alkaline simple hot spring","effect":"Beautiful skin, recovery from fatigue, neuralgia, chronic women's diseases","season":"All year round","access":"Approximately 10 minutes walk from Tamatsukuri Onsen Station"},"湯郷温泉":{"name":"Yunogo Onsen","desc":"One of the ``Mimasaka Three Hot Springs.'' This hot spring is said to be said to have been discovered by white herons healing their wounds. It is also known as a sports training camp and a mecca for women's soccer.","quality":"Chloride spring/hydrogen carbonate spring","effect":"Fatigue recovery, neuralgia, chronic skin disease, women's disease","season":"All year round","access":"Approximately 15 minutes by car from Mimasakashi Station"},"道後温泉":{"name":"Dogo Onsen","desc":"One of the oldest hot springs in Japan. Dogo Onsen Honkan, the main building built in the Meiji era and the setting for Natsume Soseki's ``Botchan,'' is a nationally designated important cultural property. A symbol of hot springs.","quality":"Alkaline simple hot spring","effect":"Fatigue recovery, neuralgia, chronic digestive diseases, beautiful skin","season":"All year round","access":"Approximately 20 minutes by streetcar from Matsuyama Station"},"こんぴら温泉":{"name":"Konpira Onsen","desc":"A hot spring that springs up in the town in front of Kompira-san, Shikoku's number one power spot. Enjoying the hot springs after visiting the 1368 stone steps is especially special.","quality":"Chloride spring (sodium chloride spring)","effect":"Recovery from fatigue, neuralgia, sensitivity to cold","season":"All year round","access":"Short walk from Kotohira Station"},"祖谷温泉":{"name":"Iya Onsen","desc":"A secret hot spring that springs from Iya Valley, one of Japan's three most unexplored regions. A romantic hot spring area with a beautiful valley surrounded by steep cliffs and the legend of a Heike fugitive. The open-air bath you get off on the cable car has a spectacular view.","quality":"Alkaline simple hot spring","effect":"Beautiful skin, fatigue recovery, neuralgia","season":"All year round (autumn leaves are spectacular)","access":"Approximately 30 minutes by car from Oboke Station"},"鳴門温泉":{"name":"naruto hot spring","desc":"A hot spring area close to the world's three major tidal currents, the Naruto whirlpools. There are some inns where you can see the whirlpools from an open-air bath overlooking the ocean, and it is a tourist hub connecting Shikoku and Awaji Island.","quality":"chloride spring","effect":"Recovery from fatigue, neuralgia, sensitivity to cold","season":"All year round (best time to see the whirlpools at spring tide)","access":"Approximately 15 minutes by bus from Naruto Station"},"足摺温泉 or snow viewing are popular)","access":"Approximately 40 minutes by car from Aso Station"},"嬉野温泉":{"name":"Ureshino Onsen","desc":"One of Japan's three major hot springs for beautiful skin. The melty hot water, which is rich in baking soda, is said to make your skin smooth. Ureshino tea from Saga Prefecture and tofu dishes are also famous.","quality":"Baking soda spring (sodium hydrogen carbonate spring)","effect":"Beautiful skin, recovery from fatigue, neuralgia, chronic digestive diseases","season":"All year round","access":"Walk/Bus from Ureshino Onsen Station"},"武雄温泉":{"name":"Takeo Onsen","desc":"A famous hot spring in Saga with a history of 1300 years. This is an old hot spring where Siebold also bathed, and the vermilion-painted tower gate is a nationally designated important cultural property. It is also famous for its cultural facility, which has a Tsutaya Bookstore attached to it.","quality":"Hydrogen carbonate spring/chloride spring","effect":"Fatigue recovery, neuralgia, chronic skin disease, beautiful skin","season":"All year round","access":"About 5 minutes walk from Takeo Onsen Station"},"雲仙温泉":{"name":"Unzen hot spring","desc":"A sulfur hot spring that gushes out from Mt. Unzen on the Shimabara Peninsula in Nagasaki Prefecture. This area was designated as Japan's first national park, and the view of Unzen Jigoku with its white smoke rising is fantastic.","quality":"acidic sulfate spring","effect":"Neuralgia, rheumatism, skin diseases, chronic women's diseases","season":"All year round (mysterious foggy autumn)","access":"Approximately 90 minutes by bus from Isahaya Station"},"指宿温泉":{"name":"Ibusuki Onsen","desc":"It is famous for its ``sand bath hot springs,'' which are rare in the world. This unique bathing method involves burying your body in sand heated by the hot springs, and the hot spring ingredients are absorbed through the pores of your entire body, resulting in an excellent sweating effect.","quality":"Chloride spring (sodium chloride spring)","effect":"Recovery from fatigue, neuralgia, sensitivity to cold, digestive disorders","season":"All year round","access":"About 10 minutes walk from Ibusuki Station"},"霧島温泉郷":{"name":"Kirishima hot spring village","desc":"A general term for multiple hot springs that spring up at the foot of the Kirishima Mountain Range. It is famous as the hot spring where Ryoma Sakamoto visited on his honeymoon, and it is standard to combine it with a visit to Kirishima Shrine.","quality":"Sulfate spring, hydrogen carbonate spring, sulfur spring (varies depending on the spring area)","effect":"Neuralgia, rheumatism, fatigue recovery, beautiful skin","season":"All year round (May and June are especially beautiful when the Japanese aquarium is blooming)","access":"Approximately 90 minutes by bus from Kagoshima Chuo Station"},"人吉温泉":{"name":"Hitoyoshi Onsen","desc":"A famous hot spring in Kumamoto where inns are lined up along the Kuma River. Enjoy rafting on Japan's three rapids, the Kuma River, and hot springs, and enjoy the 700-year history of Sagara and the charm of the castle town.","quality":"Chloride spring/hydrogen carbonate spring","effect":"Recovery from fatigue, neuralgia, chronic digestive disorders, sensitivity to cold","season":"All year round (Kuma River rafting is from April to October)","access":"Short walk from Hitoyoshi Station"},"小浜温泉":{"name":"Obama Onsen","desc":"Located at the base of the Unzen Peninsula, it is famous for Japan's longest footbath, ``Hotto Foot 105'' (105m long footbath). The open-air bath with a spectacular view of the sunset over Tachibana Bay is popular.","quality":"Chloride spring (sodium chloride spring)","effect":"Recovery from fatigue, neuralgia, sensitivity to cold","season":"All year round","access":"Approximately 60 minutes by bus from Isahaya Station"},"長湯温泉":{"name":"Nagayu Onsen","desc":"Japan's No. 1 carbonated spring boasts one of the highest carbon dioxide concentrations in the world. It is a medical hot spring that is drinkable and has scientifically proven effects on the heart and blood vessels. It is also nicknamed ``Ramune no Yu''.","quality":"Hydrogen carbonate spring (high concentration carbonate spring)","effect":"High blood pressure, arteriosclerosis, heart disease, fatigue recovery","season":"All year round","access":"Approximately 20 minutes by car from Takeda Station"},"山鹿温泉":{"name":"Yamaga Onsen","desc":"A hot spring in the commercial capital of Kumamoto. The Yamaga Toro Festival is a nationally famous summer festival in the ``Yunomachi'' area, which is a combination of historical buildings such as Yachiyoza and hot springs.","quality":"Alkaline simple hot spring","effect":"Beautiful skin, recovery from fatigue, neuralgia, sensitivity to cold","season":"All year round (August is especially crowded during the lantern festival)","access":"Approximately 90 minutes by bus from Hakata Station"},"平山温泉":{"name":"Hirayama Onsen","desc":"A famous hot spring in the mountain village of Kumamoto known for its ``soft hot water that is gentle on the skin''. Highly alkaline with a pH of over 9.5, this hot spring is popular among hot spring sommeliers for its beautiful skin.","quality":"Alkaline simple hot spring (high pH)","effect":"Beautiful skin, fatigue recovery, neuralgia, chronic skin disease","season":"All year round","access":"Approximately 20 minutes by car from Shin-Tamana Station"},"菊池温泉":{"name":"Kikuchi Onsen","desc":"A hot spring in Kumamoto that springs near the clear stream of Kikuchi Valley. Nature experiences combined with waterfall tours in the lush Kikuchi Valley and hot springs are the perfect combination.","quality":"Alkaline simple hot spring","effect":"Beautiful skin, fatigue recovery, neuralgia","season":"All year round (May to June when the fresh greenery in the valley is beautiful)","access":"Approximately 75 minutes by bus from Kumamoto Station"},"えびの高原温泉":{"name":"Ebino Kogen Onsen","desc":"A highland hot spring at an altitude of 1,200m, the highest in the Kirishima Mountains. Bathing in an open-air bath while looking closely at the fumarole of Mt. Shiratori is an extraordinary experience.","quality":"acidic sulfur spring","effect":"Neuralgia, chronic skin disease, fatigue recovery, rheumatism","season":"All year round (April of Nokaido (phantom cherry blossoms))","access":"Near Ebino IC, about 90 minutes by car from Miyazaki Airport"},"日南青島温泉":{"name":"Nichinan Aoshima Onsen","desc":"A hot spring in Miyazaki near Aoshima, where subtropical plants grow naturally. A resort where you can enjoy an open-air bath overlooking the Pacific Ocean and surfing on the Aoshima Coast, one of Japan's top 100 beaches.","quality":"Chloride spring (sodium chloride spring)","effect":"Recovery from fatigue, sensitivity to cold, neuralgia","season":"All year round (Surfing is good in autumn and winter waves)","access":"A short walk from Aoshima Station"},"西表島温泉":{"name":"Iriomotejima hot spring","desc":"A secret hot spring on Iriomote Island, Okinawa, located at the southwesternmost tip of Japan. This hot spring is surrounded by subtropical jungle and is home to the Iriomote wild cat.","quality":"Chloride spring (sodium chloride spring)","effect":"Recovery from fatigue, neuralgia, sensitivity to cold, chronic skin disease","season":"All year round (best for diving from April to November)","access":"Approximately 40-60 minutes by ferry from Ishigaki Island"},"壁湯温泉":{"name":"Kabeyu Onsen","desc":"A natural open-air bath that springs along a mountain stream in Kokonoe Town, Oita Prefecture. A secret hot spring filled with hot water in a cave-like bathtub carved out of a rock, where you can listen to the sound of the river in the valley while taking a bath.","quality":"Hydrogen carbonate spring (simple hydrogen carbonate spring)","effect":"Fatigue recovery, neuralgia, beautiful skin","season":"All year round (winter snow viewing open air is popular)","access":"Approximately 30 minutes by car from Kusu IC"},"湯平温泉":{"name":"Yunohira Onsen","desc":"A hidden hot spring in Oita with a stone-paved slope and a retro Showa-era hot spring inn. A quiet mountain hot spring area with a hot spring culture that has continued since the Edo period, inviting a wanderlust.","quality":"Chloride spring (sodium chloride spring)","effect":"Fatigue recovery, neuralgia, chronic gastrointestinal disease, women's disease","season":"All year round","access":"Approximately 20 minutes by car from Yufuin Station"},"天ヶ瀬温泉":{"name":"Amagase Onsen","desc":"A hot spring that gushes out in the valley of the Kusu River. Famous for its ``Kawarayu,'' which gushes out from the bedrock on the riverbank, this hot spring area is full of rustic charm and has open-air baths dotted along the river.","quality":"Chloride spring/hydrogen carbonate spring","effect":"Fatigue recovery, neuralgia, chronic women's diseases","season":"All year round (the autumn leaves are especially beautiful)","access":"About 5 minutes walk from Amagase Station"},"地獄温泉（阿蘇）":{"name":"Jigoku Onsen (Aso)","desc":"A secret hot spring for hot springs deep in the mountains at the foot of Mt. Aso. Suzume no Yu, a sulfur spring that has been around since the Meiji era, is a sulfur spring containing gray mud, and is a famous and enduring hot spring that was revived after the 2016 Kumamoto earthquake.","quality":"acidic sulfur spring","effect":"Neuralgia, rheumatism, chronic skin disease, fatigue recovery","season":"All year round","access":"Approximately 30 minutes by car from Aso Station"},"筋湯温泉":{"name":"Sujiyu hot spring","desc":"A highland hot spring that springs up near Kusuikei in the Kokonoe Mountains. It is famous for having the largest number of utaseyus in Japan, and the powerful utaseyus are extremely effective for relieving stiff shoulders and lower back pain.","quality":"Hydrogen carbonate spring (simple hot spring)","effect":"Stiff shoulders, lower back pain, fatigue recovery, neuralgia","season":"All year round (combination with Kokonoe “Yume” Suspension Bridge is popular)","access":"Approximately 20 minutes by car from Kokonoe IC"},"国頭温泉（沖縄）":{"name":"Kunigami Onsen (Okinawa)","desc":"Okinawa's only natural hot spring springs up in Yanbaru (Yanbaru), the northernmost tip of Okinawa's main island. The contrast between the hot springs and the rich subtropical nature close to the habitat of the Yanbaru rail is unusual.","quality":"chloride spring","effect":"Recovery from fatigue, sensitivity to cold, neuralgia","season":"All year round","access":"Approximately 2 hours by car from Naha Airport"}},"zh-TW":{"登別温泉":{"name":"登別溫泉","desc":"北海道最大的溫泉勝地，以「地獄谷」聞名。它擁有多種泉質，是日本熱水量最多的地區之一。養熊場和地獄谷散步道也很受歡迎。","quality":"硫磺泉、鹽泉、明礬泉等9種。","effect":"神經痛、皮膚病、疲勞恢復、風濕病","season":"一年四季（冬季露天浴池雪景別緻）","access":"從登別站搭乘巴士約 15 分鐘"},"洞爺湖温泉":{"name":"洞爺湖溫泉","desc":"位於破火山口湖－洞爺湖畔的溫泉度假村。漫長的夏季煙火表演和遊覽船很受歡迎。也被認證為世界地質公園。","quality":"氯化物泉（氯化鈉泉）","effect":"怕冷、疲倦恢復、神經痛、婦女病","season":"全年（4月至10月最佳）","access":"從洞爺站搭乘巴士約 15 分鐘"},"定山渓温泉":{"name":"定山溪溫泉","desc":"「札幌的奧座敷」距離札幌市內約1小時車程。豐平河河谷內旅館林立，也是著名的紅葉觀賞地。","quality":"氯化物泉/硫酸鹽泉","effect":"疲勞、怕冷、神經痛、割傷恢復","season":"全年（十月在秋葉季節尤其受歡迎）","access":"從札幌車站搭乘巴士約 70 分鐘"},"層雲峡温泉":{"name":"層雲峽溫泉","desc":"大雪山國立公園的門戶。層雲峽的絕壁連綿的美景令人嘆為觀止，冬季的冰瀑布節也很有名。","quality":"氯化物泉（氯化鈉／氯化鈣泉）","effect":"怕冷、疲勞恢復、神經痛、風濕病","season":"全年（冬季冰川、夏季登山季）","access":"從上川站搭乘巴士約 30 分鐘"},"阿寒湖温泉":{"name":"阿寒湖溫泉","desc":"天然紀念物球藻棲息的阿寒湖畔的溫泉。它也是阿伊努文化的中心，您可以在阿伊努村（Ainu kotan）觀看 Koshanbe 和 Iomante 儀式。","quality":"硫酸鹽泉/氯化物泉","effect":"疲勞恢復、神經痛、風濕病、美麗肌膚","season":"全年（4月至11月最佳）","access":"從釧路機場開車約 90 分鐘"},"知床ウトロ温泉":{"name":"知床宇登呂溫泉","desc":"世界自然遺產知床半島的基地的溫泉地。其吸引力在於在舒緩的溫泉中浸泡在流冰、棕熊和白尾鷹等自然力量中的奢華體驗。","quality":"氯化物泉（氯化鈉泉）","effect":"疲勞恢復、怕冷、神經痛","season":"4月至11月（流冰季節的2月至3月尤其有價值）","access":"從女滿別機場開車約 2 小時"},"ニセコ温泉郷":{"name":"新雪谷溫泉村","desc":"新雪谷也以國際滑雪勝地而聞名。俯瞰羊蹄山的露天浴池景色優美，在冬季可以享受粉雪和溫泉，很受歡迎。","quality":"硫磺泉/碳酸氫土泉","effect":"疲勞恢復、神經痛、皮膚病、風濕病","season":"全年（12 月至 3 月滑雪）","access":"從新雪谷站到各溫泉的接駁巴士"},"支笏湖温泉":{"name":"支笏湖溫泉","desc":"支笏湖畔的溫泉，支笏湖是透明超群的破火山口湖。您可以結合獨木舟和潛水等活動來享受它。","quality":"碳酸氫鹽泉","effect":"神經痛、肌肉痛、疲勞恢復、美麗肌膚","season":"全年（冬天的冰雪節非常棒）","access":"從千歲站搭乘巴士約 40 分鐘"},"豊富温泉":{"name":"豐富溫泉","desc":"日本最北端的溫泉地。與石油伴生氣體一起噴湧而出的溫泉，是日本國內罕見的含有石油成分的溫泉，因其對異位性皮膚炎的治療效果而受到關注。","quality":"含油鹽泉（氯化物泉）","effect":"異位性皮膚炎、皮膚病、神經痛","season":"全年","access":"從豐富站開車約 5 分鐘"},"十勝川温泉":{"name":"十勝川溫泉","desc":"作為植物沼澤溫泉而聞名。這是一種罕見的溫泉，含有由古老植物組成的“摩爾”，因其具有美膚效果而被稱為“美容溫泉”。","quality":"沼泉（植物腐植質鹽泉）","effect":"美膚、神經痛、疲勞恢復、慢性皮膚病","season":"全年（與冬季觀賞天鵝相結合很受歡迎）","access":"從帶廣站搭乘巴士約 40 分鐘"},"酸ヶ湯温泉":{"name":"酸湯溫泉","desc":"日本最古老的溫泉之一，位於八甲田山脈。以其名為千人樓的大型檜木混合浴池而聞名。充滿了秘密溫泉的魅力。","quality":"酸性硫磺泉（硫化氫酸性泉）","effect":"風濕病、神經痛、皮膚病、糖尿病","season":"全年（冬季因大雪而成為孤島）","access":"從青森站搭乘巴士約 65 分鐘"},"乳頭温泉郷":{"name":"乳頭溫泉鄉","desc":"秋田縣的秘密溫泉。它以鶴之湯、妙野湯等 7 個獨特的溫泉而聞名。鶴之湯以其美麗的乳白色水而聞名。","quality":"硫磺泉/碳酸氫鹽泉（各旅館有所不同）","effect":"神經痛、風濕、疲勞恢復、美麗肌膚","season":"一年四季（冬天的雪景浴場非常壯觀）","access":"從田澤湖站搭乘巴士約 45 分鐘"},"蔵王温泉":{"name":"藏王溫泉","desc":"山形藏王滑雪場山麓湧出的高酸性溫泉。陰天溫泉和霜凍樹木（冰怪）的結合是冬季的傳統。","quality":"酸性硫酸鹽氯化物泉","effect":"神經痛、肌肉痛、慢性皮膚病、疲勞恢復","season":"全年（冬季霧凇之旅尤其受歡迎）","access":"從山形站搭乘巴士約 40 分鐘"},"鳴子温泉郷":{"name":"鳴子溫泉鄉","desc":"宮城的內廳。擁有日本11種溫泉中的9種的多元化溫泉地。這裡也作為木芥子的產地而聞名。","quality":"硫磺泉、氯化物泉等","effect":"神經痛、風濕、疲勞恢復、美麗肌膚","season":"全年（10月是紅葉最旺的月份）","access":"從鳴子溫泉站步行即可到達"},"銀山温泉":{"name":"銀山溫泉","desc":"宛如明信片般的溫泉小鎮，白銀川沿岸的木造旅館充滿了大正浪漫氣息。晚上煤氣燈照亮的景色就像電影裡的場景。","quality":"氯化物泉/碳酸氫鹽泉","effect":"神經痛、疲勞恢復、怕冷、美麗肌膚","season":"一年四季（冬季雪景最為神奇）","access":"從大石田站搭乘巴士約 40 分鐘"},"花巻温泉郷":{"name":"花卷溫泉鄉","desc":"宮澤賢治的故鄉花卷市的溫泉。這是一個溫泉鄉，您可以享受由大溫泉和花卷溫泉等多個溫泉區組成的溫泉之旅。","quality":"氯化物泉/碳酸氫鹽泉","effect":"神經痛、疲勞恢復、慢性消化系統疾病、怕冷","season":"全年","access":"從花捲站搭乘巴士約 30 分鐘"},"秋保温泉":{"name":"秋保溫泉","desc":"自古以來作為仙台的幕後溫泉而受歡迎的溫泉。秋保大瀧和來峽的自然美景也很吸引人。這裡有許多大型旅館，是仙台觀光的理想據點。","quality":"氯化物泉（氯化鈉泉）","effect":"恢復疲勞、神經痛、怕冷、皮膚病","season":"全年","access":"從仙台站搭乘巴士約 40 分鐘"},"東山温泉":{"name":"東山溫泉","desc":"會津若鬆的著名溫泉，被稱為「會津的內部客廳」。靠近敦賀城，是會津觀光的熱門據點。","quality":"氯化物泉/硫酸鹽泉","effect":"疲勞恢復、神經痛、風濕病、慢性皮膚病","season":"一年四季（尤其是紅葉季節美麗）","access":"從會津若松站搭乘巴士約 10 分鐘"},"飯坂温泉":{"name":"飯坂溫泉","desc":"松尾芭蕉曾造訪過的東北最古老的溫泉之一。溫泉文化在該地區紮根已久， :{"name":"蘆原溫泉","desc":"北陸的溫泉勝地。靠近越前海岸，可以同時享受來自日本海的新鮮海鮮和溫泉。這裡是蘆原溫泉越前鐵道的終點站，交通便利。","quality":"氯化物泉（氯化鈉／氯化鈣泉）","effect":"疲勞恢復、神經痛、婦女疾病、寒顫恢復","season":"一年四季（冬季是越前蟹的旺季）","access":"從蘆原溫泉站搭乘巴士約 10 分鐘"},"粟津温泉":{"name":"粟津溫泉","desc":"傳說於718年開幕的加賀古溫泉。日本最古老的旅館「星星」就坐落於此，作為溫泉勝地而聞名於世。安靜輕鬆的氛圍。","quality":"氯化物泉（氯化鈉泉）","effect":"疲勞恢復、神經痛、風濕病、慢性消化系統疾病","season":"全年","access":"從小松站搭乘巴士約 30 分鐘"},"越後湯沢温泉":{"name":"越後湯澤溫泉","desc":"川端康成的小說《雪國》的背景。被譽為日本最好的滑雪勝地之一，您可以在越後山脈的雪景中享受溫泉，這將誘惑您前往旅行。","quality":"簡單的溫泉","effect":"疲勞恢復、神經痛、怕冷、美麗肌膚","season":"全年（12 月至 3 月滑雪）","access":"從上越新幹線越後湯澤站步行即到"},"月岡温泉":{"name":"月岡溫泉","desc":"新潟的溫泉區，以翠綠的硫磺泉為特色。有「美容浴場」之稱的溫泉小鎮的美食和藝妓文化也同樣引人入勝。","quality":"含硫氯化鈉泉","effect":"美膚、神經痛、疲勞恢復、慢性皮膚病","season":"全年","access":"從豐坂站搭乘巴士約 35 分鐘"},"城崎温泉":{"name":"城崎溫泉","desc":"因志賀直哉的小說《城崎》而聞名的兵庫縣著名溫泉。這是關西最好的溫泉小鎮，您可以參觀七個公共浴場並穿著浴衣四處走動。","quality":"氯化物泉（氯化鈉泉）","effect":"疲勞恢復、神經痛、慢性婦女疾病、寒顫恢復","season":"一年四季（松葉蟹冬季尤其受歡迎）","access":"距離城崎溫泉站僅幾步之遙"},"有馬温泉":{"name":"有馬溫泉","desc":"日本三大名泉之一。大阪、神戶附近最方便的溫泉度假村。有兩種著名的溫泉類型：「金之湯」（含鐵的棕色溫泉）和「銀之湯」（碳酸泉）。","quality":"含鐵強氯化物泉（金之湯）/碳酸氫鹽泉（銀之湯）","effect":"神經痛、肌肉痛、怕冷、疲勞恢復","season":"全年","access":"距離神戶電鐵有馬溫泉站僅幾步之遙"},"白浜温泉":{"name":"白濱溫泉","desc":"和歌山熊野古道附近的溫泉度假村。一個度假區，擁有以熊貓、圓月島的壯麗景色和白良濱海灘的白色沙灘而聞名的冒險世界。","quality":"氯化物泉（氯化鈉泉）","effect":"疲勞、神經痛、怕冷、慢性皮膚病恢復","season":"全年（夏季特別適合在海灘游泳）","access":"從白濱車站搭乘巴士約10分鐘"},"湯の峰温泉":{"name":"湯之峰溫泉","desc":"日本最古老的溫泉（已有 1800 多年的歷史），徒步熊野古道的參拜者在此沐浴。被登入為世界遺產的壺湯溫泉是一個每天會變色六次的神秘溫泉。","quality":"含硫碳酸氫鈉泉","effect":"疲勞、神經痛、皮膚病、慢性消化系統疾病恢復","season":"全年","access":"從新宮站搭乘巴士約 70 分鐘"},"川湯温泉":{"name":"川湯溫泉","desc":"從大藤川河底湧出的溫泉，是罕見的溫泉地。冬季，築壩而成的「千人樓」（長約50m）成為著名的大型露天浴池。","quality":"碳酸氫鹽泉（小蘇打泉）","effect":"疲勞恢復、神經痛、慢性皮膚病、美麗肌膚","season":"全年無休（千人樓 12 月至 2 月）","access":"從新宮站搭乘巴士約 90 分鐘"},"南紀勝浦温泉":{"name":"南紀勝浦溫泉","desc":"俯瞰太平洋的溫泉度假村。港口城市那智勝浦以其鮪魚捕撈而聞名，也靠近世界遺產那智瀑布。博基洞以其特色的洞穴浴而聞名。","quality":"氯化物泉（氯化鈉泉）","effect":"疲勞恢復、怕冷、神經痛、慢性皮膚病","season":"全年","access":"從紀伊勝浦站步行/乘船"},"湯村温泉（兵庫）":{"name":"湯村溫泉（兵庫縣）","desc":"以在攝氏98度的溫泉「荒湯」中煮雞蛋和蔬菜的文化而聞名。這裡是與松本清張有淵源的山陰地區，也是 是白鷺治癒傷口時發現的。它也被稱為運動訓練營和女子足球的聖地。","quality":"氯化物泉/碳酸氫鹽泉","effect":"疲勞恢復、神經痛、慢性皮膚病、婦女病","season":"全年","access":"從美作站開車約 15 分鐘"},"道後温泉":{"name":"道後溫泉","desc":"日本最古老的溫泉之一。道後溫泉本館是明治時代建造的主建築，也是夏目漱石的《少爺》的拍攝地，被指定為國家重要文化財產。溫泉的象徵。","quality":"鹼性單純溫泉","effect":"疲勞恢復、神經痛、慢性消化系統疾病、美麗肌膚","season":"全年","access":"從松山站搭乘路面電車約 20 分鐘"},"こんぴら温泉":{"name":"金比羅溫泉","desc":"四國第一能量勝地金比羅山前的小鎮中湧出的溫泉。參觀完1368級石階後享受溫泉尤為特別。","quality":"氯化物泉（氯化鈉泉）","effect":"疲勞、神經痛、怕冷恢復","season":"全年","access":"距離琴平站僅幾步之遙"},"祖谷温泉":{"name":"祖谷溫泉","desc":"源自日本三大未開發地區之一祖谷溪谷的秘密溫泉。一個浪漫的溫泉區，周圍有美麗的山谷，周圍有陡峭的懸崖，還有平家逃亡者的傳說。搭乘纜車下車的露天浴池可以欣賞到絕美的景色。","quality":"鹼性單純溫泉","effect":"美肌、疲勞恢復、神經痛","season":"一年四季（秋天的紅葉非常壯觀）","access":"從大步危站開車約 30 分鐘"},"鳴門温泉":{"name":"鳴門溫泉","desc":"靠近世界三大潮流鳴門漩渦的溫泉區。有些旅館的露天浴池可以眺望大海，可以看到漩渦，是連接四國和淡路島的旅遊據點。","quality":"氯化物泉","effect":"疲勞、神經痛、怕冷恢復","season":"全年（最佳觀賞漩渦時間為春潮時）","access":"從鳴門站搭乘巴士約 15 分鐘"},"足摺温泉":{"name":"足折溫泉","desc":"從四國最南端土佐清水市的足折岬湧出的溫泉。與坂本龍馬有著淵源的江戶末期浪漫氛圍，擁有俯瞰黑潮大海的壯觀露天浴池的溫泉度假村。","quality":"氯化物泉","effect":"疲勞恢復、怕冷、神經痛","season":"全年（4月至9月賞鯨）","access":"從土佐清水站開車約 40 分鐘"},"別府温泉":{"name":"別府溫泉","desc":"日本最大的溫泉勝地，以「地獄之旅」而聞名。該地區擁有日本最多的泉水量和最多的溫泉數量，周圍分佈著包括茅池地獄在內的八個獨特的地獄。","quality":"氯化物泉、碳酸氫鹽泉、硫酸鹽泉等","effect":"神經痛、風濕病、疲勞恢復、慢性皮膚病","season":"全年","access":"從別府站步行/搭乘巴士"},"由布院温泉":{"name":"由布院溫泉","desc":"俯瞰由布山的九州最受歡迎的溫泉度假村。小雜貨店和咖啡館林立的湯之坪街道和晨霧繚繞的金鱗湖風景如畫。","quality":"單純溫泉/碳酸氫鹽泉","effect":"疲勞恢復、神經痛、慢性消化系統疾病、美麗肌膚","season":"一年四季（秋天的晨霧尤其神奇）","access":"從由布院站步行一小段距離"},"黒川温泉":{"name":"蒙特內哥羅","desc":"熊本的秘密溫泉，以入浴券參觀露天浴池而聞名。融入山村的旅館和綠樹環繞的質樸露天浴池在全國都很受歡迎。","quality":"硫酸鹽泉/氯化物泉","effect":"疲勞恢復、神經痛、風濕病、慢性皮膚病","season":"全年（秋季賞紅葉、冬季賞雪最受歡迎）","access":"從阿蘇站開車約 40 分鐘"},"嬉野温泉":{"name":"嬉野溫泉","desc":"日本三大美膚溫泉之一。富含小蘇打的融化熱水據說可以使皮膚光滑。佐賀縣的嬉野茶和豆腐料理也很有名。","quality":"小蘇打泉（碳酸氫鈉泉）","effect":"美膚、恢復疲勞、神經痛、慢性消化系統疾病","season":"全年","access":"從嬉野溫泉站步行/搭乘巴士"},"武雄温泉":{"name":"武雄溫泉","desc":"擁有1300年歷史的佐賀著名溫泉。這是西博爾德曾沐浴過的古老溫泉，朱紅色的塔門是國家指定的重要文化財產。它也以其文化設施而聞名，其中有一家附屬的蔦屋書店。","quality":"碳酸氫鹽泉/氯化物泉","effect":"疲勞恢復、神經痛、慢性皮膚病、美麗肌膚","season":"全年","access":"從
